<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>現場用ページ（データ表示テスト）</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #f9f9f9; }
    table { border-collapse: collapse; width: 100%; max-width: 800px; background-color: #fff; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    th { background-color: #e0e0e0; }
  </style>
</head>
<body>
  <h2>現在の案件リスト（取り込みデータ確認用）</h2>
  <p>※現在Firebaseに保存されているデータだけをシンプルに表示しています。</p>
  
  <table>
    <thead>
      <tr>
        <th>案件ID (CSV 1列目)</th>
        <th>ステータスなど (CSV 2列目)</th>
      </tr>
    </thead>
    <tbody id="table-body">
      <!-- ここにFirebaseから読み込んだデータが自動で入ります -->
    </tbody>
  </table>

  <!-- Firebase（神様）の準備 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    // あなた専用の合言葉
    const firebaseConfig = {
      apiKey: "AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",
      authDomain: "project-6745138395263517914.firebaseapp.com",
      projectId: "project-6745138395263517914",
      databaseURL: "https://project-6745138395263517914-default-rtdb.firebaseio.com"
    };
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();
    const tbody = document.getElementById('table-body');

    // Firebaseから「cases」フォルダのデータを読み込んで、自動で表に追加する
    db.ref('cases').on('child_added', function(snapshot) {
      const data = snapshot.val();
      
      const tr = document.createElement('tr');
      // 現在Firebaseに入っている1列目と2列目のデータを表示
      tr.innerHTML = `
        <td>${data.caseId}</td>
        <td>${data.customerName}</td>
      `;
      tbody.appendChild(tr);
    });
  </script>
</body>
</html>
