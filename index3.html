<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>index3 - ファイルハブ</title>
<style>
  body { font-family: sans-serif; padding: 20px; background:#f5f5f5; }
  #fileContainer { margin-top:20px; border:1px solid #ccc; padding:10px; background:#fff; min-height:300px; }
  input { padding:5px; width:200px; }
  button { padding:5px 10px; margin-left:5px; }
</style>
</head>
<body>

<h2>📂 ファイル読み込みハブ (index3)</h2>

<input type="text" id="fileInput" placeholder="ファイル名を入力 (例: today.html)">
<button onclick="loadFile()">読み込む</button>

<div id="fileContainer">読み込むファイルはここに表示されます。</div>

<script>
function loadFile() {
  const filename = document.getElementById('fileInput').value.trim() || 'today.html';
  fetch(filename)
    .then(r => {
      if(!r.ok) throw new Error('読み込み失敗: ' + filename);
      return r.text();
    })
    .then(html => {
      document.getElementById('fileContainer').innerHTML = html;
    })
    .catch(e => alert(e.message));
}

// デフォルトで today.html を読み込む
loadFile();
</script>

</body>
</html>
