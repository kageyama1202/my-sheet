<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>index3 テスト環境</title>

<style>
body{font-family:sans-serif;margin:0;background:#f0f2f5;font-size:13px;}
.table-wrapper{overflow:auto;background:#fff;height:90vh;}
table{border-collapse:collapse;width:100%;}
td{border:1px solid #ccc;padding:6px;cursor:pointer;}
tr:hover{background:#e8f4ff;}

#test-modal-overlay{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  z-index:99999;
}

#test-modal{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:500px;
  background:#fff;
  border-radius:10px;
  padding:16px;
}

.test-tab{
  display:flex;
  border-bottom:1px solid #ccc;
  margin-bottom:10px;
}

.test-tab button{
  flex:1;
  padding:8px;
  border:none;
  background:#eee;
  cursor:pointer;
}

.test-tab button.active{
  background:#fff;
  font-weight:bold;
}

.test-content{display:none;}
.test-content.active{display:block;}
</style>
</head>

<body>

<div class="table-wrapper">
<table id="table-body"></table>
</div>

<div id="test-modal-overlay"></div>

<script>

// ダミーデータ（今はここでOK）
var globalTasks = {
  a:{csvData:["", "進行中", "", "リフォーム", "案件A", "山田", "090-1111-2222", "メモA", "札幌市中央区", "2026-04-10", "", ""]},
  b:{csvData:["", "未着手", "", "新築", "案件B", "佐藤", "090-3333-4444", "メモB", "札幌市北区", "2026-04-15", "", ""]}
};

// テーブル描画
function renderTable(){
  const tbody=document.getElementById("table-body");
  tbody.innerHTML="";
  Object.values(globalTasks).forEach(function(t){
    const c=t.csvData;
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${c[4]}</td><td>${c[3]}</td><td>${c[1]}</td>`;
    tr.onclick=function(){openTestModal(t);}
    tbody.appendChild(tr);
  });
}
renderTable();

// モーダル開く（ここが今回の核心）
function openTestModal(taskData){

  const c = taskData.csvData || [];

  const html = `
    <div id="test-modal">

      <button onclick="closeTestModal()">閉じる</button>

      <h3>案件詳細</h3>

      <!-- タブ -->
      <div class="test-tab">
        <button onclick="switchTestTab('case')" id="tab-case-btn" class="active">案件</button>
        <button onclick="switchTestTab('mail')" id="tab-mail-btn">メーラー</button>
      </div>

      <!-- 案件タブ -->
      <div id="tab-case" class="test-content active">
        <div style="line-height:1.6;">
          <b>案件名：</b>${c[4] || ""}<br>
          <b>区分：</b>${c[3] || ""}<br>
          <b>ステータス：</b>${c[1] || ""}<br>
          <b>施工日：</b>${c[9] || ""}<br>
          <b>住所：</b>${c[8] || ""}<br>
          <b>担当：</b>${c[5] || ""}<br>
          <b>電話：</b>${c[6] || ""}<br>
          <b>備考：</b>${c[7] || ""}<br>
        </div>
      </div>

      <!-- メーラータブ -->
      <div id="tab-mail" class="test-content">
        <div style="color:#999;">※ここにメーラーを後で入れる</div>
      </div>

    </div>
  `;

  const overlay = document.getElementById("test-modal-overlay");
  overlay.innerHTML = html;
  overlay.style.display = "block";
}

// 閉じる
function closeTestModal(){
  document.getElementById("test-modal-overlay").style.display = "none";
}

// タブ切替
function switchTestTab(tab){

  document.querySelectorAll(".test-content")
    .forEach(el=>el.classList.remove("active"));

  document.getElementById("tab-"+tab).classList.add("active");

  document.querySelectorAll(".test-tab button")
    .forEach(el=>el.classList.remove("active"));

  document.getElementById("tab-"+tab+"-btn").classList.add("active");
}

</script>
</body>
</html>
