<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Index3 - ファイル読み込み＋テストモーダル</title>
<style>
  body { font-family: sans-serif; padding:20px; background:#f5f5f5; }
  #fileInput { padding:6px; width:200px; }
  #fileContainer { border:1px solid #ccc; height:500px; margin-top:10px; position:relative; }
  #fileFrame { width:100%; height:100%; border:none; }

  /* モーダル */
  #test-modal-overlay{
    display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:99999;
    display:flex; align-items:center; justify-content:center;
  }
  #test-modal{
    background:#fff; border-radius:10px; padding:16px; width:90%; max-width:500px; position:relative;
  }
  #test-modal .close-btn{position:absolute; top:10px; right:10px; cursor:pointer; font-size:20px;}
  .test-tab{display:flex; border-bottom:1px solid #ccc; margin-bottom:10px;}
  .test-tab button{flex:1; padding:8px; border:none; background:#eee; cursor:pointer;}
  .test-tab button.active{background:#fff; font-weight:bold;}
  .test-content{display:none;} .test-content.active{display:block;}
  textarea{width:100%; min-height:120px; margin-top:10px;}
</style>
</head>
<body>

<h2>📂 ファイル読み込みテスト</h2>
<input type="text" id="fileInput" placeholder="ファイル名入力 (例: today.html)">
<button onclick="loadFile()">読み込む</button>
<button onclick="openTestModal()">📝 テストモーダル</button>

<div id="fileContainer">
  <iframe id="fileFrame" src="today.html"></iframe>
</div>

<!-- テストモーダル -->
<div id="test-modal-overlay">
  <div id="test-modal">
    <span class="close-btn" onclick="closeTestModal()">×</span>
    <h3>施工管理テスト</h3>
    <div class="test-tab">
      <button onclick="switchTestTab('info')" id="tab-info-btn" class="active">基本</button>
      <button onclick="switchTestTab('mail')" id="tab-mail-btn">メーラー</button>
      <button onclick="switchTestTab('extra')" id="tab-extra-btn">追加</button>
      <button onclick="switchTestTab('log')" id="tab-log-btn">履歴</button>
    </div>

    <div id="tab-info" class="test-content active">
      <label><input type="checkbox" id="testFlag"> 施工日決定</label>
    </div>
    <div id="tab-mail" class="test-content">
      <textarea id="testMail"></textarea><br><br>
      <button onclick="saveTestMail()">仮保存</button>
      <button onclick="sendTestMail()">送信</button>
    </div>
    <div id="tab-extra" class="test-content">
      <p>ここに追加情報や設定を置けます。</p>
    </div>
    <div id="tab-log" class="test-content">
      <p>履歴ログ表示用タブ</p>
    </div>
  </div>
</div>

<script>
function loadFile(){
  const filename = document.getElementById('fileInput').value.trim() || 'today.html';
  document.getElementById('fileFrame').src = filename;
}

/* モーダル関連 */
function openTestModal(){
  document.getElementById("testMail").value = "施工日が確定しました。\n\nよろしくお願いいたします。";
  document.getElementById('test-modal-overlay').style.display = "flex";
}
function closeTestModal(){ document.getElementById('test-modal-overlay').style.display = "none"; }
function switchTestTab(tab){
  document.querySelectorAll(".test-content").forEach(el=>el.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  document.querySelectorAll(".test-tab button").forEach(el=>el.classList.remove("active"));
  document.getElementById("tab-"+tab+"-btn").classList.add("active");
}
function saveTestMail(){ alert("仮保存OK（テスト）"); }
function sendTestMail(){ 
  const body = document.getElementById("testMail").value;
  location.href = `sms:?body=${encodeURIComponent(body)}`;
}
</script>

</body>
</html>
