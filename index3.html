<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テストモーダル環境</title>

<style>
body{
  font-family:sans-serif;
  padding:20px;
}

/* ===== モーダル ===== */
#test-modal-overlay{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  z-index:99999;
}

#test-modal{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:500px;
  background:#fff;
  border-radius:10px;
  padding:16px;
}

/* タブ */
.test-tab{
  display:flex;
  border-bottom:1px solid #ccc;
  margin-bottom:10px;
}

.test-tab button{
  flex:1;
  padding:8px;
  border:none;
  background:#eee;
  cursor:pointer;
}

.test-tab button.active{
  background:#fff;
  font-weight:bold;
}

/* 中身 */
.test-content{display:none;}
.test-content.active{display:block;}

textarea{
  width:100%;
  min-height:120px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>テスト環境（index3）</h2>

<button onclick="openTestModal()">モーダルテスト</button>

<!-- モーダル -->
<div id="test-modal-overlay"></div>

<script>
// ===== モーダル開く =====
function openTestModal(){

  const html = `
    <div id="test-modal">
      <button onclick="closeTestModal()">閉じる</button>

      <h3>施工管理テスト</h3>

      <div class="test-tab">
        <button onclick="switchTestTab('info')" id="tab-info-btn" class="active">基本</button>
        <button onclick="switchTestTab('mail')" id="tab-mail-btn">メーラー</button>
      </div>

      <div id="tab-info" class="test-content active">
        <label>
          <input type="checkbox" id="testFlag"> 施工日決定
        </label>
      </div>

      <div id="tab-mail" class="test-content">
        <textarea id="testMail"></textarea>
        <br><br>
        <button onclick="saveTestMail()">仮保存</button>
        <button onclick="sendTestMail()">送信</button>
      </div>
    </div>
  `;

  const overlay = document.getElementById("test-modal-overlay");
  overlay.innerHTML = html;
  overlay.style.display = "block";

  document.getElementById("testMail").value = createTemplate();
}

// ===== 閉じる =====
function closeTestModal(){
  document.getElementById("test-modal-overlay").style.display = "none";
}

// ===== タブ切替 =====
function switchTestTab(tab){

  document.querySelectorAll(".test-content")
    .forEach(el=>el.classList.remove("active"));

  document.getElementById("tab-"+tab).classList.add("active");

  document.querySelectorAll(".test-tab button")
    .forEach(el=>el.classList.remove("active"));

  document.getElementById("tab-"+tab+"-btn").classList.add("active");
}

// ===== テンプレ =====
function createTemplate(){
  return `施工日が確定しました。

よろしくお願いいたします。`;
}

// ===== 仮保存（今はダミー） =====
function saveTestMail(){
  alert("仮保存（テスト成功）");
}

// ===== 送信 =====
function sendTestMail(){
  const body = document.getElementById("testMail").value;
  location.href = `sms:?body=${encodeURIComponent(body)}`;
}
</script>

</body>
</html>
