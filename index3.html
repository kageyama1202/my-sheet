<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>開発メニュー（index3）</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
  body {
    font-family: sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding: 20px;
    text-align: center;
  }

  .container {
    max-width: 600px;
    margin: auto;
    background: #fff;
    padding: 25px;
    border-radius: 8px;
  }

  h1 {
    margin-top: 0;
  }

  .input-area {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  input {
    flex: 1;
    padding: 10px;
    font-size: 14px;
  }

  button {
    padding: 10px 15px;
    border: none;
    cursor: pointer;
    border-radius: 4px;
  }

  .add-btn {
    background: #1976d2;
    color: white;
  }

  .menu-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .row {
    display: flex;
    gap: 5px;
  }

  .menu-btn {
    flex: 1;
    display: block;
    padding: 15px;
    background: #007bff;
    color: #fff;
    text-decoration: none;
    border-radius: 5px;
  }

  .del-btn {
    width: 40px;
    background: #d32f2f;
    color: #fff;
  }
</style>
</head>

<body>

<div class="container">
  <h1>🧪 開発メニュー（index3）</h1>

  <!-- 追加エリア -->
  <div class="input-area">
    <input type="text" id="newFileName" placeholder="例: mailer_test.html">
    <button class="add-btn" onclick="addFile()">追加</button>
  </div>

  <!-- メニュー -->
  <div id="menuGrid" class="menu-grid"></div>
</div>

<script>
  // ===== Firebase設定 =====
  const firebaseConfig = {
    apiKey: "AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",
    databaseURL: "https://project-6745138395263517914-default-rtdb.firebaseio.com",
    projectId: "project-6745138395263517914"
  };

  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  let FILES = [];

  // ===== リアルタイム取得 =====
  database.ref("dev_files").on("value", snap => {
    FILES = snap.val() || [];
    renderMenu();
  });

  // ===== 追加 =====
  function addFile(){
    const input = document.getElementById("newFileName");
    const name = input.value.trim();

    if(!name){
      alert("ファイル名を入力して");
      return;
    }

    if(FILES.includes(name)){
      alert("すでにある");
      return;
    }

    FILES.push(name);
    database.ref("dev_files").set(FILES);

    input.value = "";
  }

  // ===== 描画 =====
  function renderMenu(){
    const grid = document.getElementById("menuGrid");
    grid.innerHTML = "";

    FILES.forEach(f => {

      const row = document.createElement("div");
      row.className = "row";

      // 開くボタン
      const a = document.createElement("a");
      a.href = f;
      a.className = "menu-btn";
      a.textContent = "🧪 " + f.replace(".html","");

      // 削除ボタン
      const del = document.createElement("button");
      del.className = "del-btn";
      del.textContent = "×";

      del.onclick = (e) => {
        e.preventDefault();
        if(confirm(f + " を削除する？")){
          FILES = FILES.filter(x => x !== f);
          database.ref("dev_files").set(FILES);
        }
      };

      row.appendChild(a);
      row.appendChild(del);
      grid.appendChild(row);
    });
  }
</script>

</body>
</html>
