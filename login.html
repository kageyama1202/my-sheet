<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ログイン</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .box { width: 100%; max-width: 280px; text-align: center; }
  .box h1 { font-size: 17px; font-weight: 600; margin-bottom: 24px; color: #ccc; }
  #pin {
    width: 100%;
    font-size: 30px;
    letter-spacing: 10px;
    text-align: center;
    background: #1a1a1a;
    border: 1px solid #2e2e2e;
    border-radius: 10px;
    color: #e8e8e8;
    padding: 14px 8px;
    outline: none;
    -webkit-appearance: none;
  }
  #pin:focus { border-color: #4f8ef7; }
  #err { color: #e05c5c; font-size: 13px; margin-top: 10px; min-height: 18px; }
  #go {
    width: 100%;
    margin-top: 16px;
    background: #4f8ef7;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  #go:active { opacity: 0.75; }
  #go:disabled { opacity: 0.5; }
  #checking { font-size: 12px; color: #777; margin-top: 14px; min-height: 16px; }
</style>
</head>
<body>
<div class="box">
  <h1>暗証番号を入力</h1>
  <input type="tel" id="pin" maxlength="8" inputmode="numeric" autocomplete="off" placeholder="••••" autofocus>
  <div id="err"></div>
  <button id="go" onclick="tryLogin()">入る</button>
  <div id="checking"></div>
</div>

<script>
var firebaseConfig={apiKey:"AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",authDomain:"project-6745138395263517914.firebaseapp.com",databaseURL:"https://project-6745138395263517914-default-rtdb.firebaseio.com",projectId:"project-6745138395263517914",storageBucket:"project-6745138395263517914.firebasestorage.app",messagingSenderId:"1054295910908",appId:"1:1054295910908:web:4072df05bd90bbdc896a79"};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

var ISSUE_TOKEN_URL = "https://us-central1-project-6745138395263517914.cloudfunctions.net/issueStaffToken";

// 【修正】以前は localStorage に userKey が残っていれば無条件で次ページへ進んでいた。
// これだと「userKeyは残っているがFirebaseの認証セッション(トークン)だけ切れている」
// 状態を検知できず、全ページでDB書き込みがPERMISSION_DENIEDになる不具合があった。
// → 実際に firebase.auth() が認証済みユーザーを持っているか確認してから遷移する。
if (localStorage.getItem('userKey')) {
  document.getElementById('checking').textContent = 'ログイン状態を確認中...';
}

var authSettled = false;
function decideAuth(hasUser) {
  if (authSettled) return;
  authSettled = true;
  document.getElementById('checking').textContent = '';
  if (hasUser && localStorage.getItem('userKey')) {
    goNext();
  } else if (localStorage.getItem('userKey')) {
    // userKeyは残っているが認証セッションが切れている＝再ログインが必要
    localStorage.removeItem('userKey');
    localStorage.removeItem('userName');
  }
}
firebase.auth().onAuthStateChanged(function (user) { decideAuth(!!user); });
// onAuthStateChangedが万一発火しない場合の保険（2.5秒でPIN入力に切り替える）
setTimeout(function () { decideAuth(!!firebase.auth().currentUser); }, 2500);

document.getElementById('pin').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') tryLogin();
});

function tryLogin() {
  var pin = document.getElementById('pin').value.trim();
  var errEl = document.getElementById('err');
  var btn = document.getElementById('go');
  errEl.textContent = '';
  if (!pin) { errEl.textContent = '暗証番号を入力してください'; return; }

  btn.disabled = true;

  fetch(ISSUE_TOKEN_URL + '?pin=' + encodeURIComponent(pin))
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.status !== 'ok') {
        errEl.textContent = data.message || '暗証番号が違います';
        document.getElementById('pin').value = '';
        document.getElementById('pin').focus();
        btn.disabled = false;
        return;
      }
      return firebase.auth().signInWithCustomToken(data.token).then(function () {
        localStorage.setItem('userKey', data.userKey);
        localStorage.setItem('userName', data.name || data.userKey);
        goNext();
      });
    })
    .catch(function (e) {
      console.error(e);
      errEl.textContent = '通信エラー、もう一度お試しください';
      btn.disabled = false;
    });
}

function goNext() {
  var params = new URLSearchParams(location.search);
  var ret = params.get('return') || 'today.html';
  location.href = ret;
}
</script>
</body>
</html>
