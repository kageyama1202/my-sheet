<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>通信タイムライン</title>

<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5;}
.container{display:flex;height:100vh;}
.left{width:60%;overflow:auto;border-right:1px solid #ccc;padding:10px;}
.right{width:40%;overflow:auto;padding:10px;}

.msg{background:#fff;margin-bottom:8px;padding:8px;border-radius:6px;cursor:pointer;}
.msg.assigned{border-left:4px solid #4caf50;}
.msg.auto{border-left:4px solid #2196f3;}

.case{padding:6px;border-bottom:1px solid #ddd;}
button{margin-top:4px;}
</style>
</head>

<body>

<div class="container">
  <div class="left" id="timeline"></div>
  <div class="right" id="cases"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
/* Firebase */
var firebaseConfig = {
  apiKey: "AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",
  databaseURL: "https://project-6745138395263517914-default-rtdb.firebaseio.com",
  projectId: "project-6745138395263517914"
};
firebase.initializeApp(firebaseConfig);
var database = firebase.database();

/* グローバル */
var allRecords = [];
var allTasks = {};
var phoneToCasesList = {};

/* 電話処理 */
function normalizePhone(p){
  if(!p) return "";
  return p.replace(/[^\d]/g,"").replace(/^81/,"0");
}
function isValidPhone(p){
  return /^\d{10,11}$/.test(p);
}
function extractPhone(text){
  if(!text) return "";
  var m = text.match(/0\d{9,10}/);
  if(m) return m[0];
  m = text.match(/\+81\d{9,10}/);
  if(m) return normalizePhone(m[0]);
  return "";
}

/* データ取得 */
async function fetchData(){
  var comm = await database.ref("app_communications").once("value");
  var tasks = await database.ref("app_tasks").once("value");

  allTasks = tasks.val() || {};
  var data = comm.val() || {};

  for(var k in data){
    var r = data[k];
    r._fbKey = k;
    allRecords.push(r);
  }
}

/* 電話→案件 */
function buildPhoneMap(){
  phoneToCasesList = {};
  for(var k in allTasks){
    var phone = normalizePhone(allTasks[k].csvData[6]);
    if(!isValidPhone(phone)) continue;

    if(!phoneToCasesList[phone]){
      phoneToCasesList[phone]=[];
    }
    phoneToCasesList[phone].push(k);
  }
}

/* 自動紐付け（安全） */
async function autoAssign(){
  var updates = {};
  var count = 0;

  for(var i=0;i<allRecords.length;i++){
    var r = allRecords[i];
    if(r.assignedCase) continue;

    var phone = normalizePhone(r.contact);
    if(!isValidPhone(phone)){
      phone = extractPhone(r.body);
    }
    if(!isValidPhone(phone)) continue;

    var list = phoneToCasesList[phone]||[];

    if(list.length===1){
      var key = list[0];
      r.assignedCase = key;
      updates["app_communications/"+r._fbKey+"/assignedCase"]=key;
      count++;
    }
  }

  if(count>0) await database.ref().update(updates);
  console.log("auto assigned:",count);
}

/* AI */
function buildPrompt(msg,list){
return `
あなたは案件紐付け担当です。
不明なら必ずNONE。

メッセージ:
${msg}

案件:
${list.map((c,i)=>i+1+". "+c).join("\n")}

答え:
番号 or NONE
`;
}

async function callAI(prompt){
  var key = localStorage.getItem("gemini_api_key");

  var res = await fetch(
    "https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key="+key,
    {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        contents:[{parts:[{text:prompt}]}],
        generationConfig:{temperature:0.2}
      })
    }
  );

  var d = await res.json();
  return d.candidates?.[0]?.content?.parts?.[0]?.text || "NONE";
}

async function runAI(rec,cases){
  var prompt = buildPrompt(rec.body||"", cases.map(c=>c.name));
  var r = await callAI(prompt);
  r = r.trim();

  if(r==="NONE") return null;

  var i = parseInt(r)-1;
  if(i>=0 && i<cases.length) return cases[i].key;

  return null;
}

/* UI */
function render(){
  var el = document.getElementById("timeline");
  el.innerHTML="";

  allRecords.sort((a,b)=> (b.dt||"").localeCompare(a.dt||""));

  allRecords.forEach(function(r){
    var d=document.createElement("div");
    d.className="msg";
    if(r.assignedCase) d.classList.add("assigned");

    d.innerHTML=`
      <b>${r.contact||""}</b><br>
      ${r.body||""}<br>
      <small>${r.dt||""}</small>
    `;

    d.onclick=function(){
      showCases(r);
    };

    el.appendChild(d);
  });
}

/* 右 */
function showCases(rec){
  var el=document.getElementById("cases");
  el.innerHTML="";

  var phone = normalizePhone(rec.contact);
  if(!isValidPhone(phone)){
    phone = extractPhone(rec.body);
  }

  var list = phoneToCasesList[phone]||[];

  var cases = list.map(k=>({
    key:k,
    name:allTasks[k].csvData[4]
  }));

  /* AIボタン */
  var btn=document.createElement("button");
  btn.innerText="🤖 AI提案";

  btn.onclick=async function(){
    btn.innerText="判定中...";
    var k = await runAI(rec,cases);
    btn.innerText="🤖 AI提案";

    if(!k){
      alert("AI判定不可");
      return;
    }

    cases.sort(c=>c.key===k?-1:1);
    showCases(rec);
  };

  el.appendChild(btn);

  cases.forEach(function(c){
    var d=document.createElement("div");
    d.className="case";

    d.innerHTML=`
      ${c.name}<br>
      <button onclick="assign('${rec._fbKey}','${c.key}')">✔決定</button>
    `;

    el.appendChild(d);
  });
}

/* 手動 */
function assign(fb,key){
  database.ref("app_communications/"+fb+"/assignedCase").set(key);
  location.reload();
}

/* 初期化 */
async function init(){
  await fetchData();
  buildPhoneMap();
  await autoAssign();
  render();
}

init();
</script>

</body>
</html>
