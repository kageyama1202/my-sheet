<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通信タイムライン（ベース）</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
  body { font-family: sans-serif; background: #1a1d27; color: #e0e0e0; margin: 0; padding: 20px; }
  h2 { color: #fff; border-bottom: 2px solid #2a2d3a; padding-bottom: 10px; }
  .msg-card { background: #1e2130; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #64b5f6; }
  .msg-meta { font-size: 12px; color: #888; margin-bottom: 8px; }
  .msg-contact { font-size: 13px; color: #ccc; margin-bottom: 4px; font-weight: bold; }
  .msg-subject { font-size: 13px; color: #f0c040; margin-bottom: 6px; }
  .msg-body { font-size: 13px; color: #ddd; white-space: pre-wrap; line-height: 1.5; }
  .loading { color: #888; }
</style>
</head>
<body>

<h2>📨 通信タイムライン（直近3ヶ月 / 最新100件）</h2>
<div id="timeline" class="loading">⏳ データを読み込んでいます...</div>

<script>
// 1. Firebaseの初期化
var firebaseConfig = {
  apiKey: "AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",
  databaseURL: "https://project-6745138395263517914-default-rtdb.firebaseio.com",
  projectId: "project-6745138395263517914"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

// 2. 3ヶ月前の日付（ISO文字列）を計算
var d = new Date();
d.setMonth(d.getMonth() - 3);
var threeMonthsAgo = d.toISOString();

// 3. Firebaseから app_communications のうち、3ヶ月以内のデータのみ取得
firebase.database().ref('app_communications')
  .orderByChild('dt')
  .startAt(threeMonthsAgo)
  .once('value')
  .then(function(snapshot) {
    var records = [];
    
    // データを配列に格納
    snapshot.forEach(function(child) {
      records.push(child.val());
    });

    // 4. 新しい順（降順）に並び替え
    records.sort(function(a, b) {
      return new Date(b.dt) - new Date(a.dt);
    });

    // 5. 先行して100件のみ切り出し
    var displayRecords = records.slice(0, 100);

    // 6. 画面に描画
    var html = "";
    if (displayRecords.length === 0) {
      html = "直近3ヶ月のデータがありません。";
    } else {
      displayRecords.forEach(function(rec) {
        var dt = new Date(rec.dt);
        var dateStr = dt.getFullYear() + "/" + (dt.getMonth()+1) + "/" + dt.getDate() + " " + dt.getHours() + ":" + ("0"+dt.getMinutes()).slice(-2);
        var sourceIcon = rec.src === "imessage" ? "💬 SMS" : "📧 Gmail";
        
        html += '<div class="msg-card">';
        html += '<div class="msg-meta">' + sourceIcon + ' | ' + dateStr + '</div>';
        // HTMLタグとして誤認識されないようにエスケープ処理
        html += '<div class="msg-contact">連絡先: ' + (rec.contact || "不明").replace(/</g,"&lt;").replace(/>/g,"&gt;") + '</div>';
        
        if (rec.subject) {
          html += '<div class="msg-subject">件名: ' + rec.subject.replace(/</g,"&lt;").replace(/>/g,"&gt;") + '</div>';
        }
        if (rec.body) {
          html += '<div class="msg-body">' + rec.body.replace(/</g,"&lt;").replace(/>/g,"&gt;") + '</div>';
        }
        html += '</div>';
      });
    }
    document.getElementById('timeline').innerHTML = html;
  })
  .catch(function(error) {
    document.getElementById('timeline').innerHTML = "エラーが発生しました: " + error.message;
  });
</script>

</body>
</html>
