<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通信タイムライン</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;background:#0f1117;color:#e0e0e0;min-height:100vh;}
.header{background:#1a1d27;border-bottom:1px solid #2a2d3a;padding:12px 16px;position:sticky;top:0;z-index:100;}
.header h1{font-size:18px;font-weight:700;color:#fff;margin-bottom:10px;}.header h1 span{color:#64b5f6;}
.stats{font-size:12px;color:#888;margin-bottom:4px;}
.match-summary{font-size:12px;color:#ff9800;margin-bottom:10px;}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid #3a3d4a;background:transparent;color:#aaa;font-size:13px;cursor:pointer;transition:0.2s;}
.filter-btn.active{background:#2563eb;border-color:#2563eb;color:#fff;}
.filter-btn.work-filter.active{background:#e65100;border-color:#e65100;}
.filter-btn.unclass.active{background:#6a1b9a;border-color:#6a1b9a;}
.filter-btn:hover{border-color:#64b5f6;}
.search-box{flex:1;min-width:150px;padding:6px 12px;border-radius:20px;border:1px solid #3a3d4a;background:#12141c;color:#e0e0e0;font-size:13px;outline:none;}
.search-box:focus{border-color:#2563eb;}.search-box::placeholder{color:#666;}
.timeline{max-width:800px;margin:0 auto;padding:12px;}
.date-group{margin-bottom:8px;}
.date-label{position:sticky;top:130px;background:#0f1117;padding:8px 0 4px;font-size:13px;font-weight:600;color:#64b5f6;border-bottom:1px solid #1e2130;margin-bottom:6px;z-index:50;}
.msg-card{background:#1a1d27;border-radius:10px;padding:12px;margin-bottom:6px;border-left:3px solid #333;transition:background 0.15s;}
.msg-card:hover{background:#1f2233;}
.msg-card.imessage{border-left-color:#4caf50;}.msg-card.gmail{border-left-color:#f44336;}
.msg-card.sent{border-left-color:#2196f3;}.msg-card.matched{border-left-color:#ff9800;}
.msg-card.assigned{border-left-color:#64b5f6;}
.msg-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.msg-source{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;}
.msg-source.imessage{background:#1b3a1b;color:#66bb6a;}.msg-source.gmail{background:#3a1b1b;color:#ef5350;}
.msg-dir{font-size:11px;color:#888;}.msg-time{font-size:11px;color:#666;}
.msg-contact{font-size:13px;font-weight:600;color:#ccc;margin-bottom:4px;word-break:break-all;}
.msg-contact a{color:#64b5f6;text-decoration:none;}
.msg-case{display:inline-block;font-size:11px;padding:2px 10px;border-radius:10px;background:#3e2723;color:#ffab40;font-weight:600;margin-bottom:4px;margin-right:4px;}
.msg-case.keyword{background:#1b5e20;color:#a5d6a7;}
.msg-case.manual{background:#0d47a1;color:#82b1ff;}
.msg-email-match{display:inline-block;font-size:11px;padding:2px 10px;border-radius:10px;background:#1a237e;color:#82b1ff;font-weight:600;margin-bottom:4px;}
.msg-case-person{font-size:11px;color:#888;margin-left:6px;}
.msg-subject{font-size:12px;color:#f0c040;margin-bottom:4px;}
.msg-body{font-size:13px;color:#aaa;line-height:1.5;white-space:pre-wrap;word-break:break-word;}
.count-badge{display:inline-block;background:#2a2d3a;color:#aaa;font-size:11px;padding:2px 8px;border-radius:10px;margin-left:6px;}
.no-results{text-align:center;padding:40px;color:#555;}
.loading{text-align:center;padding:60px;color:#666;font-size:14px;}
.back-link{display:inline-block;color:#64b5f6;text-decoration:none;font-size:13px;margin-bottom:4px;}
/* インライン分類 */
.assign-row{margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.assign-sel{padding:4px 8px;border:1px solid #3a3d4a;border-radius:8px;background:#12141c;color:#e0e0e0;font-size:12px;max-width:260px;flex:1;}
.assign-sel:focus{outline:none;border-color:#64b5f6;}
.assign-go{font-size:11px;padding:5px 12px;border-radius:8px;border:none;background:#2e7d32;color:#fff;cursor:pointer;font-weight:bold;}
.assign-go:hover{background:#388e3c;}
.park-btn{font-size:11px;padding:5px 12px;border-radius:8px;border:1px solid #3a3d4a;background:transparent;color:#888;cursor:pointer;}
.park-btn:hover{border-color:#ff9800;color:#ff9800;}
.assign-done{font-size:11px;color:#64b5f6;font-weight:600;}
</style>
</head>
<body>
<div class="header">
<a href="index.html" class="back-link">← トップ</a>
<h1>📨 <span>通信タイムライン</span></h1>
<div class="stats" id="stats">読み込み中...</div>
<div class="match-summary" id="matchSummary"></div>
<div class="filters">
<button class="filter-btn active" data-filter="all">全て</button>
<button class="filter-btn" data-filter="imessage">💬 SMS</button>
<button class="filter-btn" data-filter="gmail">📧 Gmail</button>
<button class="filter-btn" data-filter="sent">↑ 送信</button>
<button class="filter-btn" data-filter="received">↓ 受信</button>
<button class="filter-btn work-filter" data-filter="work">🏗️ 仕事のみ</button>
<button class="filter-btn unclass" data-filter="unclass">❓ 未分類</button>
<input type="text" class="search-box" id="searchBox" placeholder="検索（名前・電話・本文・案件名）">
</div>
</div>
<div class="timeline" id="timeline"><div class="loading">⏳ 読み込み中...</div></div>
<script>
var FB_URL="https://project-6745138395263517914-default-rtdb.firebaseio.com";
var firebaseConfig={apiKey:"AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",databaseURL:FB_URL,projectId:"project-6745138395263517914"};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
var database=firebase.database();
var allRecords=[];
var emailToContact={};
var phoneToContact={};
var caseOptions=[];
var activeFilter="all";
var searchText="";

function np(raw){if(!raw)return"";var s=raw.replace(/[\s\-\(\)\.\u200B\u200C\u200D\uFEFF]/g,"");s=s.replace(/^\+81/,"0");s=s.replace(/^81(?=\d{9,10})/,"0");s=s.replace(/[^0-9]/g,"");return s;}
function ee(f){if(!f)return"";var m=f.match(/<([^>]+)>/);if(m)return m[1].toLowerCase().trim();if(f.indexOf("@")>-1)return f.toLowerCase().trim();return"";}
function ek(csv){var kw=[];var cn=(csv[2]||"");var pts=cn.replace(/【[^】]*】/g," ").replace(/[（()）\[\]]/g," ").split(/[\s\u3000・]+/);for(var i=0;i<pts.length;i++){var p=pts[i].trim();if(p.length>=2&&["手配","新築","工事","リフォーム","様邸","Free"].indexOf(p)===-1)kw.push(p.toLowerCase());}var nm=cn.match(/([^\s【】（）]+?)様/);if(nm&&nm[1].length>=2)kw.push(nm[1].toLowerCase());return kw;}
function sm(body,subj,kw){if(!kw||!kw.length)return 0;var t=((body||"")+" "+(subj||"")).toLowerCase();if(!t.trim())return 0;var s=0;for(var i=0;i<kw.length;i++){if(t.indexOf(kw[i])!==-1)s+=kw[i].length;}return s;}
function pd(rec){try{return new Date(rec.dt);}catch(e){return new Date(0);}}
function dk(d){return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2);}
function ts(d){return("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);}
function dlt(key){var p=key.split("-");var d=new Date(p,p[1]-1,p[3]);var dn=["日","月","火","水","木","金","土"];return p+"/"+parseInt(p[1])+"/"+parseInt(p[3])+" ("+dn[d.getDay()]+")";}

function cd(rec){
if(rec.src==="imessage"){
var phone=rec.contact||"",cl=np(phone),ci=phoneToContact[cl],nl="";
if(ci&&ci.name)nl='<span style="color:#82b1ff">'+ci.name+'</span> <span style="color:#666">'+(ci.company||"")+'</span><br>';
if(cl.length>=10)return nl+'<a href="tel:'+cl+'">'+cl+'</a>';
return nl+phone;
}else{
var email=ee(rec.contact),ci=emailToContact[email];
if(ci&&ci.name)return'<span style="color:#82b1ff">'+ci.name+'</span> <span style="color:#666">'+(ci.company||"")+'</span><br><span style="color:#555;font-size:11px">'+email+'</span>';
var m=rec.contact.match(/"?([^"<]+)"?\s*<([^>]+)>/);
if(m)return m[1].trim()+'<br><span style="color:#555;font-size:11px">'+m[3]+'</span>';
return rec.contact||"";
}
}

function lookupMatch(rec){
// 手動割当済み
if(rec.assignedCase){
for(var i=0;i<caseOptions.length;i++){
if(caseOptions[i].key===rec.assignedCase) return{type:"manual",data:{name:caseOptions[i].name,key:rec.assignedCase}};
}
}

// ① 全文検索による仕分け（送信元の忖度を完全にやめ、本文と件名のみで勝負）
var bestG = 0;
var bestCases = [];
for(var i=0; i<caseOptions.length; i++){
  var sc = sm(rec.body, rec.subject, caseOptions[i].keywords);
  if(sc > 0 && sc > bestG){
    bestG = sc;
    bestCases = [caseOptions[i]];
  } else if(sc > 0 && sc === bestG){
    bestCases.push(caseOptions[i]);
  }
}

// キーワードが1つでもヒットした場合
if(bestG > 0){
  if(bestCases.length === 1){
    return {type:"case", data:bestCases, score:bestG, keyword:true}; // 1案件に特定できたら即紐付け
  } else {
    return {type:"case_ambiguous", data:bestCases, score:bestG}; // 同点で被ったら未分類（AIへ）
  }
}

// キーワードが一切ない短い連絡などは、純粋な未分類として送信元（連絡先）だけ表示
if(rec.src==="imessage"){
var n=np(rec.contact);
if(phoneToContact[n]&&phoneToContact[n].category!=="その他")return{type:"contact",data:phoneToContact[n]};
}
if(rec.src==="gmail"){
var email=ee(rec.contact);
if(emailToContact[email]){var c=emailToContact[email];if(c.category!=="その他")return{type:"contact",data:c};}
}
return null;
}

function needsClassify(rec){
if(!rec._match)return true;
if(rec._match.type==="case_ambiguous" || rec._match.type==="contact")return true;
return false;
}

function matchesFilter(rec){
if(activeFilter==="imessage"&&rec.src!=="imessage")return false;
if(activeFilter==="gmail"&&rec.src!=="gmail")return false;
if(activeFilter==="sent"&&rec.dir!=="sent")return false;
if(activeFilter==="received"&&rec.dir!=="received")return false;
if(activeFilter==="work"&&(!rec._match || rec._match.type==="contact" || rec._match.type==="case_ambiguous"))return false;
if(activeFilter==="unclass"&&!needsClassify(rec))return false;
if(searchText){
var s=searchText.toLowerCase();
var hay=((rec.contact||"")+" "+(rec.subject||"")+" "+(rec.body||"")).toLowerCase();
if(rec._match){
if(rec._match.type==="case"||rec._match.type==="manual")hay+=" "+(rec._match.data.name||"");
else if(rec._match.type==="contact")hay+=" "+(rec._match.data.name||"")+" "+(rec._match.data.company||"");
else if(rec._match.type==="case_ambiguous")for(var i=0;i<rec._match.data.length;i++)hay+=" "+(rec._match.data[i].name||"");
}
if(hay.indexOf(s)===-1)return false;
}
return true;
}

function assignCase(fbIdx,caseKey,caseName,btn){
database.ref('app_communications/'+fbIdx+'/assignedCase').set(caseKey);
allRecords[fbIdx].assignedCase=caseKey;
allRecords[fbIdx]._match={type:"manual",data:{name:caseName,key:caseKey}};
var row=btn.closest('.assign-row');
row.innerHTML='<span class="assign-done">✔ '+caseName+' に指定済み</span>';
}

function parkMail(rec,btn){
var entry={src:rec.src,contact:rec.contact||"",subject:rec.subject||"",body:(rec.body||"").substring(0,500),ts:rec.dt,dir:rec.dir||""};
database.ref('app_parked_mails').push(entry);
btn.textContent="✔ 仮置き済";btn.style.color="#66bb6a";btn.disabled=true;
}

function buildCaseSelect(fbIdx){
var h='<select class="assign-sel" id="sel-'+fbIdx+'"><option value="">案件を選択...</option>';
for(var i=0;i<caseOptions.length;i++)h+='<option value="'+caseOptions[i].key+'">'+caseOptions[i].name+'</option>';
h+='</select>';
return h;
}

function render(){
var filtered=[];
for(var i=0;i<allRecords.length;i++){if(matchesFilter(allRecords[i]))filtered.push(allRecords[i]);}
var imC=0,gmC=0;for(var i=0;i<filtered.length;i++){if(filtered[i].src==="imessage")imC++;else gmC++;}
document.getElementById("stats").textContent="表示: "+filtered.length+"件（SMS "+imC+" / Gmail "+gmC+"）/ 全"+allRecords.length+"件";
var totalM=0,kwM=0,ambi=0,manual=0,unclass=0;
for(var i=0;i<allRecords.length;i++){
var m=allRecords[i]._match;
if(m){if(m.type==="case"||m.type==="manual")totalM++;if(m.type==="case"&&m.keyword)kwM++;if(m.type==="case_ambiguous")ambi++;if(m.type==="manual")manual++;}
if(needsClassify(allRecords[i]))unclass++;
}
document.getElementById("matchSummary").textContent="🔗 確定紐付:"+totalM+"（KW:"+kwM+" 手動:"+manual+"） ❓未分類/候補複数:"+unclass;
if(!filtered.length){document.getElementById("timeline").innerHTML='<div class="no-results">該当なし</div>';return;}
var groups={},go=[];
for(var i=0;i<filtered.length;i++){var k=filtered[i]._dateKey;if(!groups[k]){groups[k]=[];go.push(k);}groups[k].push(filtered[i]);}
var html="";
for(var g=0;g<go.length;g++){
var k=go[g],msgs=groups[k];
html+='<div class="date-group"><div class="date-label">'+dlt(k)+'<span class="count-badge">'+msgs.length+'件</span></div>';
for(var m=0;m<msgs.length;m++){
var rec=msgs[m];
var cc="msg-card "+rec.src;
if(rec.dir==="sent")cc+=" sent";
if(rec._match){if(rec._match.type==="manual")cc+=" assigned";else if(rec._match.type==="case") cc+=" matched";}
html+='<div class="'+cc+'">';
html+='<div class="msg-top"><div>';
html+='<span class="msg-source '+rec.src+'">'+(rec.src==="imessage"?"💬 SMS":"📧 Gmail")+'</span>';
if(rec.dir)html+=' <span class="msg-dir">'+(rec.dir==="sent"?"↑送信":"↓受信")+'</span>';
html+='</div><span class="msg-time">'+rec._timeStr+'</span></div>';
if(rec._match){
if(rec._match.type==="case"){
var kwc=rec._match.keyword?" keyword":"";
html+='<div><span class="msg-case'+kwc+'">🏗️ '+rec._match.data.name+'</span>';
if(rec._match.keyword)html+='<span style="font-size:9px;color:#a5d6a7;">★</span>';
if(rec._match.data.person)html+='<span class="msg-case-person">'+rec._match.data.person+'</span>';
html+='</div>';
}else if(rec._match.type==="manual"){
html+='<div><span class="msg-case manual">✔ '+rec._match.data.name+'</span></div>';
}else if(rec._match.type==="case_ambiguous"){
html+='<div>';
for(var ci=0;ci<Math.min(rec._match.data.length,3);ci++)html+='<span class="msg-case">❓ '+rec._match.data[ci].name+'</span>';
if(rec._match.data.length>3)html+='<span style="font-size:10px;color:#888;">他'+(rec._match.data.length-3)+'件</span>';
html+='</div>';
}else if(rec._match.type==="contact"){
html+='<div><span class="msg-email-match">👤 '+rec._match.data.name+'</span>';
if(rec._match.data.company)html+='<span class="msg-case-person">'+rec._match.data.company+'</span>';
html+='</div>';
}
}
html+='<div class="msg-contact">'+cd(rec)+'</div>';
if(rec.subject)html+='<div class="msg-subject">📋 '+rec.subject+'</div>';
if(rec.body){var bt=rec.body.replace(/</g,"&lt;").replace(/>/g,"&gt;");html+='<div class="msg-body">'+bt+'</div>';}
// 未分類 → インライン分類UI
if(needsClassify(rec)){
html+='<div class="assign-row" data-fbidx="'+rec._fbIdx+'">';
html+=buildCaseSelect(rec._fbIdx);
html+='<button class="assign-go" data-fbidx="'+rec._fbIdx+'">✔ 指定</button>';
html+='<button class="park-btn" data-fbidx="'+rec._fbIdx+'">📬 仮置き</button>';
html+='</div>';
}
html+='</div>';
}
html+='</div>';
}
document.getElementById("timeline").innerHTML=html;

// イベント
document.querySelectorAll('.assign-go').forEach(function(btn){
btn.addEventListener('click',function(){
var idx=parseInt(this.dataset.fbidx);
var sel=document.getElementById('sel-'+idx);
if(!sel||!sel.value){alert('案件を選択してください');return;}
var caseName=sel.options[sel.selectedIndex].text;
assignCase(idx,sel.value,caseName,this);
});
});
document.querySelectorAll('.park-btn').forEach(function(btn){
btn.addEventListener('click',function(){
var idx=parseInt(this.dataset.fbidx);
if(allRecords[idx])parkMail(allRecords[idx],this);
});
});
}

document.querySelectorAll(".filter-btn").forEach(function(b){b.addEventListener("click",function(){
activeFilter=this.getAttribute("data-filter");
document.querySelectorAll(".filter-btn").forEach(function(x){x.classList.remove("active");});
this.classList.add("active");render();
});});

var stm=null;
document.getElementById("searchBox").addEventListener("input",function(){clearTimeout(stm);var v=this.value;stm=setTimeout(function(){searchText=v;render();},300);});

var loadState={tasks:false,contacts:false,comms:false};
function tryRender(){if(!loadState.tasks||!loadState.contacts||!loadState.comms)return;for(var i=0;i<allRecords.length;i++){allRecords[i]._match=lookupMatch(allRecords[i]);}render();}

fetch(FB_URL+"/app_tasks.json").then(function(r){return r.json();}).then(function(data){
if(data){
var keys=Object.keys(data);
for(var i=0;i<keys.length;i++){
var t=data[keys[i]];if(!t.csvData)continue;
var cn=t.csvData[2]||"",sk=t.csvData[3]||"";
if(cn)caseOptions.push({key:keys[i],name:cn,sekou:sk,keywords:ek(t.csvData),person:t.csvData[4]||""}); // 担当者絞り込み用の配列生成を完全に排除
}
caseOptions.sort(function(a,b){return(b.sekou||"").localeCompare(a.sekou||"");});
}
loadState.tasks=true;tryRender();
}).catch(function(e){console.error(e);loadState.tasks=true;tryRender();});

fetch(FB_URL+"/app_contacts.json").then(function(r){return r.json();}).then(function(data){
if(data){var arr=Array.isArray(data)?data:Object.values(data);for(var i=0;i<arr.length;i++){
if(!arr[i])continue;var c=arr[i],em=(c.email||"").toLowerCase().trim(),ph=np(c.phone||"");
var info={name:c.name||"",company:c.company||"",category:c.category||""};
if(em&&!emailToContact[em])emailToContact[em]=info;if(ph.length>=10&&!phoneToContact[ph])phoneToContact[ph]=info;
}}loadState.contacts=true;tryRender();
}).catch(function(e){console.error(e);loadState.contacts=true;tryRender();});

fetch(FB_URL+"/app_communications.json").then(function(r){return r.json();}).then(function(data){
if(!data){document.getElementById("timeline").innerHTML='<div class="no-results">データなし</div>';return;}
var arr=Array.isArray(data)?data:Object.values(data);
for(var i=0;i<arr.length;i++){
if(!arr[i])continue;var rec=arr[i];var d=pd(rec);
rec._dateKey=dk(d);rec._timeStr=ts(d);rec._sortKey=d.getTime();rec._fbIdx=i;
allRecords.push(rec);
}
allRecords.sort(function(a,b){return b._sortKey-a._sortKey;});
loadState.comms=true;tryRender();
}).catch(function(e){document.getElementById("timeline").innerHTML='<div class="no-results">エラー: '+e.message+'</div>';});
</script>
</body>
</html>
