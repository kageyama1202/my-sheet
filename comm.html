<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通信タイムライン（ゼロベース・ダイレクトマッチ）</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
  body { font-family: sans-serif; background: #1a1d27; color: #e0e0e0; margin: 0; padding: 20px; text-align: left; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #2a2d3a; padding-bottom: 10px; margin-bottom: 20px; }
  h2 { margin: 0; color: #fff; font-size: 18px; }
  
  /* メッセージカード（1行で左右に並べる） */
  .msg-row { display: flex; background: #1e2130; margin-bottom: 15px; border-radius: 8px; border-left: 4px solid #64b5f6; overflow: hidden; }
  .msg-row.hidden-item { opacity: 0.4; border-left-color: #555; background: #12141c; }
  
  /* 左側：メッセージ内容 */
  .msg-left { flex: 1; padding: 15px; border-right: 1px solid #2a2d3a; min-width: 0; }
  .msg-meta { font-size: 11px; color: #888; margin-bottom: 6px; }
  .badge-assigned { display: inline-block; font-size: 10px; padding: 2px 6px; background: #2e7d32; color: #fff; border-radius: 4px; margin-bottom: 6px; }
  .msg-contact { font-size: 13px; color: #ccc; margin-bottom: 4px; font-weight: bold; word-break: break-all; }
  .msg-subject { font-size: 13px; color: #f0c040; margin-bottom: 6px; word-break: break-all; }
  .msg-body { font-size: 12px; color: #ddd; white-space: pre-wrap; line-height: 1.4; word-break: break-word; max-height: 120px; overflow-y: auto; }
  
  /* 右側：紐付け候補と操作パネル */
  .msg-right { flex: 1; padding: 15px; background: #161822; display: flex; flex-direction: column; justify-content: space-between; }
  .candidate-title { font-size: 12px; color: #64b5f6; margin-bottom: 8px; font-weight: bold; }
  .candidate-list { max-height: 120px; overflow-y: auto; margin-bottom: 10px; }
  .candidate-item { display: block; background: #2a2d3a; padding: 8px; border-radius: 4px; margin-bottom: 4px; cursor: pointer; font-size: 13px; border: 1px solid transparent; }
  .candidate-item:hover { border-color: #64b5f6; }
  .candidate-item input { margin-right: 6px; }
  .reason { font-size: 10px; color: #888; margin-left: 20px; }
  
  /* ボタン類 */
  .action-buttons { display: flex; gap: 10px; }
  .btn-assign { background: #1a73e8; color: #fff; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; flex: 1; }
  .btn-hide { background: #3a3d4a; color: #ccc; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .btn-restore { background: #2e7d32; color: #fff; }
  
  @media (max-width: 768px) {
    .msg-row { flex-direction: column; }
    .msg-left { border-right: none; border-bottom: 1px solid #2a2d3a; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <h2>📨 通信タイムライン（案件ダイレクトマッチ）</h2>
  <label style="cursor: pointer; font-size: 13px; background: #2a2d3a; padding: 6px 12px; border-radius: 6px;">
    <input type="checkbox" id="showHiddenCheck"> 👀 非表示も見る
  </label>
</div>

<div id="timeline" style="color: #888; text-align: center; padding: 40px 0;">⏳ データを読み込んでいます...</div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",
  databaseURL: "https://project-6745138395263517914-default-rtdb.firebaseio.com",
  projectId: "project-6745138395263517914"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
var database = firebase.database();

// 1. ユーティリティ関数（ゼロベースで整理）
// 電話番号の正規化（+81対応を確実に）
function normalizePhone(raw) {
  if (!raw) return "";
  var s = String(raw).replace(/[^\d+]/g, ""); // 数字と+以外を削除
  s = s.replace(/^\+?81/, "0"); // +81 または 81 を 0 に変換
  return s;
}

// メールアドレスの抽出
function extractEmail(f) {
  if (!f) return "";
  var m = String(f).match(/<([^>]+)>/);
  if (m && m[1]) return m[1].toLowerCase().trim();
  if (String(f).indexOf("@") > -1) return String(f).toLowerCase().trim();
  return "";
}

// 案件名から推測用キーワードを抽出
function getKeywords(nameStr) {
  var kw = [];
  var cn = String(nameStr || "");
  var pts = cn.replace(/【[^】]*】/g, " ").replace(/[（()）\[\]]/g, " ").split(/[\s\u3000・]+/);
  for (var i = 0; i < pts.length; i++) {
    var p = pts[i].trim();
    if (p.length >= 2 && ["手配","新築","工事","リフォーム","様邸","Free"].indexOf(p) === -1) {
      kw.push(p.toLowerCase());
    }
  }
  var nm = cn.match(/([^\s【】（）]+?)様/);
  if (nm && nm[1] && nm[1].length >= 2) kw.push(nm[1].toLowerCase());
  return kw;
}

// キーワードが含まれているか点数化
function getScore(body, subj, kw) {
  if (!kw || !kw.length) return 0;
  var text = (String(body || "") + " " + String(subj || "")).toLowerCase();
  if (!text.trim()) return 0;
  var score = 0;
  for (var i = 0; i < kw.length; i++) {
    if (kw[i] && text.indexOf(kw[i]) !== -1) score += kw[i].length;
  }
  return score;
}

// データ保持用
var allComms = [];
var caseOptions = [];
var phoneToCases = {};

// 直近3ヶ月のデータを取得
var d = new Date(); d.setMonth(d.getMonth() - 3);
var threeMonthsAgo = d.toISOString();

// ★ 連絡先(app_contacts)の読み込みを完全に廃止しました
Promise.all([
  fetch("https://project-6745138395263517914-default-rtdb.firebaseio.com/app_tasks.json").then(r=>r.json()),
  database.ref('app_communications').orderByChild('dt').startAt(threeMonthsAgo).once('value').then(s => {
    var res = {}; s.forEach(c => { res[c.key] = c.val(); }); return res;
  })
]).then(function([tasks, comms]){
  
  // 案件リストの構築
  if(tasks){
    Object.keys(tasks).forEach(function(k){
      var t = tasks[k]; if(!t.csvData) return;
      var caseName = t.csvData[2] || "名称不明"; // インデックス4：案件名
      var phone = normalizePhone(t.csvData[3] || ""); // インデックス6：電話番号
      var keywords = getKeywords(caseName);
      
      var caseObj = { key: k, name: caseName, phone: phone, keywords: keywords };
      caseOptions.push(caseObj);
      
      if(phone.length >= 10){
        if(!phoneToCases[phone]) phoneToCases[phone] = [];
        phoneToCases[phone].push(caseObj);
      }
    });
  }
  
  // 通信データの構築
  if(comms){
    Object.keys(comms).forEach(function(k){
      var rec = comms[k]; 
      
      // Gmailのノイズ（メアドなし）カット
      if(rec.src === "gmail" && !extractEmail(rec.contact)) return;
      
      rec._key = k;
      allComms.push(rec);
    });
    // 新しい順に並び替え
    allComms.sort(function(a,b){ return new Date(b.dt) - new Date(a.dt); });
  }
  
  renderTimeline();

}).catch(function(e){
  document.getElementById('timeline').innerHTML = "エラーが発生しました: " + e.message;
});

// 2. 画面描画
function renderTimeline() {
  var showHidden = document.getElementById('showHiddenCheck').checked;
  var html = "";
  var displayCount = 0;
  
  allComms.forEach(function(rec) {
    if (displayCount >= 100) return; // 最新100件制限
    var isHidden = rec.isHidden === true;
    if (isHidden && !showHidden) return;
    
    var dt = new Date(rec.dt);
    var dateStr = dt.getFullYear() + "/" + (dt.getMonth()+1) + "/" + dt.getDate() + " " + ("0"+dt.getHours()).slice(-2) + ":" + ("0"+dt.getMinutes()).slice(-2);
    var sourceIcon = rec.src === "imessage" ? "💬 SMS" : "📧 Gmail";
    var rowClass = isHidden ? "msg-row hidden-item" : "msg-row";
    
    html += '<div class="' + rowClass + '">';
    
    // 【左側】メッセージ内容
    html += '<div class="msg-left">';
    if (rec.assignedCase) {
      var foundCase = caseOptions.find(function(c){ return c.key === rec.assignedCase; });
      var assignedName = foundCase ? foundCase.name : "指定済み案件";
      html += '<div class="badge-assigned">✔ ' + assignedName + '</div><br>';
    }
    html += '<div class="msg-meta">' + sourceIcon + ' | ' + dateStr + '</div>';
    html += '<div class="msg-contact">連絡先: ' + (rec.contact || "不明").replace(/</g,"&lt;") + '</div>';
    if (rec.subject) html += '<div class="msg-subject">件名: ' + rec.subject.replace(/</g,"&lt;") + '</div>';
    if (rec.body) html += '<div class="msg-body">' + rec.body.replace(/</g,"&lt;") + '</div>';
    html += '</div>';
    
    // 【右側】ゼロベースの紐付け候補リスト
    html += '<div class="msg-right">';
    html += '<div>';
    html += '<div class="candidate-title">🎯 紐付け候補</div>';
    html += '<div class="candidate-list">';
    
    var candidates = [];
    
    // ★ダイレクトマッチ判定★
    if (rec.src === "imessage") {
      // SMSは電話番号で完全一致を狙う
      var ph = normalizePhone(rec.contact);
      if (phoneToCases[ph]) {
        candidates = phoneToCases[ph].map(function(c) { return { case: c, score: 999, reason: '📞 電話番号一致' }; });
      }
    } 
    
    // SMSで電話番号が一致しなかった場合、またはGmailの場合はキーワードで直接判定
    if (candidates.length === 0) {
      caseOptions.forEach(function(c) {
        var score = getScore(rec.body, rec.subject, c.keywords);
        if (score > 0) {
          candidates.push({ case: c, score: score, reason: '📝 案件名一致 (スコア:'+score+')' });
        }
      });
      // スコアが高い順にソート
      candidates.sort(function(a,b){ return b.score - a.score; });
    }
    
    if (candidates.length > 0) {
      // 上位5件だけ表示
      candidates.slice(0, 5).forEach(function(cand, idx) {
        var isChecked = (rec.assignedCase === cand.case.key) ? "checked" : (!rec.assignedCase && idx === 0 ? "checked" : "");
        html += '<label class="candidate-item">';
        html += '<input type="radio" name="radio_' + rec._key + '" value="' + cand.case.key + '" ' + isChecked + '>';
        html += '<strong>' + cand.case.name + '</strong>';
        html += '<div class="reason">' + cand.reason + '</div>';
        html += '</label>';
      });
    } else {
      html += '<div style="color:#aaa; font-size:12px;">該当しそうな案件が見つかりません。</div>';
    }
    html += '</div></div>';
    
    // 操作ボタン
    html += '<div class="action-buttons">';
    if (candidates.length > 0) {
      html += '<button class="btn-assign" onclick="assignCase(\'' + rec._key + '\')">✔ この案件に紐付ける</button>';
    }
    if (isHidden) {
      html += '<button class="btn-hide btn-restore" onclick="toggleHide(\'' + rec._key + '\', false)">👁️ 戻す</button>';
    } else {
      html += '<button class="btn-hide" onclick="toggleHide(\'' + rec._key + '\', true)">✖ 隠す</button>';
    }
    html += '</div>';
    
    html += '</div>'; // end msg-right
    html += '</div>'; // end msg-row
    displayCount++;
  });
  
  if (displayCount === 0) html = "表示する通信がありません。";
  document.getElementById('timeline').innerHTML = html;
}

// 3. 紐付け保存
window.assignCase = function(key) {
  var radios = document.getElementsByName('radio_' + key);
  var selectedKey = null;
  for (var i = 0; i < radios.length; i++) { 
    if (radios[i].checked) { selectedKey = radios[i].value; break; } 
  }
  if (!selectedKey) { alert("案件を選択してください。"); return; }
  
  database.ref('app_communications/' + key + '/assignedCase').set(selectedKey).then(function() {
    var rec = allComms.find(function(r) { return r._key === key; });
    if(rec) rec.assignedCase = selectedKey;
    renderTimeline();
  });
};

// 4. 非表示切替
window.toggleHide = function(key, hideFlag) {
  database.ref('app_communications/' + key + '/isHidden').set(hideFlag).then(function() {
    var rec = allComms.find(function(r) { return r._key === key; });
    if (rec) rec.isHidden = hideFlag;
    renderTimeline();
  });
};

document.getElementById('showHiddenCheck').addEventListener('change', renderTimeline);

</script>
</body>
</html>
