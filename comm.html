<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通信タイムライン</title>

<!-- Firebaseの読み込み -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    margin: 0;
    padding: 20px;
}
.back-link {
    display: inline-block;
    color: #64b5f6;
    text-decoration: none;
    font-size: 14px;
    margin-bottom: 12px;
}
h1 {
    font-size: 20px;
    margin-bottom: 20px;
}
.msg-card {
    background: #1a1d27;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
    border-left: 4px solid #333;
}
.msg-card.imessage { border-left-color: #4caf50; }
.msg-card.gmail { border-left-color: #f44336; }
.msg-header {
    font-size: 12px;
    color: #888;
    margin-bottom: 6px;
}
.msg-contact {
    font-weight: bold;
    color: #ccc;
    margin-bottom: 6px;
    font-size: 14px;
}
.msg-body {
    font-size: 13px;
    color: #aaa;
    white-space: pre-wrap;
    word-break: break-word;
}
.loading { color: #666; }
</style>
</head>
<body>

<a href="index.html" class="back-link">← トップ</a>
<h1>📨 通信タイムライン</h1>

<div id="timeline">
    <div class="loading">⏳ 読み込み中...</div>
</div>

<script>
var FB_URL = "https://project-6745138395263517914-default-rtdb.firebaseio.com";
var firebaseConfig = {
    apiKey: "AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",
    databaseURL: FB_URL,
    projectId: "project-6745138395263517914"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

// アドレス抽出関数
function extractEmail(f) {
    if (!f) return "";
    var m = f.match(/<([^>]+)>/);
    if (m) return m[4].toLowerCase().trim();
    if (f.indexOf("@") > -1) return f.toLowerCase().trim();
    return "";
}

// 連絡先データと通信データを同時に取得する
Promise.all([
    fetch(FB_URL + "/app_contacts.json").then(function(r){ return r.json(); }),
    fetch(FB_URL + "/app_communications.json").then(function(r){ return r.json(); })
]).then(function(results) {
    
    // ★前回のミス部分：ここでと[4]を指定していなかったためバグが起きていました
    var contactsData = results; // 1つ目の結果（連絡先）
    var commsData = results[4];    // 2つ目の結果（通信データ）
    
    var timelineEl = document.getElementById("timeline");
    
    if (!commsData) {
        timelineEl.innerHTML = '<div>データがありません</div>';
        return;
    }

    // 1. 登録済みメールアドレスの辞書を作成
    var registeredEmails = {};
    if (contactsData) {
        var cArr = Array.isArray(contactsData) ? contactsData : Object.values(contactsData);
        for (var i = 0; i < cArr.length; i++) {
            if (!cArr[i]) continue;
            var em = (cArr[i].email || "").toLowerCase().trim();
            if (em) {
                registeredEmails[em] = true; 
            }
        }
    }

    // 2. 通信データのフィルタリングと整形
    var allRecords = [];
    var arr = Array.isArray(commsData) ? commsData : Object.values(commsData);

    for (var i = 0; i < arr.length; i++) {
        if (!arr[i]) continue;
        var rec = arr[i];
        
        // Gmailの場合、登録済みメアド辞書になければスキップ（カット）
        if (rec.src === "gmail") {
            var email = extractEmail(rec.contact);
            if (!registeredEmails[email]) {
                continue; 
            }
        }
        
        // 日時のパース
        var dt = new Date(0);
        try { if(rec.dt) dt = new Date(rec.dt); } catch(e) {}
        rec._sortKey = dt.getTime();
        
        var y = dt.getFullYear();
        var m = ("0" + (dt.getMonth() + 1)).slice(-2);
        var d = ("0" + dt.getDate()).slice(-2);
        var h = ("0" + dt.getHours()).slice(-2);
        var min = ("0" + dt.getMinutes()).slice(-2);
        rec._timeStr = y + "/" + m + "/" + d + " " + h + ":" + min;

        allRecords.push(rec);
    }

    // 時系列で降順ソート（新しい順）
    allRecords.sort(function(a, b) {
        return b._sortKey - a._sortKey;
    });

    // 3. HTML文字列の組み立てと描画
    var html = "";
    for (var i = 0; i < allRecords.length; i++) {
        var rec = allRecords[i];
        var srcType = rec.src === "imessage" ? "💬 SMS" : "📧 Gmail";
        var dirStr = rec.dir === "sent" ? "↑送信" : "↓受信";
        var cssClass = rec.src === "imessage" ? "imessage" : "gmail";

        html += '<div class="msg-card ' + cssClass + '">';
        html += '<div class="msg-header">' + srcType + ' | ' + dirStr + ' | ' + rec._timeStr + '</div>';
        html += '<div class="msg-contact">' + (rec.contact || "宛先不明") + '</div>';
        
        if (rec.subject) {
            html += '<div style="font-weight:bold; color:#f0c040; margin-bottom: 4px; font-size: 13px;">件名: ' + rec.subject + '</div>';
        }
        if (rec.body) {
            var bodyText = rec.body.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            html += '<div class="msg-body">' + bodyText + '</div>';
        }
        
        html += '</div>';
    }

    if(html === "") html = '<div>表示できる通信履歴がありません（全てカットされました）</div>';
    timelineEl.innerHTML = html;

}).catch(function(error) {
    document.getElementById("timeline").innerHTML = '<div style="color:red;">エラー: ' + error.message + '</div>';
});
</script>
</body>
</html>
