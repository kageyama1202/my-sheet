<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>通信タイムライン</title>

<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5;}
.container{display:flex;height:100vh;}
.left{width:60%;overflow:auto;border-right:1px solid #ccc;padding:10px;}
.right{width:40%;overflow:auto;padding:10px;}

.msg{background:#fff;margin-bottom:8px;padding:8px;border-radius:6px;cursor:pointer;}
.msg.assigned{border-left:4px solid #4caf50;}
.msg.auto{border-left:4px solid #2196f3;}

.case{padding:6px;border-bottom:1px solid #ddd;}
</style>
</head>

<body>

<div class="container">
  <div class="left" id="timeline"></div>
  <div class="right" id="cases"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
/* ===============================
   Firebase設定
=============================== */
var firebaseConfig = {
  apiKey: "AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",
  databaseURL: "https://project-6745138395263517914-default-rtdb.firebaseio.com",
  projectId: "project-6745138395263517914"
};
firebase.initializeApp(firebaseConfig);
var database = firebase.database();

/* ===============================
   グローバル
=============================== */
var allRecords = [];
var allTasks = {};
var phoneToCasesList = {};
var fbKeyMap = {};

/* ===============================
   電話番号正規化（超重要）
=============================== */
function normalizePhone(phone){
  if(!phone) return "";
  return phone.replace(/[^\d]/g, "").replace(/^81/, "0");
}

/* ===============================
   データ取得
=============================== */
async function fetchData(){
  var commSnap = await database.ref("app_communications").once("value");
  var taskSnap = await database.ref("app_tasks").once("value");

  var commData = commSnap.val() || {};
  var taskData = taskSnap.val() || {};

  allTasks = taskData;

  var i = 0;
  for(var key in commData){
    var rec = commData[key];
    rec._fbKey = key;
    allRecords.push(rec);
    fbKeyMap[i++] = key;
  }
}

/* ===============================
   電話→案件マップ作成
=============================== */
function buildPhoneMap(){
  phoneToCasesList = {};

  for(var key in allTasks){
    var task = allTasks[key];
    var phone = normalizePhone(task.csvData[6]);

    if(!phone) continue;

    if(!phoneToCasesList[phone]){
      phoneToCasesList[phone] = [];
    }
    phoneToCasesList[phone].push(key);
  }
}

/* ===============================
   🔥 自動紐付け（安全版）
=============================== */
async function autoAssignCases(){
  var updates = {};

  for(var i=0; i<allRecords.length; i++){
    var rec = allRecords[i];

    if(rec.assignedCase) continue;

    var phone = normalizePhone(rec.contact);
    if(!phone) continue;

    var candidates = phoneToCasesList[phone] || [];

    // ★1件だけなら確定
    if(candidates.length === 1){
      var caseKey = candidates[0];

      rec.assignedCase = caseKey;

      if(rec._fbKey){
        updates["app_communications/" + rec._fbKey + "/assignedCase"] = caseKey;
      }
    }
  }

  if(Object.keys(updates).length > 0){
    await database.ref().update(updates);
    console.log("auto assigned:", Object.keys(updates).length);
  }
}

/* ===============================
   UI描画
=============================== */
function renderTimeline(){
  var el = document.getElementById("timeline");
  el.innerHTML = "";

  allRecords.sort((a,b)=> (b.dt||"").localeCompare(a.dt||""));

  allRecords.forEach(function(rec, idx){
    var div = document.createElement("div");
    div.className = "msg";

    if(rec.assignedCase) div.classList.add("assigned");

    var phone = normalizePhone(rec.contact);
    var candidates = phoneToCasesList[phone] || [];

    if(!rec.assignedCase && candidates.length === 1){
      div.classList.add("auto");
    }

    div.innerHTML = `
      <div><b>${rec.contact || ""}</b></div>
      <div>${rec.body || ""}</div>
      <div style="font-size:12px;color:#666">${rec.dt || ""}</div>
    `;

    div.onclick = function(){
      showCases(phone, rec);
    };

    el.appendChild(div);
  });
}

/* ===============================
   右パネル
=============================== */
function showCases(phone, rec){
  var el = document.getElementById("cases");
  el.innerHTML = "";

  var list = phoneToCasesList[phone] || [];

  list.forEach(function(caseKey){
    var task = allTasks[caseKey];

    var div = document.createElement("div");
    div.className = "case";

    div.innerHTML = `
      <div>${task.csvData[4]}</div>
      <button onclick="assign('${rec._fbKey}','${caseKey}')">割当</button>
    `;

    el.appendChild(div);
  });
}

/* ===============================
   手動割当
=============================== */
function assign(fbKey, caseKey){
  database.ref("app_communications/" + fbKey + "/assignedCase").set(caseKey);
  location.reload();
}

/* ===============================
   初期化
=============================== */
async function init(){
  await fetchData();
  buildPhoneMap();

  // 🔥 ここで自動紐付け
  await autoAssignCases();

  renderTimeline();
}

init();

</script>

</body>
</html>
