<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現調・下見 受付</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; min-height: 100vh; }
a { color: #7ab3ef; }
.header { background: #16213e; padding: 12px 16px; border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 16px; font-weight: 600; }
.nav-link { font-size: 12px; color: #7ab3ef; text-decoration: none; padding: 4px 10px; border: 1px solid #2a4a7a; border-radius: 4px; margin-left: 4px; }
.main { padding: 16px; max-width: 1200px; margin: 0 auto; }
.sec-title { font-size: 11px; font-weight: 600; color: #888; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 10px; }
.manual-box { background: #16213e; border: 1px solid #2a2a4a; border-radius: 8px; padding: 14px 16px; margin-bottom: 20px; }
.form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
.fg { display: flex; flex-direction: column; gap: 4px; }
.fg label { font-size: 11px; color: #888; }
.fg input, .fg select { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 4px; color: #e0e0e0; padding: 6px 10px; font-size: 13px; font-family: inherit; }
.fg input:focus, .fg select:focus { outline: none; border-color: #4a7ab5; }
.btn-primary { padding: 7px 16px; border-radius: 5px; border: none; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500; background: #2a5fa5; color: #fff; }
.btn-primary:hover { background: #3a6fb5; }
.btn-scan { background: #2a3a6a; color: #a0b8e0; border: 1px solid #3a4a7a; font-size: 11px; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-family: inherit; }
.btn-scan:hover { background: #3a4a7a; }
.btn-approve { background: #1a6a3a; color: #8de8b0; border: 1px solid #2a7a4a; font-size: 11px; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-family: inherit; }
.btn-approve:hover { background: #2a7a4a; }
.btn-del { background: none; color: #c07070; border: 1px solid #5a2a2a; font-size: 11px; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
.btn-del:hover { background: #3a1a1a; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }
.card-list { display: flex; flex-direction: column; gap: 8px; }
.cand-card { background: #16213e; border: 1px solid #2a2a4a; border-radius: 6px; padding: 10px 12px; }
.cand-card.sel { border-color: #2a6a4a; background: #162e24; }
.card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.card-check { width: 15px; height: 15px; accent-color: #2a8a5a; cursor: pointer; }
.card-date { font-size: 15px; font-weight: 600; color: #f0d080; }
.card-kw { font-size: 11px; color: #aaa; }
.badge { font-size: 10px; padding: 2px 7px; border-radius: 3px; font-weight: 500; margin-left: auto; }
.b-im { background: #3a2a6a; color: #b0a0e8; }
.b-gm { background: #2a3a6a; color: #8ab0e8; }
.b-mn { background: #2a4a2a; color: #80c880; }
.snippet { font-size: 11px; color: #888; line-height: 1.5; padding: 4px 6px; background: #1a1a2e; border-radius: 3px; border-left: 2px solid #2a2a4a; margin-bottom: 6px; word-break: break-all; }
.snippet .kw { color: #f0c060; font-weight: 500; }
.card-bottom { display: flex; align-items: center; gap: 6px; }
.card-contact { font-size: 10px; color: #555; }
.conf-bar { display: flex; gap: 2px; margin-left: auto; }
.conf-dot { width: 5px; height: 5px; border-radius: 50%; background: #2a2a4a; }
.conf-dot.on { background: #f0c060; }
.draft-card { background: #162e20; border: 1px solid #2a5a3a; border-radius: 6px; padding: 10px 12px; }
.draft-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
.draft-date { font-size: 15px; font-weight: 600; color: #6ee090; }
.draft-time { font-size: 12px; color: #aaa; }
.draft-memo { font-size: 11px; color: #888; margin-top: 4px; word-break: break-all; }
.scan-st { font-size: 12px; color: #666; }
.scan-st.run { color: #f0c060; }
.scan-st.done { color: #6ee090; }
.empty { font-size: 12px; color: #444; padding: 20px; text-align: center; }
.bulk-bar { display: none; background: #1a3a2a; border: 1px solid #2a5a3a; border-radius: 6px; padding: 8px 12px; margin-bottom: 10px; align-items: center; gap: 10px; font-size: 12px; color: #8de8b0; }
.bulk-bar.show { display: flex; }
</style>
</head>
<body>
<div class="header">
  <h1>現調・下見 受付</h1>
  <span id="badge" style="font-size:12px;color:#888"></span>
  <span style="margin-left:auto">
    <a href="today.html" class="nav-link">← 今日の行動</a>
    <a href="index.html" class="nav-link">案件一覧</a>
  </span>
</div>
<div class="main">
  <div class="sec-title">手動入力（電話など）</div>
  <div class="manual-box">
    <div class="form-row">
      <div class="fg"><label>日付</label><input type="date" id="m-date" style="width:148px"></div>
      <div class="fg"><label>時刻（任意）</label><input type="time" id="m-time" style="width:108px"></div>
      <div class="fg"><label>種別</label>
        <select id="m-type" style="width:110px">
          <option value="現調">現調</option>
          <option value="下見">下見</option>
          <option value="事前確認">事前確認</option>
        </select>
      </div>
      <div class="fg" style="flex:1;min-width:180px"><label>メモ</label>
        <input type="text" id="m-memo" placeholder="相手名・内容など" style="width:100%">
      </div>
      <button class="btn-primary" onclick="addManual()" style="align-self:flex-end">追加</button>
    </div>
  </div>
  <div class="two-col">
    <div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span class="sec-title" style="margin:0">自動抽出候補</span>
        <button class="btn-scan" onclick="runScan()">再スキャン</button>
        <span class="scan-st" id="scan-st"></span>
      </div>
      <div class="bulk-bar" id="bulk-bar">
        <span id="bulk-cnt"></span>
        <button class="btn-approve" onclick="bulkApprove()">まとめて承認</button>
      </div>
      <div class="card-list" id="candidates">
        <div class="empty">スキャンボタンで iMessage / Gmail を解析します</div>
      </div>
    </div>
    <div>
      <div class="sec-title">承認済み（行動に追加）</div>
      <div class="card-list" id="drafts">
        <div class="empty">承認済みの予定はありません</div>
      </div>
    </div>
  </div>
</div>
<script>
var firebaseConfig = { databaseURL: "https://project-6745138395263517914-default-rtdb.firebaseio.com" };
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
var db = firebase.database();

var KW_HIT  = ['現調', '下見', '事前確認', '採寸', '現場確認'];
var KW_SKIP = ['施工完了', '工事完了', '引渡', '完了報告', '建込', '建て込'];

function findKw(t) {
  for (var i = 0; i < KW_HIT.length; i++) { if (t.indexOf(KW_HIT[i]) !== -1) return KW_HIT[i]; }
  return null;
}
function hasSkip(t) {
  for (var i = 0; i < KW_SKIP.length; i++) { if (t.indexOf(KW_SKIP[i]) !== -1) return true; }
  return false;
}
function zp(n) { return ('0' + parseInt(n)).slice(-2); }
function trunc(t, n) {
  if (!t) return '';
  t = ('' + t).replace(/\s+/g, ' ').trim();
  return t.length > n ? t.slice(0, n) + '...' : t;
}
function hlKw(t) {
  var s = t;
  for (var i = 0; i < KW_HIT.length; i++) {
    s = s.split(KW_HIT[i]).join('<span class="kw">' + KW_HIT[i] + '</span>');
  }
  return s;
}

function extractDates(text) {
  var res = [], seen = {}, m, d;
  var yr = new Date().getFullYear();
  var r1 = /(20\d{2})[\/\-](\d{1,2})[\/\-](\d{1,2})/g;
  while ((m = r1.exec(text)) !== null) {
    d = m[1] + '-' + zp(m[2]) + '-' + zp(m[3]);
    if (!seen[d]) { seen[d] = 1; res.push({ date: d, conf: 0.9 }); }
  }
  var r2 = /R(\d{1,2})[\/年](\d{1,2})[\/月](\d{1,2})日?/g;
  while ((m = r2.exec(text)) !== null) {
    d = (2018 + parseInt(m[1])) + '-' + zp(m[2]) + '-' + zp(m[3]);
    if (!seen[d]) { seen[d] = 1; res.push({ date: d, conf: 0.85 }); }
  }
  var r3 = /(\d{1,2})月(\d{1,2})日\s*[（(]?[月火水木金土日]/g;
  while ((m = r3.exec(text)) !== null) {
    d = yr + '-' + zp(m[1]) + '-' + zp(m[2]);
    if (!seen[d]) { seen[d] = 1; res.push({ date: d, conf: 0.85 }); }
  }
  var r4 = /(\d{1,2})\/(\d{1,2})(?![\/\d])/g;
  while ((m = r4.exec(text)) !== null) {
    var mo = parseInt(m[1]), dy = parseInt(m[2]);
    if (mo >= 1 && mo <= 12 && dy >= 1 && dy <= 31) {
      d = yr + '-' + zp(m[1]) + '-' + zp(m[2]);
      if (!seen[d]) { seen[d] = 1; res.push({ date: d, conf: 0.6 }); }
    }
  }
  return res;
}

var scanned = [];

function runScan() {
  var st = document.getElementById('scan-st');
  st.className = 'scan-st run';
  st.textContent = 'スキャン中...';
  scanned = [];
  db.ref('app_communications').once('value').then(function(snap) {
    var data = snap.val();
    if (data) {
      var keys = Object.keys(data);
      for (var i = 0; i < keys.length; i++) {
        var msg = data[keys[i]];
        if (!msg || typeof msg !== 'object') continue;
        var text = ((msg.body || '') + ' ' + (msg.subject || '')).trim();
        if (!text) continue;
        if (hasSkip(text)) continue;
        var kw = findKw(text);
        if (!kw) continue;
        var dates = extractDates(text);
        if (dates.length === 0) continue;
        var src = (msg.src || 'imessage').toLowerCase();
        for (var di = 0; di < dates.length; di++) {
          scanned.push({
            date: dates[di].date, conf: dates[di].conf,
            keyword: kw, source: src,
            contact: msg.contact || '', dt: msg.dt || '',
            snippet: trunc(text, 90), checked: false
          });
        }
      }
    }
    var dedup = {};
    scanned = scanned.filter(function(c) {
      var k = c.date + '_' + c.contact;
      if (dedup[k]) return false;
      dedup[k] = true;
      return true;
    });
    scanned.sort(function(a, b) { return a.date > b.date ? 1 : -1; });
    st.className = 'scan-st done';
    st.textContent = scanned.length + '件の候補を検出';
    renderCandidates();
  }).catch(function(e) {
    st.className = 'scan-st';
    st.textContent = 'エラー: ' + e.message;
  });
}

function renderCandidates() {
  var el = document.getElementById('candidates');
  if (scanned.length === 0) {
    el.innerHTML = '<div class="empty">候補は見つかりませんでした</div>';
    updateBulkBar(); return;
  }
  var html = '';
  for (var i = 0; i < scanned.length; i++) {
    var c = scanned[i];
    var isIm = c.source === 'imessage' || c.source.indexOf('message') !== -1;
    var sc = isIm ? 'b-im' : 'b-gm';
    var sl = isIm ? 'iMessage' : 'Gmail';
    var dots = '';
    for (var d = 0; d < 5; d++) {
      dots += '<div class="conf-dot' + (d < Math.round(c.conf * 5) ? ' on' : '') + '"></div>';
    }
    html += '<div class="cand-card" id="cc' + i + '">' +
      '<div class="card-top">' +
        '<input type="checkbox" class="card-check" onchange="onCheck(' + i + ',this.checked)">' +
        '<span class="card-date">' + c.date + '</span>' +
        '<span class="card-kw">' + c.keyword + '</span>' +
        '<span class="badge ' + sc + '">' + sl + '</span>' +
      '</div>' +
      '<div class="snippet">' + hlKw(c.snippet) + '</div>' +
      '<div class="card-bottom">' +
        '<span class="card-contact">' + c.contact + '</span>' +
        '<div class="conf-bar">' + dots + '</div>' +
        '<button class="btn-approve" onclick="approveSingle(' + i + ')">承認 →</button>' +
      '</div></div>';
  }
  el.innerHTML = html;
  updateBulkBar();
}

function onCheck(i, checked) {
  if (scanned[i]) scanned[i].checked = checked;
  var el = document.getElementById('cc' + i);
  if (el) el.className = 'cand-card' + (checked ? ' sel' : '');
  updateBulkBar();
}
function updateBulkBar() {
  var cnt = 0;
  for (var i = 0; i < scanned.length; i++) { if (scanned[i] && scanned[i].checked) cnt++; }
  var bar = document.getElementById('bulk-bar');
  if (cnt > 0) { bar.className = 'bulk-bar show'; document.getElementById('bulk-cnt').textContent = cnt + '件選択中'; }
  else { bar.className = 'bulk-bar'; }
}
function approveSingle(i) {
  if (!scanned[i]) return;
  writeDraft(scanned[i]);
  scanned.splice(i, 1);
  renderCandidates();
  document.getElementById('scan-st').textContent = scanned.length + '件の候補';
}
function bulkApprove() {
  var ok = [];
  for (var i = 0; i < scanned.length; i++) { if (scanned[i] && scanned[i].checked) ok.push(scanned[i]); }
  for (var j = 0; j < ok.length; j++) writeDraft(ok[j]);
  scanned = scanned.filter(function(c) { return !c.checked; });
  renderCandidates();
  document.getElementById('bulk-bar').className = 'bulk-bar';
}
function writeDraft(item) {
  db.ref('draft_visits').push({
    date: item.date, time: item.time || '',
    memo: item.snippet || '', source: item.source,
    keyword: item.keyword, contact: item.contact || '',
    status: 'draft', createdAt: Date.now()
  });
}
function addManual() {
  var date = document.getElementById('m-date').value;
  if (!date) { alert('日付を入力してください'); return; }
  db.ref('draft_visits').push({
    date: date,
    time: document.getElementById('m-time').value,
    memo: document.getElementById('m-memo').value,
    source: 'manual',
    keyword: document.getElementById('m-type').value,
    contact: '', status: 'draft', createdAt: Date.now()
  }).then(function() {
    document.getElementById('m-date').value = '';
    document.getElementById('m-time').value = '';
    document.getElementById('m-memo').value = '';
  });
}
function loadDrafts() {
  db.ref('draft_visits').orderByChild('date').on('value', function(snap) {
    var data = snap.val();
    var el = document.getElementById('drafts');
    if (!data) { el.innerHTML = '<div class="empty">承認済みの予定はありません</div>'; return; }
    var keys = Object.keys(data).sort(function(a, b) { return data[a].date > data[b].date ? 1 : -1; });
    var html = '';
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i], v = data[k];
      var isIm = (v.source || '') === 'imessage' || (v.source || '').indexOf('message') !== -1;
      var isMn = v.source === 'manual';
      var sc = isMn ? 'b-mn' : isIm ? 'b-im' : 'b-gm';
      var sl = isMn ? '手動' : isIm ? 'iMessage' : 'Gmail';
      html += '<div class="draft-card">' +
        '<div class="draft-top">' +
          '<span class="draft-date">' + v.date + '</span>' +
          (v.time ? '<span class="draft-time">' + v.time + '</span>' : '') +
          '<span class="badge ' + sc + '">' + sl + '</span>' +
          '<span style="font-size:10px;color:#666;margin-left:4px">' + (v.keyword || '') + '</span>' +
          '<button class="btn-del" style="margin-left:auto" onclick="delDraft(\'' + k + '\')">削除</button>' +
        '</div>' +
        (v.memo ? '<div class="draft-memo">' + trunc(v.memo, 100) + '</div>' : '') +
        (v.contact ? '<div style="font-size:10px;color:#444;margin-top:3px">' + v.contact + '</div>' : '') +
      '</div>';
    }
    el.innerHTML = html;
    document.getElementById('badge').textContent = keys.length + '件の行動予定';
  });
}
function delDraft(k) {
  if (!confirm('削除しますか？')) return;
  db.ref('draft_visits/' + k).remove();
}
loadDrafts();
</script>
</body>
</html>
