<!DOCTYPE html>
<!-- VERSION: 2026-05-20 -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>7日間 行動カレンダー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<link rel="stylesheet" href="shared-modal.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic Pro','Meiryo',sans-serif;background:#1a1f2e;color:#e0e6f0;min-height:100vh;}
.header{background:#111827;border-bottom:2px solid #2d6a4f;padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.header a{color:#52b788;text-decoration:none;font-size:13px;font-weight:bold;}
.header h2{font-size:16px;color:#d8f3dc;flex:1;}
.week-nav{padding:8px 12px;background:#0d1117;border-bottom:1px solid #222;display:flex;align-items:center;gap:8px;position:sticky;top:45px;z-index:49;}
.week-btn{background:#1f2937;color:#9ca3af;border:1px solid #374151;padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:bold;}
.week-btn:hover{background:#374151;color:#e0e6f0;}
.week-btn:disabled{opacity:0.3;cursor:not-allowed;}
.week-btn.save-btn{background:#1b4332;color:#d8f3dc;border-color:#2d6a4f;margin-left:4px;}
.week-btn.save-btn:hover{background:#2d6a4f;}
.save-notice{position:fixed;bottom:16px;right:16px;background:#2d6a4f;color:#d8f3dc;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:bold;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:9999;}
.save-notice.show{opacity:1;}
.week-label{font-size:12px;color:#74c69d;font-weight:bold;flex:1;text-align:center;}
.week-count{font-size:11px;color:#6b7280;background:#1f2937;padding:2px 8px;border-radius:10px;}
.cal-wrap{overflow-x:auto;padding:10px 10px 24px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;min-width:560px;}
.cal-col{background:#111827;border-radius:8px;overflow:hidden;border:1px solid #1f2937;display:flex;flex-direction:column;min-height:100px;}
.cal-col-header{padding:7px 6px 5px;text-align:center;font-size:12px;font-weight:bold;line-height:1.4;}
.cal-col-header.today{background:#1b4332;color:#d8f3dc;border-bottom:2px solid #52b788;}
.cal-col-header.weekday{background:#161f30;color:#a8c8f8;border-bottom:2px solid #2a3a5a;}
.cal-col-header.weekend{background:#1e1212;color:#9ca3af;border-bottom:2px solid #3a2020;}
.cal-col-header.past{background:#111;color:#555;border-bottom:1px solid #222;}
.cal-col-header .date-num{font-size:16px;font-weight:bold;display:block;}
.cal-col-header .dow-label{font-size:10px;opacity:0.8;}
.cal-col-header .count-badge{display:inline-block;font-size:9px;background:rgba(255,255,255,0.12);padding:0 5px;border-radius:8px;margin-top:2px;}
.cal-col-body{flex:1;padding:4px;}
.cal-card{background:#1a2232;border-radius:5px;padding:5px 6px;margin-bottom:4px;cursor:pointer;border-left:3px solid #52b788;transition:background 0.15s;}
.cal-card:hover{background:#1f2d42;}
.cal-card:last-child{margin-bottom:0;}
.cal-card.type-reform{border-left-color:#4a90d9;}
.cal-card.type-newbuild{border-left-color:#f59e0b;}
.cal-card.type-alert{border-left-color:#ef4444;background:#1f1008;}
.cal-card.type-alert:hover{background:#2a1510;}
.cal-card.type-personal{border-left-color:#a78bfa;background:#1a1230;}
.cal-card.type-personal:hover{background:#221540;}
.cal-card.no-click{cursor:default;}
.cal-card.past-card{opacity:0.5;}
.card-badge{display:inline-block;font-size:9px;padding:1px 4px;border-radius:3px;font-weight:bold;white-space:nowrap;margin-bottom:3px;}
.badge-reform{background:#1e3a5f;color:#93c5fd;}
.badge-newbuild{background:#2d2a1a;color:#fbbf24;}
.badge-newbuild-alert{background:#7c2d12;color:#fed7aa;}
.badge-personal{background:#2d1b4e;color:#c4b5fd;}
.badge-sk-alert{background:#4c0519;color:#fda4af;}
.card-time{font-size:10px;color:#ffd166;font-weight:bold;margin-bottom:2px;}
.card-title{font-size:11px;font-weight:bold;color:#e0e6f0;line-height:1.3;word-break:break-all;}
.card-sub{font-size:10px;color:#6b7280;margin-top:2px;line-height:1.4;}
.card-sub .addr{color:#52b788;}
.card-sub .reason{color:#fb923c;}
.card-sub .sekou{color:#9ca3af;}
.empty-col{color:#4b5563;font-size:11px;text-align:center;padding:16px 4px;font-style:italic;}
.loading{text-align:center;padding:40px;color:#52b788;font-size:14px;}
</style>
</head>
<body>
<div id="modal-overlay"><div id="modal-content"><button id="modal-close">✖ 閉じる</button><div id="modal-body"></div></div></div>
<div class="header">
  <a href="index.html">◀ トップ</a>
  <h2>📅 行動カレンダー</h2>
</div>
<div class="week-nav">
  <button class="week-btn" id="btnPrev" onclick="changeWeek(-1)">◀ 前週</button>
  <div class="week-label" id="weekLabel">-</div>
  <span class="week-count" id="weekCount">-</span>
  <button class="week-btn" id="btnNext" onclick="changeWeek(1)">次週 ▶</button>
  <button class="week-btn save-btn" id="saveBtn" onclick="saveToFirebase()">💾 保存</button>
</div>
<div class="save-notice" id="saveNotice">✓ Firebase保存完了</div>
<div id="mainContent"><div class="loading">読み込み中...</div></div>

<script src="shared-modal.js"></script>
<script>
var firebaseConfig={
  apiKey:"AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",
  authDomain:"project-6745138395263517914.firebaseapp.com",
  databaseURL:"https://project-6745138395263517914-default-rtdb.firebaseio.com",
  projectId:"project-6745138395263517914",
  storageBucket:"project-6745138395263517914.firebasestorage.app",
  messagingSenderId:"1054295910908",
  appId:"1:1054295910908:web:4072df05bd90bbdc896a79"
};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
var db=firebase.database();

function getSafeVal(c,i){if(!c)return"";if(Array.isArray(c))return c.length>i&&c[i]!=null?String(c[i]):"";if(typeof c==='object')return c[i]!=null?String(c[i]):"";return"";}
function formatYMD(ds){if(!ds)return"";var d=String(ds).replace(/\s+/g,"").replace(/\//g,"-").replace(/\./g,"-");var p=d.split("-");if(p.length===3)return p[0]+"-"+String(p[1]).padStart(2,'0')+"-"+String(p[2]).padStart(2,'0');return d;}
function getTodayStr(){var t=new Date();return new Date(t.getTime()+9*3600000).toISOString().slice(0,10);}
function addDays(s,n){var d=new Date(s+"T00:00:00+09:00");d.setDate(d.getDate()+n);return new Date(d.getTime()+9*3600000).toISOString().slice(0,10);}
function getDow(ymd){return new Date(ymd+"T00:00:00+09:00").getDay();}
function getMondayOf(ymd){var dow=getDow(ymd);var diff=dow===0?-6:1-dow;return addDays(ymd,diff);}
function shortAddr(addr){if(!addr)return'';var a=addr.replace(/\s+/g,'').replace(/^北海道/,'').replace(/^札幌市/,'');var m=a.match(/(.{0,4}区.{0,12})/);return m?m[1]:a.substring(0,16);}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

var todayStr=getTodayStr();
var globalTasks={};
var globalHeaders=[];
var fullData=null;
var personalEvents={};
var weekOffset=0; // -1=先週, 0=今週, 1=来週
var baseMonday=getMondayOf(todayStr);

function getWeekStart(){return addDays(baseMonday,weekOffset*7);}
function getWeekEnd(){return addDays(getWeekStart(),6);}

try{
  var ls=localStorage.getItem('appData');
  if(ls){
    fullData=JSON.parse(ls);
    if(fullData&&fullData.app_tasks)globalTasks=fullData.app_tasks;
    if(fullData&&fullData.app_meta)globalHeaders=fullData.app_meta.headers||[];
  }
}catch(e){console.error(e);}

db.ref('personal_calendar').once('value').then(function(snap){
  personalEvents=snap.val()||{};
  render();
}).catch(function(e){render();});

// 全案件を日付付きで抽出（週フィルタなし）
// アラート案件は逆算日をそのまま date に入れる
function extractAllItems(){
  var items=[];

  Object.keys(globalTasks).forEach(function(key){
    var obj=globalTasks[key];
    var c=obj.csvData;
    if(!c)return;

    var kubun=getSafeVal(c,3).replace(/\s+/g,'');
    var title=getSafeVal(c,4);
    var company=getSafeVal(c,5);
    var addr=getSafeVal(c,11);
    var sekouDate=formatYMD(getSafeVal(c,2))||formatYMD(getSafeVal(c,14));

    var csvShitamiDate=formatYMD(getSafeVal(c,15));
    var csvShitamiTime=getSafeVal(c,16);
    var fbShitamiDate=obj.date?String(obj.date).replace(/\s+/g,''):'';
    var fbShitamiTime=obj.time?String(obj.time).replace(/\s+/g,''):'';

    var shitamiDate=csvShitamiDate||fbShitamiDate;
    var shitamiTime=csvShitamiTime||fbShitamiTime;

    var isReform=(kubun==='ﾘ');
    var isSK=title&&title.indexOf('SK')!==-1;

    var sfStatus=getSafeVal(c,1).replace(/\s+/g,'');
    var localStatus=obj.local_status?String(obj.local_status).replace(/\s+/g,''):'';
    var status=localStatus||sfStatus;

    var SKIP=['施工完了','報告書提出済','施工日連絡済'];
    for(var si=0;si<SKIP.length;si++){if(status===SKIP[si])return;}
    if(status==='下見完了')return;
    if(status==='下見実施中'&&csvShitamiDate&&csvShitamiDate<todayStr)return;
    if(status==='下見日程確定'&&csvShitamiDate&&csvShitamiDate<todayStr)return;

    // ① 下見日確定（CSV or Firebase）→ その日付に置く
    if(shitamiDate){
      var srcLabel=csvShitamiDate?'CSV確定':(fbShitamiDate?'アプリ入力':'');
      items.push({
        id:'task_'+key,
        type:isReform?'reform':'newbuild',
        date:shitamiDate,
        time:shitamiTime,
        title:title,company:company,addr:addr,
        reason:'下見'+(srcLabel?'('+srcLabel+')':''),
        sekouDate:sekouDate,
        key:key
      });
      return;
    }

    // ② 新築のみ：施工日から逆算した日付に置く（diffチェックなし）
    if(!isReform&&sekouDate){
      // 施工日が過去なら除外
      if(sekouDate<todayStr)return;

      if(isSK){
        // SK：施工10日前
        var skAlertDate=addDays(sekouDate,-10);
        items.push({
          id:'alert_'+key,type:'alert',
          date:skAlertDate,
          time:'',
          title:title,company:company,addr:addr,
          reason:'⚠ SK再訪問',
          sekouDate:sekouDate,key:key
        });
      }else{
        // 新築：施工21日前
        var alertDate=addDays(sekouDate,-21);
        items.push({
          id:'alert_'+key,type:'alert',
          date:alertDate,
          time:'',
          title:title,company:company,addr:addr,
          reason:'⚠ 訪問必要',
          sekouDate:sekouDate,key:key
        });
      }
    }
  });

  // ③ 個人カレンダー
  Object.keys(personalEvents).forEach(function(dateKey){
    var dayEvs=personalEvents[dateKey];
    if(!dayEvs)return;
    Object.keys(dayEvs).forEach(function(evId){
      var ev=dayEvs[evId];
      var timeStr='';
      if(!ev.allDay&&ev.start&&ev.start.length>10)timeStr=ev.start.substring(11,16);
      items.push({
        id:'cal_'+evId,type:'personal',date:dateKey,time:timeStr,
        title:ev.title||'(タイトルなし)',company:'',
        addr:ev.location||'',
        reason:'マイカレンダー',sekouDate:'',key:null
      });
    });
  });

  return items;
}

function changeWeek(dir){
  var newOffset=weekOffset+dir;
  if(newOffset<-1||newOffset>1)return;
  weekOffset=newOffset;
  render();
}

var allItems=[];

function render(){
  if(Object.keys(globalTasks).length===0&&Object.keys(personalEvents).length===0){
    document.getElementById('mainContent').innerHTML='<div class="loading" style="color:#ef4444;">⚠ データなし。トップに戻って最新データを取得してください。</div>';
    return;
  }

  // 全件抽出（毎回再計算）
  allItems=extractAllItems();

  var weekStart=getWeekStart();
  var weekEnd=getWeekEnd();

  // ナビ更新
  var dowNames=['日','月','火','水','木','金','土'];
  var wLabel=weekOffset===0?'今週':weekOffset===-1?'先週':'来週';
  document.getElementById('weekLabel').textContent=
    wLabel+' '+weekStart.replace(/^\d{4}-/,'')+'〜'+weekEnd.replace(/^\d{4}-/,'');
  document.getElementById('btnPrev').disabled=(weekOffset<=-1);
  document.getElementById('btnNext').disabled=(weekOffset>=1);

  // この週だけフィルタ
  var weekItems=allItems.filter(function(item){
    return item.date>=weekStart&&item.date<=weekEnd;
  });

  // ソート
  weekItems.sort(function(a,b){
    if(!a.time&&!b.time)return 0;
    if(!a.time)return 1;
    if(!b.time)return -1;
    return a.time.localeCompare(b.time);
  });

  document.getElementById('weekCount').textContent=weekItems.length+'件';

  var byDate={};
  weekItems.forEach(function(item){
    if(!byDate[item.date])byDate[item.date]=[];
    byDate[item.date].push(item);
  });

  var days=[];
  for(var i=0;i<7;i++)days.push(addDays(weekStart,i));

  var html='<div class="cal-wrap"><div class="cal-grid">';

  days.forEach(function(dateStr){
    var dayItems=byDate[dateStr]||[];
    var isToday=(dateStr===todayStr);
    var isPast=(dateStr<todayStr);
    var dow=getDow(dateStr);
    var isWkend=(dow===0||dow===6);
    var dayNum=dateStr.replace(/^\d{4}-\d{2}-/,'');
    var monthNum=dateStr.replace(/^\d{4}-/,'').replace(/-\d{2}$/,'');
    var headerCls=isPast?'past':isToday?'today':isWkend?'weekend':'weekday';
    var dowColor=dow===0?'color:#ef4444':dow===6?'color:#60a5fa':'';

    html+='<div class="cal-col">';
    html+='<div class="cal-col-header '+headerCls+'">';
    html+='<span class="date-num" style="'+dowColor+'">'+monthNum+'/'+dayNum+'</span>';
    html+='<span class="dow-label" style="'+dowColor+'">'+dowNames[dow]+(isToday?' 今日':'')+'</span>';
    if(dayItems.length>0)html+='<span class="count-badge">'+dayItems.length+'件</span>';
    html+='</div>';

    html+='<div class="cal-col-body">';
    if(dayItems.length===0){
      html+='<div class="empty-col">-</div>';
    }else{
      dayItems.forEach(function(item){
        var isPastCard=(item.date<todayStr);
        var cardCls='cal-card type-'+item.type+(item.key?'':' no-click')+(isPastCard?' past-card':'');
        var badgeCls='card-badge ';
        var badgeTxt='';
        if(item.type==='reform'){badgeCls+='badge-reform';badgeTxt='ﾘ 下見';}
        else if(item.type==='newbuild'){badgeCls+='badge-newbuild';badgeTxt='新 下見';}
        else if(item.type==='alert'&&item.title&&item.title.indexOf('SK')!==-1){badgeCls+='badge-sk-alert';badgeTxt='新SK ⚠';}
        else if(item.type==='alert'){badgeCls+='badge-newbuild-alert';badgeTxt='新 ⚠';}
        else{badgeCls+='badge-personal';badgeTxt='📅';}

        var clickAttr=item.key?'onclick="openModal(\''+escHtml(item.key)+'\')"':'';

        html+='<div class="'+cardCls+'" '+clickAttr+'>';
        html+='<span class="'+badgeCls+'">'+badgeTxt+'</span>';
        if(item.time)html+='<div class="card-time">🕐 '+escHtml(item.time)+'</div>';
        html+='<div class="card-title">'+escHtml(item.title)+'</div>';
        html+='<div class="card-sub">';
        if(item.reason)html+='<span class="reason">'+escHtml(item.reason)+'</span><br>';
        if(item.sekouDate)html+='<span class="sekou">施工:'+escHtml(item.sekouDate.replace(/^\d{4}-/,''))+'</span><br>';
        if(item.addr)html+='<span class="addr">📍'+escHtml(shortAddr(item.addr))+'</span>';
        html+='</div>';
        html+='</div>';
      });
    }
    html+='</div></div>';
  });

  html+='</div></div>';
  document.getElementById('mainContent').innerHTML=html;
}

function openModal(key){
  if(!key||!globalTasks[key])return;
  openCaseModal(key,globalTasks[key],globalHeaders,globalTasks,fullData,db,function(){});
}

function saveToFirebase(){
  var btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='保存中...';
  var saveData={
    updated:new Date().toISOString(),
    items:allItems
  };
  db.ref('app_action_7day').set(saveData).then(function(){
    var notice=document.getElementById('saveNotice');
    notice.classList.add('show');
    setTimeout(function(){notice.classList.remove('show');},2500);
    btn.disabled=false;btn.textContent='💾 保存';
  }).catch(function(e){
    alert('保存失敗: '+e.message);
    btn.disabled=false;btn.textContent='💾 保存';
  });
}
</script>
</body>
</html>
