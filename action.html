<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>今日のアクション</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <link rel="stylesheet" href="shared-modal.css">
  <style>
    *{box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;padding:0;margin:0;background:#1a1d27;color:#e0e0e0;font-size:13px;}

    .header-bar{background:#12141c;padding:10px 16px;border-bottom:1px solid #2a2d3a;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
    .top-link{text-decoration:none;font-weight:bold;color:#64b5f6;font-size:13px;}
    .header-bar h3{margin:0;font-size:17px;color:#fff;font-weight:700;}
    .header-bar h3 span{color:#ff6b6b;}
    .date-display{margin-left:auto;font-size:13px;font-weight:bold;color:#888;}

    /* タブ */
    .tab-bar{display:flex;background:#12141c;border-bottom:2px solid #2a2d3a;position:sticky;top:44px;z-index:99;}
    .tab-btn{flex:1;padding:10px 0;text-align:center;font-size:14px;font-weight:700;cursor:pointer;color:#666;border-bottom:3px solid transparent;transition:0.2s;}
    .tab-btn:hover{color:#aaa;}
    .tab-btn.active{color:#fff;border-bottom-color:#ff6b6b;}
    .tab-btn .tab-count{font-size:12px;padding:1px 8px;border-radius:10px;margin-left:4px;background:#2a2d3a;color:#888;}
    .tab-btn.active .tab-count{background:#ff6b6b;color:#fff;}
    .tab-content{display:none;padding:0;}
    .tab-content.active{display:block;}

    /* サマリー */
    .summary-bar{padding:10px 16px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid #2a2d3a;}
    .summary-chip{padding:4px 10px;border-radius:16px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px;}
    .summary-chip .num{font-size:15px;}
    .chip-red{background:#4a1c1c;color:#ff6b6b;}
    .chip-orange{background:#4a2e1c;color:#ffab40;}
    .chip-purple{background:#3a1c4a;color:#ce93d8;}
    .chip-blue{background:#1c2e4a;color:#64b5f6;}
    .chip-green{background:#1c4a2e;color:#66bb6a;}
    .chip-total{background:#2a2d3a;color:#fff;margin-left:auto;}

    .dashboard{max-width:1000px;margin:0 auto;padding:12px;}

    .section{background:#1e2130;border-radius:10px;margin-bottom:12px;overflow:hidden;border:1px solid #2a2d3a;}
    .section-header{padding:10px 16px;font-size:14px;font-weight:bold;color:#fff;display:flex;align-items:center;gap:8px;justify-content:space-between;cursor:pointer;transition:0.2s;}
    .section-header:hover{filter:brightness(1.1);}
    .section-header .sub{font-size:11px;font-weight:normal;opacity:0.7;}
    .section-header .count{background:rgba(255,255,255,0.15);padding:2px 10px;border-radius:12px;font-size:12px;}
    .section-body{padding:0;}
    .bg-red{background:#c62828;}.bg-orange{background:#e65100;}.bg-purple{background:#6a1b9a;}.bg-blue{background:#1565c0;}.bg-green{background:#2e7d32;}

    .action-item{padding:10px 16px;border-bottom:1px solid #252838;display:flex;align-items:center;gap:10px;cursor:pointer;transition:0.15s;}
    .action-item:hover{background:#262940;}
    .action-item:last-child{border-bottom:none;}
    .badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:bold;color:#fff;white-space:nowrap;}
    .badge-new{background:#1565c0;}.badge-reform{background:#e65100;}.badge-sk{background:#6a1b9a;}
    .item-name{font-weight:bold;font-size:13px;color:#e0e0e0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .item-company{color:#888;font-size:11px;white-space:nowrap;}
    .item-date{font-size:12px;color:#888;white-space:nowrap;}
    .item-days{font-size:11px;font-weight:bold;padding:2px 8px;border-radius:12px;white-space:nowrap;}
    .days-urgent{background:#4a1c1c;color:#ff6b6b;}
    .days-warn{background:#4a3a1c;color:#ffd54f;}
    .days-ok{background:#1c4a2e;color:#66bb6a;}
    .empty-msg{padding:16px;color:#555;font-style:italic;font-size:12px;text-align:center;}

    /* 備忘録 */
    .memo-area{max-width:1000px;margin:0 auto;padding:12px;}
    .memo-input-area{display:flex;gap:8px;margin-bottom:12px;}
    .memo-input{flex:1;padding:10px 14px;border:1px solid #3a3d4a;border-radius:10px;background:#12141c;color:#e0e0e0;font-size:14px;font-family:inherit;resize:none;min-height:44px;max-height:150px;}
    .memo-input:focus{outline:none;border-color:#64b5f6;}
    .memo-input::placeholder{color:#555;}
    .memo-add-btn{padding:10px 20px;background:#37474f;color:#fff;border:none;border-radius:10px;font-weight:bold;cursor:pointer;font-size:14px;white-space:nowrap;}
    .memo-add-btn:hover{background:#455a64;}
    .memo-card{background:#1e2130;border-radius:10px;padding:12px 16px;margin-bottom:8px;border:1px solid #2a2d3a;display:flex;align-items:flex-start;gap:12px;}
    .memo-card:hover{border-color:#3a3d4a;}
    .memo-text{flex:1;color:#ccc;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
    .memo-time{font-size:11px;color:#555;white-space:nowrap;min-width:80px;text-align:right;}
    .memo-del{font-size:11px;color:#555;cursor:pointer;padding:4px 10px;border-radius:6px;border:1px solid #3a3d4a;background:transparent;white-space:nowrap;}
    .memo-del:hover{color:#ff6b6b;border-color:#ff6b6b;}

    /* 未分類メール */
    .mail-area{max-width:1000px;margin:0 auto;padding:12px;}
    .mail-card{background:#1e2130;border-radius:10px;padding:12px 16px;margin-bottom:8px;border:1px solid #2a2d3a;}
    .mail-card:hover{border-color:#3a3d4a;}
    .mail-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
    .mail-from{font-size:13px;font-weight:600;color:#ccc;}
    .mail-badge{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600;color:#fff;margin-right:6px;}
    .mail-badge.sms{background:#2e7d32;}.mail-badge.gmail{background:#c62828;}
    .mail-time{font-size:11px;color:#555;}
    .mail-subject{font-size:12px;color:#ffab40;margin-bottom:4px;}
    .mail-snippet{font-size:13px;color:#888;line-height:1.4;}
    .mail-actions{margin-top:8px;display:flex;gap:8px;}
    .mail-act-btn{font-size:12px;padding:5px 14px;border-radius:8px;border:1px solid #3a3d4a;background:transparent;color:#aaa;cursor:pointer;}
    .mail-act-btn:hover{border-color:#64b5f6;color:#64b5f6;}
    .mail-act-btn.del{color:#888;}
    .mail-act-btn.del:hover{border-color:#ff6b6b;color:#ff6b6b;}
    .mail-empty{text-align:center;padding:40px;color:#555;}

    #noDataMsg{display:none;padding:20px;font-weight:bold;color:#ff6b6b;text-align:center;}
    @media(max-width:600px){.action-item{flex-wrap:wrap;gap:4px;}.item-company,.item-date{font-size:10px;}}
  </style>
</head>
<body>
  <div id="modal-overlay">
    <div id="modal-content">
      <button id="modal-close">✖ 閉じる</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <div class="header-bar">
    <a href="index.html" class="top-link">← トップ</a>
    <a href="today.html" class="top-link">📋 リスト</a>
    <a href="comm.html" class="top-link">📨 通信</a>
    <h3>🔔 <span>今日のアクション</span></h3>
    <div class="date-display" id="dateDisplay"></div>
  </div>

  <div class="tab-bar">
    <div class="tab-btn active" data-tab="tab-action">🔔 アクション <span class="tab-count" id="actionTabCount">-</span></div>
    <div class="tab-btn" data-tab="tab-memo">📋 備忘録 <span class="tab-count" id="memoTabCount">-</span></div>
    <div class="tab-btn" data-tab="tab-mail">📬 仮置き <span class="tab-count" id="mailTabCount">-</span></div>
  </div>

  <div id="tab-action" class="tab-content active">
    <div class="summary-bar" id="summaryBar"></div>
    <div id="noDataMsg">⚠️ トップメニューに戻って「最新データを取得」してください。</div>
    <div class="dashboard" id="dashboard"></div>
  </div>

  <div id="tab-memo" class="tab-content">
    <div class="memo-area">
      <div class="memo-input-area">
        <textarea class="memo-input" id="memoInput" placeholder="メモを入力...（Enterで追加、Shift+Enterで改行）" rows="1"></textarea>
        <button class="memo-add-btn" id="memoAddBtn">追加</button>
      </div>
      <div id="memoList"></div>
    </div>
  </div>

  <div id="tab-mail" class="tab-content">
    <div class="mail-area" id="mailArea">
      <div class="mail-empty">⏳ 読み込み中...</div>
    </div>
  </div>

  <script src="shared-modal.js"></script>
  <script>
    var firebaseConfig={apiKey:"AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",authDomain:"project-6745138395263517914.firebaseapp.com",databaseURL:"https://project-6745138395263517914-default-rtdb.firebaseio.com",projectId:"project-6745138395263517914",storageBucket:"project-6745138395263517914.firebasestorage.app",messagingSenderId:"1054295910908",appId:"1:1054295910908:web:4072df05bd90bbdc896a79"};
    if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
    var database=firebase.database();

    // === タブ切り替え ===
    document.querySelectorAll('.tab-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
        document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
        this.classList.add('active');
        document.getElementById(this.dataset.tab).classList.add('active');
      });
    });

    // === ユーティリティ ===
    function getSafeVal(c,i){if(!c)return"";if(Array.isArray(c))return c.length>i&&c[i]!=null?String(c[i]):"";if(typeof c==='object')return c[i]!=null?String(c[i]):"";return"";}
    function formatToYMD(ds){if(!ds)return"";var d=String(ds).replace(/\s+/g,"").replace(/\//g,"-").replace(/\./g,"-");var p=d.split("-");if(p.length===3)return p[0]+"-"+String(p[1]).padStart(2,'0')+"-"+String(p[2]).padStart(2,'0');return d;}

    var now=new Date();
    var todayStr=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,'0')+"-"+String(now.getDate()).padStart(2,'0');
    var dayNames=['日','月','火','水','木','金','土'];
    document.getElementById('dateDisplay').textContent=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate()+' ('+dayNames[now.getDay()]+')';

    function diffDays(ds){if(!ds)return 9999;return Math.round((new Date(ds)-new Date(todayStr))/(864e5));}
    function daysLabel(n){if(n===0)return'今日';if(n===1)return'明日';if(n<0)return Math.abs(n)+'日超過';return n+'日後';}
    function daysClass(n){if(n<=3)return'days-urgent';if(n<=7)return'days-warn';return'days-ok';}

    // === データ ===
    var globalHeaders=[],globalTasks={},fullData=null;
    try{var s=localStorage.getItem('appData');if(s)fullData=JSON.parse(s);}catch(e){}

    if(fullData&&fullData.app_meta&&fullData.app_tasks){
      globalHeaders=fullData.app_meta.headers;
      globalTasks=fullData.app_tasks;
      buildDashboard();
    } else {
      document.getElementById('noDataMsg').style.display='block';
    }

    // === アクションダッシュボード ===
    function buildDashboard(){
      var callList=[],visitList=[],skVisitList=[],emailList=[],reportList=[];
      Object.keys(globalTasks).forEach(function(key){
        var obj=globalTasks[key];var cols=obj.csvData;if(!cols)return;
        var sfStatus=getSafeVal(cols,1).replace(/\s+/g,"");
        var kubun=getSafeVal(cols,3).replace(/\s+/g,"");
        var name=getSafeVal(cols,4).trim();
        var company=getSafeVal(cols,5).trim();
        var sekouDate=formatToYMD(getSafeVal(cols,2));
        var yoteiDate=obj.date||"";
        var localSt=obj.localStatus||"";
        var effectiveStatus=localSt||sfStatus;
        if(sfStatus==="完了"||effectiveStatus==="報告書提出済")return;
        var d=diffDays(sekouDate);if(d<0)return;
        var isSK=name.indexOf('SK')!==-1;
        var item={key:key,obj:obj,cols:cols,name:name,company:company,sekouDate:sekouDate,days:d,kubun:kubun};
        if(kubun==="ﾘ"&&effectiveStatus==="依頼")callList.push(item);
        if(kubun==="新"&&d<=21&&d>=0&&effectiveStatus!=="下見実施済"&&effectiveStatus!=="報告書提出済")visitList.push(item);
        if(kubun==="新"&&isSK&&d<=10&&d>=0&&effectiveStatus!=="下見実施済"&&effectiveStatus!=="報告書提出済")skVisitList.push(item);
        if(d>=14&&d<=21&&!obj.emailSent)emailList.push(item);
        if(effectiveStatus==="下見実施済"||(effectiveStatus==="下見日確定"&&yoteiDate&&yoteiDate<todayStr))reportList.push(item);
      });
      [callList,visitList,skVisitList,emailList,reportList].forEach(function(l){l.sort(function(a,b){return a.days-b.days;});});

      var total=callList.length+visitList.length+skVisitList.length+emailList.length+reportList.length;
      document.getElementById('actionTabCount').textContent=total;
      document.getElementById('summaryBar').innerHTML=
        '<div class="summary-chip chip-red">📞<span class="num">'+callList.length+'</span></div>'+
        '<div class="summary-chip chip-orange">🏃<span class="num">'+visitList.length+'</span></div>'+
        '<div class="summary-chip chip-purple">🔨<span class="num">'+skVisitList.length+'</span></div>'+
        '<div class="summary-chip chip-blue">✉️<span class="num">'+emailList.length+'</span></div>'+
        '<div class="summary-chip chip-green">📝<span class="num">'+reportList.length+'</span></div>'+
        '<div class="summary-chip chip-total">合計<span class="num">'+total+'</span></div>';

      var dash=document.getElementById('dashboard');dash.innerHTML='';
      renderSection(dash,'📞 連絡して下見日を決めろ','リフォーム案件・未連絡','bg-red',callList);
      renderSection(dash,'🏃 下見に行け','施工日21日前以内','bg-orange',visitList);
      renderSection(dash,'🔨 SK最終下見','施工日10日前以内','bg-purple',skVisitList);
      renderSection(dash,'✉️ 確認メール送れ','施工日14〜21日前','bg-blue',emailList);
      renderSection(dash,'📝 報告書書け','下見済み・報告未完了','bg-green',reportList);
    }

    function renderSection(container,title,subtitle,bgClass,items){
      var sec=document.createElement('div');sec.className='section';
      var header=document.createElement('div');header.className='section-header '+bgClass;
      header.innerHTML=title+' <span class="sub">'+subtitle+'</span><span class="count">'+items.length+'件</span>';
      var body=document.createElement('div');body.className='section-body';
      var isOpen=items.length>0;body.style.display=isOpen?'block':'none';
      header.addEventListener('click',function(){isOpen=!isOpen;body.style.display=isOpen?'block':'none';});
      sec.appendChild(header);
      if(items.length===0){body.innerHTML='<div class="empty-msg">✔ なし</div>';}
      else{
        items.forEach(function(item){
          var div=document.createElement('div');div.className='action-item';
          var bc=item.kubun==='ﾘ'?'badge-reform':item.name.indexOf('SK')!==-1?'badge-sk':'badge-new';
          var bt=item.kubun==='ﾘ'?'ﾘ':item.name.indexOf('SK')!==-1?'SK':'新';
          div.innerHTML='<span class="badge '+bc+'">'+bt+'</span>'+
            '<span class="item-name">'+item.name+'</span>'+
            '<span class="item-company">'+item.company.split(/[\s\u3000]+/)[0]+'</span>'+
            '<span class="item-date">'+item.sekouDate+'</span>'+
            '<span class="item-days '+daysClass(item.days)+'">'+daysLabel(item.days)+'</span>';
          div.addEventListener('click',function(){openCaseModal(item.key,item.obj,globalHeaders,globalTasks,fullData,database);});
          body.appendChild(div);
        });
      }
      sec.appendChild(body);container.appendChild(sec);
    }

    // === 備忘録タブ ===
    document.getElementById('memoAddBtn').addEventListener('click',addMemo);
    document.getElementById('memoInput').addEventListener('keydown',function(e){
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addMemo();}
    });
    loadMemos();

    function addMemo(){
      var input=document.getElementById('memoInput');
      var text=input.value.trim();if(!text)return;
      database.ref('app_notes').push({text:text,ts:new Date().toISOString()});
      input.value='';loadMemos();
    }

    function loadMemos(){
      database.ref('app_notes').orderByChild('ts').once('value',function(snap){
        var data=snap.val();
        var list=document.getElementById('memoList');
        var countEl=document.getElementById('memoTabCount');
        if(!data){list.innerHTML='<div class="mail-empty">メモなし</div>';countEl.textContent='0';return;}
        var entries=[];
        Object.keys(data).forEach(function(k){entries.push({key:k,text:data[k].text,ts:data[k].ts});});
        entries.sort(function(a,b){return b.ts.localeCompare(a.ts);});
        countEl.textContent=entries.length;
        var html='';
        entries.forEach(function(e){
          var d=new Date(e.ts);
          var ts=(d.getMonth()+1)+'/'+d.getDate()+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
          html+='<div class="memo-card"><span class="memo-text">'+e.text.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</span>'+
            '<span class="memo-time">'+ts+'</span>'+
            '<button class="memo-del" data-key="'+e.key+'">✕ 削除</button></div>';
        });
        list.innerHTML=html;
        list.querySelectorAll('.memo-del').forEach(function(btn){
          btn.addEventListener('click',function(){database.ref('app_notes/'+this.dataset.key).remove();loadMemos();});
        });
      });
    }

    // === 仮置きメールタブ ===
    loadParkedMails();

    function loadParkedMails(){
      database.ref('app_parked_mails').once('value',function(snap){
        var parked=snap.val()||{};
        var area=document.getElementById('mailArea');
        var countEl=document.getElementById('mailTabCount');
        var entries=[];
        Object.keys(parked).forEach(function(k){entries.push({key:k,data:parked[k]});});
        entries.sort(function(a,b){return(b.data.ts||'').localeCompare(a.data.ts||'');});
        countEl.textContent=entries.length;

        if(entries.length===0){
          area.innerHTML='<div class="mail-empty">📭 仮置きなし<br><span style="font-size:12px;color:#666;">comm.htmlの「📬 仮置きに送る」ボタンで追加</span></div>';
          return;
        }
        var html='';
        entries.forEach(function(e){
          var m=e.data;
          var d=new Date(m.ts);
          var ts=(d.getMonth()+1)+'/'+d.getDate()+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
          var badge=m.src==='imessage'?'<span class="mail-badge sms">SMS</span>':'<span class="mail-badge gmail">Gmail</span>';
          html+='<div class="mail-card">'+
            '<div class="mail-top"><div class="mail-from">'+badge+(m.contact||'').replace(/</g,'&lt;')+'</div>'+
            '<span class="mail-time">'+ts+'</span></div>';
          if(m.subject)html+='<div class="mail-subject">'+m.subject.replace(/</g,'&lt;')+'</div>';
          if(m.body)html+='<div class="mail-snippet">'+m.body.substring(0,300).replace(/</g,'&lt;')+'</div>';
          html+='<div class="mail-actions">'+
            '<button class="mail-act-btn del" data-key="'+e.key+'">✕ 削除</button>'+
            '</div></div>';
        });
        area.innerHTML=html;
        area.querySelectorAll('.mail-act-btn.del').forEach(function(btn){
          btn.addEventListener('click',function(){database.ref('app_parked_mails/'+this.dataset.key).remove();loadParkedMails();});
        });
      });
    }
  </script>
</body>
</html>
