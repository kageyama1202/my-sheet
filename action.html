<script>
var firebaseConfig={apiKey:"AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",authDomain:"project-6745138395263517914.firebaseapp.com",databaseURL:"https://project-6745138395263517914-default-rtdb.firebaseio.com",projectId:"project-6745138395263517914",storageBucket:"project-6745138395263517914.firebasestorage.app",messagingSenderId:"1054295910908",appId:"1:1054295910908:web:4072df05bd90bbdc896a79"};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
var database=firebase.database();
document.querySelectorAll('.tab-btn').forEach(function(b){b.addEventListener('click',function(){
document.querySelectorAll('.tab-btn').forEach(function(x){x.classList.remove('active');});
document.querySelectorAll('.tab-content').forEach(function(x){x.classList.remove('active');});
this.classList.add('active');document.getElementById(this.dataset.tab).classList.add('active');
});});
document.getElementById('gearBtn').addEventListener('click',function(){document.getElementById('setKey').value=localStorage.getItem('gemini_api_key')||'';document.getElementById('setOv').style.display='block';});
document.getElementById('setCan').addEventListener('click',function(){document.getElementById('setOv').style.display='none';});
document.getElementById('setSav').addEventListener('click',function(){var k=document.getElementById('setKey').value.trim();if(k)localStorage.setItem('gemini_api_key',k);else localStorage.removeItem('gemini_api_key');document.getElementById('setOv').style.display='none';chkKey();});
document.getElementById('setOv').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});
function chkKey(){var k=localStorage.getItem('gemini_api_key');document.getElementById('aiBtn').disabled=!k;return k;}
function gv(c,i){if(!c)return"";if(Array.isArray(c))return c.length>i&&c[i]!=null?String(c[i]):"";return"";}
function fy(ds){if(!ds)return"";var d=String(ds).replace(/\s+/g,"").replace(/\//g,"-").replace(/\./g,"-");var p=d.split("-");if(p.length===3)return p+"-"+String(p[2]).padStart(2,'0')+"-"+String(p[3]).padStart(2,'0');return d;}
var now=new Date();var todayStr=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,'0')+"-"+String(now.getDate()).padStart(2,'0');
var dn=['日','月','火','水','木','金','土'];
document.getElementById('dateDisplay').textContent=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate()+' ('+dn[now.getDay()]+')';
function diffD(ds){if(!ds)return 9999;return Math.round((new Date(ds)-new Date(todayStr))/864e5);}
function dlbl(n){if(n===0)return'今日';if(n===1)return'明日';if(n<0)return Math.abs(n)+'日超過';return n+'日後';}
function dcls(n){if(n<=3)return'du';if(n<=7)return'dw';return'dok';}
var STATUS_RANKS={'依頼':0,'連絡済':1,'下見日確定':2,'下見実施済':3,'報告書提出済':4,'完了':5};
var SF_TO_LOCAL={'依頼':'依頼','下見実施中':'連絡済','下見日程確定':'下見日確定','下見完了':'報告書提出済','完了':'完了'};
function getEff(obj,cols){
var sf=gv(cols,1).replace(/\s+/g,""),local=obj.localStatus||"",sfL=SF_TO_LOCAL[sf]||sf;
var sR=STATUS_RANKS[sfL]!==undefined?STATUS_RANKS[sfL]:-1,lR=STATUS_RANKS[local]!==undefined?STATUS_RANKS[local]:-1;
if(lR>=sR)return{name:local||'依頼',rank:Math.max(lR,0)};return{name:sfL||'依頼',rank:Math.max(sR,0)};
}
function stLbl(name){var c={'依頼':'#90a4ae','連絡済':'#42a5f5','下見日確定':'#ffb300','下見実施済':'#66bb6a','報告書提出済':'#26a69a'};return'<span class="item-st" style="background:'+(c[name]||'#2a2d3a')+'">'+name+'</span>';}
var globalHeaders=[],globalTasks={},fullData=null,caseOptions=[];
try{var s=localStorage.getItem('appData');if(s)fullData=JSON.parse(s);}catch(e){}
if(fullData&&fullData.app_meta&&fullData.app_tasks){
globalHeaders=fullData.app_meta.headers;globalTasks=fullData.app_tasks;
Object.keys(globalTasks).forEach(function(k){var t=globalTasks[k];if(!t.csvData)return;var nm=gv(t.csvData,4).trim(),sk=fy(gv(t.csvData,2));if(nm)caseOptions.push({key:k,name:nm,sekou:sk});});
caseOptions.sort(function(a,b){return(b.sekou||'').localeCompare(a.sekou||'');});
buildDashboard();
}else{document.getElementById('noDataMsg').style.display='block';}
chkKey();

function buildDashboard(){
  var r0=[], r1=[], r2=[], r3=[], r4=[];
  Object.keys(globalTasks).forEach(function(key){
    var obj=globalTasks[key];var cols=obj.csvData;if(!cols)return;
    var eff=getEff(obj,cols),rank=eff.rank,kubun=gv(cols,3).replace(/\s+/g,""),nm=gv(cols,4).trim(),cp=gv(cols,5).trim();
    var sd=fy(gv(cols,2)),yd=obj.date||"",d=diffD(sd);
    
    if(d<0||rank>=5)return;
    var item={key:key,obj:obj,cols:cols,name:nm,company:cp,sekouDate:sd,days:d,kubun:kubun,status:eff.name,rank:rank};

    // ▼ リフォームと新築（それ以外）のスキップ判定
    if(rank===0) {
      if(kubun==="ﾘ") {
        r0.push(item); // リフォームは「連絡箱（r0）」へ
      } else {
        r1.push(item); // 新築等は連絡をスキップして「日程確定箱（r1）」へ
      }
    }
    if(rank===1) r1.push(item);
    if(rank===2) r2.push(item);
    if(rank===3) r3.push(item);
    if(rank===4 && !obj.emailSent) r4.push(item);
  });

  [r0,r1,r2,r3,r4].forEach(function(l){l.sort(function(a,b){return a.days-b.days;});});

  var total=r0.length+r1.length+r2.length+r3.length+r4.length;
  document.getElementById('tcA').textContent=total;
  
  document.getElementById('summaryBar').innerHTML='<div class="sc c-rank0">📞<span class="n">'+r0.length+'</span></div><div class="sc c-rank1">📅<span class="n">'+r1.length+'</span></div><div class="sc c-rank2">🏃<span class="n">'+r2.length+'</span></div><div class="sc c-rank3">📝<span class="n">'+r3.length+'</span></div><div class="sc c-rank4">✉️<span class="n">'+r4.length+'</span></div><div class="sc ct">合計<span class="n">'+total+'</span></div>';

  var dash=document.getElementById('dashboard');dash.innerHTML='';

  rSec(dash,'📞 お客様へ連絡して下見日を調整','ステータス: 依頼 (リフォームのみ)','bg-rank0',r0);
  rSec(dash,'📅 下見日程を確定させる','ステータス: 連絡済 (新築はここから)','bg-rank1',r1);
  rSec(dash,'🏃 現場へ下見に行く','ステータス: 下見日確定','bg-rank2',r2);
  rSec(dash,'📝 報告書を作成・提出する','ステータス: 下見実施済','bg-rank3',r3);
  rSec(dash,'✉️ 施工前の最終確認（メール等）','ステータス: 報告書提出済','bg-rank4',r4);
}

function rSec(ct,title,sub,bg,items){
var s=document.createElement('div');s.className='section';
var h=document.createElement('div');h.className='sh '+bg;
h.innerHTML=title+' <span class="sub">'+sub+'</span><span class="cnt">'+items.length+'件</span>';
var b=document.createElement('div');b.className='sb';var op=items.length>0;b.style.display=op?'block':'none';
h.addEventListener('click',function(){op=!op;b.style.display=op?'block':'none';});
s.appendChild(h);
if(!items.length)b.innerHTML='<div class="empty">✔ なし</div>';
else items.forEach(function(it){
var d=document.createElement('div');d.className='ai-row';
var bc=it.kubun==='ﾘ'?'badge-reform':it.name.indexOf('SK')!==-1?'badge-sk':'badge-new';
var bt=it.kubun==='ﾘ'?'ﾘ':it.name.indexOf('SK')!==-1?'SK':'新';
d.innerHTML='<span class="badge '+bc+'">'+bt+'</span><span class="item-name">'+it.name+'</span>'+stLbl(it.status)+'<span class="item-co">'+it.company.split(/[\s\u3000]+/)+'</span><span class="item-dt">'+it.sekouDate+'</span><span class="item-dy '+dcls(it.days)+'">'+dlbl(it.days)+'</span>';
d.addEventListener('click',function(){openCaseModal(it.key,it.obj,globalHeaders,globalTasks,fullData,database,buildDashboard);});
b.appendChild(d);
});
s.appendChild(b);ct.appendChild(s);
}
document.getElementById('memoAddBtn').addEventListener('click',addM);
document.getElementById('memoInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addM();}});
loadM();
function addM(){var i=document.getElementById('memoInput');var t=i.value.trim();if(!t)return;database.ref('app_notes').push({text:t,ts:new Date().toISOString()});i.value='';loadM();}
function loadM(){database.ref('app_notes').orderByChild('ts').once('value',function(sn){
var d=sn.val(),el=document.getElementById('memoList'),c=document.getElementById('tcM');
if(!d){el.innerHTML='<div class="mail-empty">メモなし</div>';c.textContent='0';return;}
var e=[];Object.keys(d).forEach(function(k){e.push({key:k,text:d[k].text,ts:d[k].ts});});
e.sort(function(a,b){return b.ts.localeCompare(a.ts);});c.textContent=e.length;
var h='';e.forEach(function(x){var dt=new Date(x.ts),ts=(dt.getMonth()+1)+'/'+dt.getDate()+' '+('0'+dt.getHours()).slice(-2)+':'+('0'+dt.getMinutes()).slice(-2);h+='<div class="mc"><span class="mt-text">'+x.text.replace(/</g,'&lt;')+'</span><span class="mt-time">'+ts+'</span><button class="mt-del" data-key="'+x.key+'">✕</button></div>';});
el.innerHTML=h;el.querySelectorAll('.mt-del').forEach(function(b){b.addEventListener('click',function(){database.ref('app_notes/'+this.dataset.key).remove();loadM();});});
});}
loadP();
function loadP(){database.ref('app_parked_mails').once('value',function(sn){
var pk=sn.val()||{},ml=document.getElementById('mailList'),c=document.getElementById('tcP');
var e=[];Object.keys(pk).forEach(function(k){e.push({key:k,d:pk[k]});});
e.sort(function(a,b){return(b.d.ts||'').localeCompare(a.d.ts||'');});c.textContent=e.length;
document.getElementById('aiBtn').disabled=!chkKey()||e.length===0;
if(!e.length){ml.innerHTML='<div class="mail-empty">📭 仮置きなし<br><span style="font-size:12px;color:#666;">comm.htmlの「📬 仮置きに送る」で追加</span></div>';return;}
var h='';e.forEach(function(x){
var m=x.d,dt=new Date(m.ts),ts=(dt.getMonth()+1)+'/'+dt.getDate()+' '+('0'+dt.getHours()).slice(-2)+':'+('0'+dt.getMinutes()).slice(-2);
var badge=m.src==='imessage'?'<span class="mlb sms">SMS</span>':'<span class="mlb gmail">Gmail</span>';
h+='<div class="mlc'+(m.aiSuggest?' ai-m':'')+'"><div class="mlt"><div class="mlf">'+badge+(m.contact||'').replace(/</g,'&lt;')+'</div><span class="mltm">'+ts+'</span></div>';
if(m.subject)h+='<div class="mlsb">'+m.subject.replace(/</g,'&lt;')+'</div>';
if(m.body)h+='<div class="mlsn">'+m.body.substring(0,300).replace(/</g,'&lt;')+'</div>';
if(m.aiSuggest)h+='<div><span class="ai-sug">🤖 AI: '+m.aiSuggest+'</span></div>';
h+='<div class="mlac"><select class="cs" data-key="'+x.key+'"><option value="">案件を選択...</option>';
caseOptions.forEach(function(co){h+='<option value="'+co.key+'"'+(m.assignedCase===co.key?' selected':'')+'>'+co.name+'</option>';});
h+='</select><button class="as-btn" data-key="'+x.key+'">✔ 指定</button><button class="ml-btn del" data-key="'+x.key+'">✕ 削除</button></div></div>';
});ml.innerHTML=h;
ml.querySelectorAll('.ml-btn.del').forEach(function(b){b.addEventListener('click',function(){database.ref('app_parked_mails/'+this.dataset.key).remove();loadP();});});
ml.querySelectorAll('.as-btn').forEach(function(b){b.addEventListener('click',function(){
var k=this.dataset.key,sel=ml.querySelector('.cs[data-key="'+k+'"]'),ck=sel.value;
if(!ck){alert('案件を選択');return;}database.ref('app_parked_mails/'+k+'/assignedCase').set(ck);
var md=pk[k];if(md)database.ref('app_communications').push({dt:md.ts,src:md.src||'gmail',dir:md.dir||'',contact:md.contact||'',subject:md.subject||'',body:(md.body||'').substring(0,500),assignedCase:ck});
this.textContent='✔ 済';this.style.background='#666';this.disabled=true;
});});
});}
document.getElementById('aiBtn').addEventListener('click',function(){
var apiKey=localStorage.getItem('gemini_api_key');if(!apiKey){document.getElementById('setOv').style.display='block';return;}
var sts=document.getElementById('aiSts'),btn=this;btn.disabled=true;btn.textContent='🤖 分類中...';sts.textContent='問い合わせ中...';
database.ref('app_parked_mails').once('value',function(sn){
var pk=sn.val()||{},entries=[];Object.keys(pk).forEach(function(k){if(!pk[k].aiSuggest)entries.push({key:k,d:pk[k]});});
if(!entries.length){sts.textContent='対象なし';btn.disabled=false;btn.textContent='🤖 AI分類';return;}
var caseList=caseOptions.slice(0,100).map(function(c){return c.name;}).join('\n');
var bs=5,batches=[];for(var i=0;i<entries.length;i+=bs)batches.push(entries.slice(i,i+bs));var done=0;
function proc(idx){
if(idx>=batches.length){sts.textContent='完了！ '+done+'件';btn.disabled=false;btn.textContent='🤖 AI分類';loadP();return;}
var batch=batches[idx],msgList=batch.map(function(e,i){return'['+(i+1)+'] 送信元:'+e.d.contact+' 件名:'+(e.d.subject||'なし')+' 本文:'+(e.d.body||'').substring(0,200);}).join('\n');
var prompt='建設案件管理アシスタントです。メッセージごとに最も関連する案件名を1つ選んでください。該当なしは「不明」。\n\n【案件一覧】\n'+caseList+'\n\n【メッセージ】\n'+msgList+'\n\nJSON配列で回答。例:["案件名1","不明"]\nJSONのみ。';
fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key='+apiKey,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
}).then(function(r){return r.json();}).then(function(data){
try{var text=data.candidates.content.parts.text,results=JSON.parse(text.replace(/```json|```/g,'').trim());
for(var j=0;j<batch.length;j++){var sug=(results[j]&&results[j]!=='不明')?results[j]:null;if(sug){database.ref('app_parked_mails/'+batch[j].key+'/aiSuggest').set(sug);done++;}}}catch(e){console.error(e);}
sts.textContent=(idx+1)+'/'+batches.length;setTimeout(function(){proc(idx+1);},1000);
}).catch(function(e){sts.textContent='エラー';btn.disabled=false;btn.textContent='🤖 AI分類';});
}proc(0);
});
});
</script>
</body>
</html>
