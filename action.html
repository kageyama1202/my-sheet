<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>今日のアクション</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<link rel="stylesheet" href="shared-modal.css">
<style>
*{box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;padding:0;margin:0;background:#1a1d27;color:#e0e0e0;font-size:13px;}
.header-bar{background:#12141c;padding:10px 16px;border-bottom:1px solid #2a2d3a;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.top-link{text-decoration:none;font-weight:bold;color:#64b5f6;font-size:13px;}
.header-bar h3{margin:0;font-size:17px;color:#fff;font-weight:700;}
.header-bar h3 span{color:#ff6b6b;}
.date-display{margin-left:auto;font-size:13px;font-weight:bold;color:#888;}
.tab-bar{display:flex;background:#12141c;border-bottom:2px solid #2a2d3a;position:sticky;top:44px;z-index:99;}
.tab-btn{flex:1;padding:10px 0;text-align:center;font-size:14px;font-weight:700;cursor:pointer;color:#666;border-bottom:3px solid transparent;transition:0.2s;}
.tab-btn:hover{color:#aaa;}
.tab-btn.active{color:#fff;border-bottom-color:#ff6b6b;}
.tab-btn .tc{font-size:12px;padding:1px 8px;border-radius:10px;margin-left:4px;background:#2a2d3a;color:#888;}
.tab-btn.active .tc{background:#ff6b6b;color:#fff;}
.tab-content{display:none;}.tab-content.active{display:block;}
.sub-tab-bar{display:flex;background:#12141c;border-bottom:1px solid #2a2d3a;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.sub-tab{flex:1;min-width:0;padding:10px 4px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;color:#666;border-bottom:3px solid transparent;transition:0.2s;white-space:nowrap;}
.sub-tab:hover{color:#aaa;}.sub-tab.active{color:#fff;}
.sub-tab .st-icon{font-size:16px;display:block;margin-bottom:2px;}
.sub-tab .st-cnt{font-size:11px;padding:1px 7px;border-radius:10px;background:#2a2d3a;color:#888;margin-left:2px;}
.sub-tab.active .st-cnt{color:#fff;}
.sub-tab.s0{border-bottom-color:#90a4ae;}.sub-tab.s0.active{color:#cfd8dc;}.sub-tab.s0.active .st-cnt{background:#546e7a;}
.sub-tab.s1{border-bottom-color:#42a5f5;}.sub-tab.s1.active{color:#90caf9;}.sub-tab.s1.active .st-cnt{background:#1565c0;}
.sub-tab.s2{border-bottom-color:#ffb300;}.sub-tab.s2.active{color:#ffe082;}.sub-tab.s2.active .st-cnt{background:#e65100;}
.sub-tab.s3{border-bottom-color:#66bb6a;}.sub-tab.s3.active{color:#a5d6a7;}.sub-tab.s3.active .st-cnt{background:#2e7d32;}
.sub-tab.s4{border-bottom-color:#26a69a;}.sub-tab.s4.active{color:#80cbc4;}.sub-tab.s4.active .st-cnt{background:#00695c;}
.sub-content{display:none;}.sub-content.active{display:block;}
.sort-bar{display:flex;align-items:center;gap:8px;padding:6px 16px;border-bottom:1px solid #2a2d3a;background:#12141c;}
.sort-bar span{font-size:11px;color:#666;}
.sort-btn{font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid #3a3d4a;background:transparent;color:#888;cursor:pointer;transition:0.15s;}
.sort-btn:hover{border-color:#64b5f6;color:#64b5f6;}
.sort-btn.active{background:#1565c0;border-color:#1565c0;color:#fff;}
.summary-total{padding:6px 16px;font-size:12px;color:#888;text-align:right;}
.summary-total strong{color:#ff6b6b;font-size:15px;}
.dashboard{max-width:1000px;margin:0 auto;padding:8px 12px;}
.ai-row{padding:10px 16px;border-bottom:1px solid #252838;display:flex;align-items:center;gap:8px;cursor:pointer;transition:0.15s;}
.ai-row:hover{background:#262940;}.ai-row:last-child{border-bottom:none;}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:bold;color:#fff;white-space:nowrap;}
.badge-new{background:#1565c0;}.badge-reform{background:#e65100;}.badge-sk{background:#6a1b9a;}
.item-name{font-weight:bold;font-size:13px;color:#e0e0e0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.item-co{color:#888;font-size:11px;white-space:nowrap;}
.item-meta{display:flex;flex-direction:column;align-items:flex-end;gap:1px;white-space:nowrap;}
.item-sekou{font-size:11px;color:#aaa;}
.item-shitami{font-size:10px;color:#80cbc4;}
.item-yotei{font-size:10px;color:#ce93d8;}
.item-dy{font-size:11px;font-weight:bold;padding:2px 8px;border-radius:12px;white-space:nowrap;}
.item-st{font-size:10px;padding:2px 8px;border-radius:8px;color:#fff;white-space:nowrap;}
.du{background:#4a1c1c;color:#ff6b6b;}.dw{background:#4a3a1c;color:#ffd54f;}.dok{background:#1c4a2e;color:#66bb6a;}
.empty{padding:30px;color:#555;font-style:italic;font-size:13px;text-align:center;}
.contact-card{background:#1e2130;border-radius:10px;padding:12px 16px;margin-bottom:8px;border:1px solid #2a2d3a;cursor:pointer;transition:0.15s;}
.contact-card:hover{border-color:#3a3d4a;background:#262940;}
.cc-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.cc-name{font-weight:bold;font-size:14px;color:#e0e0e0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cc-mid{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;}
.phone-link{text-decoration:none;color:#64b5f6;font-size:14px;font-weight:600;padding:4px 12px;border-radius:8px;background:#1a2a3a;display:inline-flex;align-items:center;gap:4px;}
.phone-link:hover{background:#1e3a5a;}
.elapsed{font-size:12px;font-weight:bold;padding:3px 10px;border-radius:12px;}
.elapsed-hot{background:#5a1a1a;color:#ff6b6b;}
.elapsed-warm{background:#4a3a1c;color:#ffd54f;}
.elapsed-ok{background:#1c3a2e;color:#66bb6a;}
.cc-dates{display:flex;gap:12px;align-items:center;margin-left:auto;flex-wrap:wrap;}
.cc-bikou{font-size:12px;color:#999;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:4px;}
.memo-area{max-width:1000px;margin:0 auto;padding:12px;}
.mia{display:flex;gap:8px;margin-bottom:12px;}
.mi{flex:1;padding:10px 14px;border:1px solid #3a3d4a;border-radius:10px;background:#12141c;color:#e0e0e0;font-size:14px;font-family:inherit;resize:none;min-height:44px;max-height:150px;}
.mi:focus{outline:none;border-color:#64b5f6;}.mi::placeholder{color:#555;}
.mab{padding:10px 20px;background:#37474f;color:#fff;border:none;border-radius:10px;font-weight:bold;cursor:pointer;font-size:14px;}
.mab:hover{background:#455a64;}
.mc{background:#1e2130;border-radius:10px;padding:12px 16px;margin-bottom:8px;border:1px solid #2a2d3a;display:flex;align-items:flex-start;gap:12px;}
.mc:hover{border-color:#3a3d4a;}
.mt-text{flex:1;color:#ccc;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.mt-time{font-size:11px;color:#555;white-space:nowrap;min-width:80px;text-align:right;}
.mt-del{font-size:11px;color:#555;cursor:pointer;padding:4px 10px;border-radius:6px;border:1px solid #3a3d4a;background:transparent;}
.mt-del:hover{color:#ff6b6b;border-color:#ff6b6b;}
.mail-empty{text-align:center;padding:40px;color:#555;}
#noDataMsg{display:none;padding:20px;font-weight:bold;color:#ff6b6b;text-align:center;}
@media(max-width:600px){.ai-row{flex-wrap:wrap;gap:4px;}.item-co{font-size:10px;}.sub-tab{padding:8px 2px;font-size:10px;}.sub-tab .st-icon{font-size:14px;}.cc-mid{gap:6px;}.cc-dates{margin-left:0;}}
</style>
</head>
<body>
<div id="modal-overlay"><div id="modal-content"><button id="modal-close">✖ 閉じる</button><div id="modal-body"></div></div></div>
<div class="header-bar">
<a href="index.html" class="top-link">← トップ</a>
<a href="today.html" class="top-link">📋 リスト</a>
<a href="comm.html" class="top-link">📨 通信</a>
<h3>🔔 <span>今日のアクション</span></h3>
<div class="date-display" id="dateDisplay"></div>
</div>
<div class="tab-bar">
<div class="tab-btn active" data-tab="tab-action">🔔 アクション<span class="tc" id="tcA">-</span></div>
<div class="tab-btn" data-tab="tab-memo">📋 備忘録<span class="tc" id="tcM">-</span></div>
</div>
<div id="tab-action" class="tab-content active">
  <div class="sub-tab-bar" id="subTabBar"></div>
  <div class="sort-bar" id="sortBar">
    <span>並び順:</span>
    <button class="sort-btn active" data-sort="default" id="sortDefault">デフォルト</button>
    <button class="sort-btn" data-sort="sekou" id="sortSekou">施工日順</button>
  </div>
  <div class="summary-total" id="summaryTotal"></div>
  <div id="noDataMsg">⚠️ トップに戻ってデータ取得してください。</div>
  <div id="subContents"></div>
</div>

<div class="memo-area">
<div class="mia"><textarea class="mi" id="memoInput" placeholder="メモを入力...（Enterで追加）" rows="1"></textarea><button class="mab" id="memoAddBtn">追加</button></div>
<div id="memoList"></div>
</div>
</div>
<script src="shared-modal.js"></script>
<script>
var firebaseConfig={apiKey:"AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",authDomain:"project-6745138395263517914.firebaseapp.com",databaseURL:"https://project-6745138395263517914-default-rtdb.firebaseio.com",projectId:"project-6745138395263517914",storageBucket:"project-6745138395263517914.firebasestorage.app",messagingSenderId:"1054295910908",appId:"1:1054295910908:web:4072df05bd90bbdc896a79"};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
var database=firebase.database();

document.querySelectorAll('.tab-btn').forEach(function(b){b.addEventListener('click',function(){
document.querySelectorAll('.tab-btn').forEach(function(x){x.classList.remove('active');});
document.querySelectorAll('.tab-content').forEach(function(x){x.classList.remove('active');});
this.classList.add('active');document.getElementById(this.dataset.tab).classList.add('active');
});});

function gv(c,i){if(!c)return"";if(Array.isArray(c))return c.length>i&&c[i]!=null?String(c[i]):"";return"";}
function fy(ds){if(!ds)return"";var d=String(ds).replace(/\s+/g,"").replace(/\//g,"-").replace(/\./g,"-");var p=d.split("-");if(p.length===3)return p[0]+"-"+String(p[1]).padStart(2,'0')+"-"+String(p[2]).padStart(2,'0');return d;}

var now=new Date();
var todayStr=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,'0')+"-"+String(now.getDate()).padStart(2,'0');
var dn=['日','月','火','水','木','金','土'];
document.getElementById('dateDisplay').textContent=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate()+' ('+dn[now.getDay()]+')';

function diffD(ds){if(!ds)return 9999;return Math.round((new Date(ds)-new Date(todayStr))/864e5);}
function dlbl(n){if(n===0)return'今日';if(n===1)return'明日';if(n<0)return Math.abs(n)+'日超過';return n+'日後';}
function dcls(n){if(n<=3)return'du';if(n<=7)return'dw';return'dok';}
function fmtD(ds){if(!ds)return'';var p=ds.split('-');return(parseInt(p[1])||'')+'/'+( parseInt(p[2])||'');}

var STATUS_RANKS={'依頼':0,'連絡済':1,'下見日確定':2,'下見実施済':3,'報告書提出済':4,'完了':5};
var SF_TO_LOCAL={'依頼':'依頼','下見実施中':'連絡済','下見日程確定':'下見日確定','下見完了':'報告書提出済','完了':'完了'};
function getEff(obj,cols){var sf=gv(cols,1).replace(/\s+/g,""),local=obj.localStatus||"",sfL=SF_TO_LOCAL[sf]||sf;var sR=STATUS_RANKS[sfL]!==undefined?STATUS_RANKS[sfL]:-1,lR=STATUS_RANKS[local]!==undefined?STATUS_RANKS[local]:-1;if(lR>=sR)return{name:local||'依頼',rank:Math.max(lR,0)};return{name:sfL||'依頼',rank:Math.max(sR,0)};}
function stLbl(name){var c={'依頼':'#90a4ae','連絡済':'#42a5f5','下見日確定':'#ffb300','下見実施済':'#66bb6a','報告書提出済':'#26a69a'};return'<span class="item-st" style="background:'+(c[name]||'#2a2d3a')+'">'+name+'</span>';}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

var SUB_TABS=[
  {id:'s0',icon:'📞',label:'連絡',cls:'s0'},
  {id:'s1',icon:'📅',label:'日程確定',cls:'s1'},
  {id:'s2',icon:'🏃',label:'下見',cls:'s2'},
  {id:'s3',icon:'📝',label:'報告書',cls:'s3'},
  {id:'s4',icon:'✉️',label:'確認メール',cls:'s4'}
];
var activeSubTab='s0';
var currentSort='default';

document.getElementById('sortDefault').addEventListener('click',function(){setSort('default');});
document.getElementById('sortSekou').addEventListener('click',function(){setSort('sekou');});
function setSort(s){currentSort=s;document.querySelectorAll('.sort-btn').forEach(function(b){b.classList.toggle('active',b.dataset.sort===s);});buildDashboard();}

var globalHeaders=[],globalTasks={},fullData=null,caseOptions=[];
try{var s=localStorage.getItem('appData');if(s)fullData=JSON.parse(s);}catch(e){}
if(fullData&&fullData.app_meta&&fullData.app_tasks){
  globalHeaders=fullData.app_meta.headers;globalTasks=fullData.app_tasks;
  Object.keys(globalTasks).forEach(function(k){var t=globalTasks[k];if(!t.csvData)return;var nm=gv(t.csvData,4).trim(),sk=fy(gv(t.csvData,2));if(nm)caseOptions.push({key:k,name:nm,sekou:sk});});
  caseOptions.sort(function(a,b){return(b.sekou||'').localeCompare(a.sekou||'');});
  buildDashboard();
}else{document.getElementById('noDataMsg').style.display='block';}

function buildSubTabs(counts){
  var bar=document.getElementById('subTabBar');bar.innerHTML='';
  SUB_TABS.forEach(function(t){
    var d=document.createElement('div');d.className='sub-tab '+t.cls+(activeSubTab===t.id?' active':'');d.dataset.sub=t.id;
    d.innerHTML='<span class="st-icon">'+t.icon+'</span>'+t.label+'<span class="st-cnt">'+counts[t.id]+'</span>';
    d.addEventListener('click',function(){activeSubTab=t.id;bar.querySelectorAll('.sub-tab').forEach(function(x){x.classList.remove('active');});d.classList.add('active');document.querySelectorAll('.sub-content').forEach(function(x){x.classList.remove('active');});var tgt=document.getElementById('sub-'+t.id);if(tgt)tgt.classList.add('active');});
    bar.appendChild(d);
  });
}

function buildDashboard(){
  var r0=[],r1=[],r2=[],r3=[],r4=[];
  Object.keys(globalTasks).forEach(function(key){
    var obj=globalTasks[key],cols=obj.csvData;if(!cols)return;
    var eff=getEff(obj,cols),rank=eff.rank,kubun=gv(cols,3).replace(/\s+/g,""),nm=gv(cols,4).trim(),cp=gv(cols,5).trim();
    var sd=fy(gv(cols,2)),d=diffD(sd);
    if(d<0||rank>=5)return;
    var phone=gv(cols,6).replace(/[^\d]/g,'');
    var iraiDate=fy(gv(cols,7));
    var elapsed=iraiDate?Math.max(0,diffD(iraiDate)*-1):0;
    var bikou=gv(cols,10).trim();
    var shitamiDate=fy(gv(cols,12));
    var yoteiDate=obj.date||'';
    var item={key:key,obj:obj,cols:cols,name:nm,company:cp,sekouDate:sd,days:d,kubun:kubun,status:eff.name,rank:rank,phone:phone,elapsed:elapsed,bikou:bikou,shitamiDate:shitamiDate,yoteiDate:yoteiDate};
    if(rank===0){if(kubun==="ﾘ"){r0.push(item);}else{r1.push(item);}}
    if(rank===1)r1.push(item);
    if(rank===2)r2.push(item);
    if(rank===3)r3.push(item);
    if(rank===4&&!obj.emailSent)r4.push(item);
  });

  var sekouSort=function(a,b){return a.days-b.days;};
  if(currentSort==='sekou'){[r0,r1,r2,r3,r4].forEach(function(l){l.sort(sekouSort);});}
  else{r0.sort(function(a,b){return b.elapsed-a.elapsed;});[r1,r2,r3,r4].forEach(function(l){l.sort(sekouSort);});}

  var total=r0.length+r1.length+r2.length+r3.length+r4.length;
  document.getElementById('tcA').textContent=total;
  document.getElementById('summaryTotal').innerHTML='全 <strong>'+total+'</strong> 件';
  var counts={s0:r0.length,s1:r1.length,s2:r2.length,s3:r3.length,s4:r4.length};
  if(counts[activeSubTab]===0){var found=false;SUB_TABS.forEach(function(t){if(!found&&counts[t.id]>0){activeSubTab=t.id;found=true;}});if(!found)activeSubTab='s0';}
  buildSubTabs(counts);

  var ct=document.getElementById('subContents');ct.innerHTML='';
  var groups={s0:r0,s1:r1,s2:r2,s3:r3,s4:r4};
  var descs={s0:'📞 連絡',s1:'📅 日程確定',s2:'🏃 下見',s3:'📝 報告書',s4:'✉️ 確認メール'};

  SUB_TABS.forEach(function(t){
    var div=document.createElement('div');div.id='sub-'+t.id;div.className='sub-content'+(activeSubTab===t.id?' active':'');
    var items=groups[t.id];
    var html='<div class="dashboard">';

    if(!items.length){
      html+='<div class="empty">✔ '+descs[t.id]+' — なし</div>';
    }else if(t.id==='s0'){
      items.forEach(function(it){
        var bc=it.kubun==='ﾘ'?'badge-reform':'badge-new',bt=it.kubun==='ﾘ'?'ﾘ':'新';
        var ecls=it.elapsed>=5?'elapsed-hot':it.elapsed>=3?'elapsed-warm':'elapsed-ok';
        html+='<div class="contact-card" data-key="'+it.key+'">';
        html+='<div class="cc-top"><span class="badge '+bc+'">'+bt+'</span><span class="cc-name">'+escH(it.name)+'</span><span class="item-co">'+escH(it.company.split(/[\s\u3000]+/)[0])+'</span></div>';
        html+='<div class="cc-mid">';
        if(it.phone)html+='<a href="tel:'+it.phone+'" class="phone-link" onclick="event.stopPropagation();">📞 '+it.phone+'</a>';
        html+='<span class="elapsed '+ecls+'">依頼 '+it.elapsed+'日目</span>';
        html+='<div class="cc-dates">';
        html+='<span class="item-sekou">施工 '+fmtD(it.sekouDate)+'</span>';
        html+='<span class="item-dy '+dcls(it.days)+'">'+dlbl(it.days)+'</span>';
        if(it.shitamiDate)html+='<span class="item-shitami">下見 '+fmtD(it.shitamiDate)+'</span>';
        if(it.yoteiDate)html+='<span class="item-yotei">予定 '+fmtD(it.yoteiDate)+'</span>';
        html+='</div></div>';
        if(it.bikou)html+='<div class="cc-bikou">💬 '+escH(it.bikou)+'</div>';
        html+='</div>';
      });
    }else{
      items.forEach(function(it){
        var bc=it.kubun==='ﾘ'?'badge-reform':it.name.indexOf('SK')!==-1?'badge-sk':'badge-new';
        var bt=it.kubun==='ﾘ'?'ﾘ':it.name.indexOf('SK')!==-1?'SK':'新';
        html+='<div class="ai-row" data-key="'+it.key+'">';
        html+='<span class="badge '+bc+'">'+bt+'</span>';
        html+='<span class="item-name">'+escH(it.name)+'</span>';
        html+=stLbl(it.status);
        html+='<span class="item-co">'+escH(it.company.split(/[\s\u3000]+/)[0])+'</span>';
        html+='<div class="item-meta">';
        html+='<span class="item-sekou">施工 '+fmtD(it.sekouDate)+'</span>';
        html+='<span class="item-dy '+dcls(it.days)+'">'+dlbl(it.days)+'</span>';
        if(it.shitamiDate)html+='<span class="item-shitami">下見 '+fmtD(it.shitamiDate)+'</span>';
        if(it.yoteiDate)html+='<span class="item-yotei">予定 '+fmtD(it.yoteiDate)+'</span>';
        html+='</div></div>';
      });
    }
    html+='</div>';div.innerHTML=html;ct.appendChild(div);
    div.querySelectorAll('.ai-row,.contact-card').forEach(function(row){row.addEventListener('click',function(){var k=this.dataset.key;openCaseModal(k,globalTasks[k],globalHeaders,globalTasks,fullData,database,buildDashboard);});});
  });
}

document.getElementById('memoAddBtn').addEventListener('click',addM);
document.getElementById('memoInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addM();}});
loadM();
function addM(){var i=document.getElementById('memoInput');var t=i.value.trim();if(!t)return;database.ref('app_notes').push({text:t,ts:new Date().toISOString()});i.value='';loadM();}
function loadM(){database.ref('app_notes').orderByChild('ts').once('value',function(sn){
  var d=sn.val(),el=document.getElementById('memoList'),c=document.getElementById('tcM');
  if(!d){el.innerHTML='<div class="mail-empty">メモなし</div>';c.textContent='0';return;}
  var e=[];Object.keys(d).forEach(function(k){e.push({key:k,text:d[k].text,ts:d[k].ts});});
  e.sort(function(a,b){return b.ts.localeCompare(a.ts);});c.textContent=e.length;
  var h='';e.forEach(function(x){var dt=new Date(x.ts),ts=(dt.getMonth()+1)+'/'+dt.getDate()+' '+('0'+dt.getHours()).slice(-2)+':'+('0'+dt.getMinutes()).slice(-2);h+='<div class="mc"><span class="mt-text">'+escH(x.text)+'</span><span class="mt-time">'+ts+'</span><button class="mt-del" data-key="'+x.key+'">✕</button></div>';});
  el.innerHTML=h;el.querySelectorAll('.mt-del').forEach(function(b){b.addEventListener('click',function(){database.ref('app_notes/'+this.dataset.key).remove();loadM();});});
});}
</script>
