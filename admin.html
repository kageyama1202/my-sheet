<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>【管理者用】CSVデータ クラウド同期ツール</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { font-family: sans-serif; padding: 30px; background-color: #f0f2f5; text-align: center; }
    .box { background: #fff; padding: 30px; border-radius: 8px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    input[type="file"] { font-size: 16px; cursor: pointer; margin-bottom: 20px; }
    button { font-size: 18px; padding: 10px 20px; cursor: pointer; border-radius:4px; border:none; background:#007bff; color:#fff; font-weight: bold; width: 100%; transition: 0.2s;}
    button:hover { background:#0056b3; }
    p { font-size: 14px; color: #555; text-align: left; line-height: 1.6; }
    .top-link { display: inline-block; margin-bottom: 15px; text-decoration: none; font-weight: bold; color: #007bff; font-size: 14px; }
  </style>
</head>
<body>
  <div class="box">
    <a href="index.html" class="top-link">◀ トップメニュー</a>
    <h2 style="color: #333; margin-top: 0;">👑 【管理者用】<br>クラウドへデータ一括保存</h2>
    <p>Salesforceからダウンロードした最新のCSVファイルを選択し、「クラウドへ保存」ボタンを押してください。<br>※現場のiPadからはCSVを読み込む必要がなくなります。</p>
    
    <input type="file" id="csvFile" accept=".csv" />
    <button id="uploadBtn">☁️ 最新データをクラウドへ保存</button>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",
      authDomain: "project-6745138395263517914.firebaseapp.com",
      databaseURL: "https://project-6745138395263517914-default-rtdb.firebaseio.com",
      projectId: "project-6745138395263517914",
      storageBucket: "project-6745138395263517914.firebasestorage.app",
      messagingSenderId: "1054295910908",
      appId: "1:1054295910908:web:4072df05bd90bbdc896a79"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const database = firebase.database();

    function parseCSV(text) {
        const result = new Array(); let row = new Array(); let col = ''; let insideQuotes = false;
        for (let i = 0; i < text.length; i++) {
            const char = text.charAt(i); const nextChar = text.charAt(i + 1);
            if (char === '"' && insideQuotes && nextChar === '"') { col += '"'; i++; 
            } else if (char === '"') { insideQuotes = !insideQuotes;
            } else if (char === ',' && !insideQuotes) { row.push(col); col = '';
            } else if ((char === '\n' || char === '\r') && !insideQuotes) {
                if (char === '\r' && nextChar === '\n') i++; 
                row.push(col); result.push(row); row = new Array(); col = '';
            } else { col += char; }
        }
        if (col !== '' || row.length > 0) { row.push(col); result.push(row); }
        return result;
    }

    document.getElementById('uploadBtn').addEventListener('click', function() {
      const fileInput = document.getElementById('csvFile');
      if (fileInput.files.length === 0) { alert("CSVファイルを選択してください！"); return; }
      
      const file = fileInput.files.item(0); 
      const reader = new FileReader();
      
      reader.onload = function(e) {
        document.getElementById('uploadBtn').textContent = "保存中...";
        const lines = parseCSV(e.target.result);
        let validLines = lines.filter(function(line) { return line.join('').replace(/\s+/g, '') !== ''; });
        if (validLines.length === 0) return;
        
        const headers = validLines.shift(); 
        
        let updates = {};
        updates['app_meta/headers'] = headers;
        
        let invalidChars = new RegExp("[.#$\\[\\]/]", "g");
        validLines.forEach(function(cols) {
            let rowUniqueKey = cols.join("").replace(/\s+/g, "").replace(invalidChars, "_").substring(0, 200);
            updates['app_tasks/' + rowUniqueKey + '/csvData'] = cols;
        });

        database.ref().update(updates).then(() => {
            alert("✅ クラウドへの保存が完了しました！\n\n現場のiPad等の端末からは、アプリを開くだけで最新のデータが見られます。");
            document.getElementById('uploadBtn').textContent = "☁️ 最新データをクラウドへ保存";
            fileInput.value = "";
        }).catch(err => {
            alert("エラーが発生しました: " + err);
        });
      };
      reader.readAsText(file, 'UTF-8');
    });
  </script>
</body>
</html>
