<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>【管理者用】CSVデータ クラウド同期ツール</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;padding:30px;background-color:#1a1d27;text-align:center;color:#e0e0e0;}
    .box{background:#1e2130;padding:30px;border-radius:12px;max-width:560px;margin:0 auto;border:1px solid #2a2d3a;}
    input[type="file"]{font-size:14px;cursor:pointer;margin-bottom:20px;color:#ccc;}
    button{font-size:16px;padding:12px 20px;cursor:pointer;border-radius:8px;border:none;background:#1565c0;color:#fff;font-weight:bold;width:100%;transition:0.2s;margin-bottom:10px;}
    button:hover{background:#1976d2;}
    button:disabled{opacity:0.5;cursor:not-allowed;}
    button.danger{background:#b71c1c;}
    button.danger:hover{background:#c62828;}
    p{font-size:13px;color:#888;text-align:left;line-height:1.7;}
    .top-link{display:inline-block;margin-bottom:15px;text-decoration:none;font-weight:bold;color:#64b5f6;font-size:14px;}
    h2{color:#fff;margin-top:0;font-size:18px;}
    .log{text-align:left;background:#12141c;border-radius:8px;padding:12px;margin-top:16px;font-size:12px;color:#888;line-height:1.8;max-height:300px;overflow-y:auto;display:none;}
    .log .ok{color:#66bb6a;}.log .warn{color:#ffd54f;}.log .err{color:#ff6b6b;}.log .info{color:#64b5f6;}
    .divider{border:none;border-top:1px solid #2a2d3a;margin:20px 0;}
    #authStatus{font-size:12px;color:#888;margin-bottom:12px;}
  </style>
</head>
<body>
  <div class="box">
    <a href="index.html" class="top-link">◀ トップメニュー</a>
    <div id="authStatus">🔐 認証中...</div>
    <h2>👑 【管理者用】<br>クラウドへデータ一括保存</h2>
    <p>SalesforceからダウンロードしたCSVを選択し「クラウドへ保存」を押してください。<br>
    ・手配IDをキーとして更新（施工日等が変わっても同一案件として認識）<br>
    ・ローカル入力済みのステータス/メモ/下見予定は保持されます<br>
    ・CSVから消えた案件は自動削除されます<br>
    ・<strong style="color:#ffd54f">ステータスが「完了」の案件は保存スキップされます</strong>（「下見完了」は除く）<br>
    ・住所から地番を検索し、緯度経度を自動設定します（割番形式のみ）</p>

    <input type="file" id="csvFile" accept=".csv" />
    <button id="uploadBtn" disabled>☁️ 最新データをクラウドへ保存</button>

    <hr class="divider">

    <p style="color:#ff8a80;text-align:left;font-size:13px;">⚠️ Firebase上のステータス「完了」案件を一括削除します（「下見完了」は削除しません）</p>
    <button id="cleanBtn" class="danger" disabled>🗑 Firebase上の「完了」案件を一括削除</button>

    <div class="log" id="logArea"></div>
  </div>

  <script>
    var firebaseConfig={apiKey:"AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",authDomain:"project-6745138395263517914.firebaseapp.com",databaseURL:"https://project-6745138395263517914-default-rtdb.firebaseio.com",projectId:"project-6745138395263517914",storageBucket:"project-6745138395263517914.firebasestorage.app",messagingSenderId:"1054295910908",appId:"1:1054295910908:web:4072df05bd90bbdc896a79"};
    if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
    var database=firebase.database();

    firebase.auth().signInAnonymously()
      .then(function(){
        document.getElementById('authStatus').textContent='✅ 認証済み';
        document.getElementById('authStatus').style.color='#66bb6a';
        document.getElementById('uploadBtn').disabled=false;
        document.getElementById('cleanBtn').disabled=false;
      })
      .catch(function(err){
        document.getElementById('authStatus').textContent='❌ 認証失敗: '+err.message;
        document.getElementById('authStatus').style.color='#ff6b6b';
      });

    var logEl=document.getElementById('logArea');
    function log(msg,cls){logEl.style.display='block';logEl.innerHTML+='<div class="'+(cls||'info')+'">'+msg+'</div>';logEl.scrollTop=logEl.scrollHeight;}

    // ===== 地番→座標変換ロジック =====
    var chibanData = null;

    var KANJI_MAP = {'1':'一','2':'二','3':'三','4':'四','5':'五',
      '6':'六','7':'七','8':'八','9':'九','10':'十',
      '11':'十一','12':'十二','13':'十三','14':'十四','15':'十五',
      '16':'十六','17':'十七','18':'十八','19':'十九','20':'二十',
      '21':'二十一','22':'二十二','23':'二十三','24':'二十四','25':'二十五'};

    function numToKanji(n){ return KANJI_MAP[String(n)] || String(n); }

    function parseAddressToKey(addr){
      if(!addr) return null;
      addr = addr.replace(/[０-９]/g, function(c){ return String.fromCharCode(c.charCodeAt(0)-0xFEE0); });
      addr = addr.replace(/\s+/g,'').replace(/[－ー―]/g,'-');
      addr = addr.replace(/^北海道札幌市\S+区/,'');
      // マンション名除去
      addr = addr.replace(/(\d+[-－]\d+)[^丁目条\d].+$/,'$1');

      // 「番」形式を先にチェック: 大字名+数字+条+方角+丁目+数字番数字
      var mb = addr.match(/^(.+?)(\d+)条([東西南北]?)(\d+)丁目(\d+)番(\d+)/);
      if(mb){
        var daiji = mb[1]+numToKanji(parseInt(mb[2]))+'条'+mb[3];
        return daiji+'_'+mb[4]+'_'+mb[5]+'-'+mb[6];
      }

      // 通常パターン: 数字-数字
      var m = addr.match(/^(.+?)(\d+)条([東西南北]?)(\d+)丁目(\d+(?:-\d+)?)/);
      if(!m) return null;
      var daiji = m[1]+numToKanji(parseInt(m[2]))+'条'+m[3];
      return daiji+'_'+m[4]+'_'+m[5];
    }

    async function loadChibanData(){
      if(chibanData) return chibanData;
      try {
        log('📍 地番データ読み込み中...');
        var res = await fetch('https://kageyama1202.github.io/my-sheet/chiban.json.gz');
        var buf = await res.arrayBuffer();
        var ds = new DecompressionStream('gzip');
        var writer = ds.writable.getWriter();
        var reader = ds.readable.getReader();
        writer.write(new Uint8Array(buf));
        writer.close();
        var chunks = [], total = 0;
        while(true){
          var r = await reader.read();
          if(r.done) break;
          chunks.push(r.value);
          total += r.value.length;
        }
        var merged = new Uint8Array(total), offset = 0;
        chunks.forEach(function(c){merged.set(c,offset);offset+=c.length;});
        chibanData = JSON.parse(new TextDecoder().decode(merged));
        log('✅ 地番データ読み込み完了 (' + Object.keys(chibanData).length + '件)', 'ok');
        return chibanData;
      } catch(e) {
        log('⚠️ 地番データ読み込み失敗: ' + e, 'warn');
        return null;
      }
    }

    function lookupChiban(addr){
      if(!chibanData) return null;
      var key = parseAddressToKey(addr);
      if(!key) return null;
      var v = chibanData[key];
      if(v) return {lat: v[0], lng: v[1]};
      return null;
    }
    // ===== ここまで地番ロジック =====

    function isKanryo(cols){
      var status=String(cols[1]||'').trim();
      return status==='完了';
    }

    function parseCSV(text){
      var result=[],row=[],col='',insideQuotes=false;
      for(var i=0;i<text.length;i++){
        var c=text.charAt(i),nc=text.charAt(i+1);
        if(c==='"'&&insideQuotes&&nc==='"'){col+='"';i++;}
        else if(c==='"'){insideQuotes=!insideQuotes;}
        else if(c===','&&!insideQuotes){row.push(col);col='';}
        else if((c==='\n'||c==='\r')&&!insideQuotes){if(c==='\r'&&nc==='\n')i++;row.push(col);result.push(row);row=[];col='';}
        else{col+=c;}
      }
      if(col!==''||row.length>0){row.push(col);result.push(row);}
      return result;
    }

    var invalidChars=/[.#$\[\]\/]/g;
    function safeKey(id){return String(id).replace(/\s+/g,'').replace(invalidChars,'_');}

    var LOCAL_FIELDS=['localStatus','date','time','order','emailSent','finalReport','memo','seqNo','lat','lng'];

    function extractLocal(obj){
      var out={};
      LOCAL_FIELDS.forEach(function(f){if(obj[f]!==undefined&&obj[f]!==null)out[f]=obj[f];});
      return out;
    }

    document.getElementById('uploadBtn').addEventListener('click', async function(){
      var fileInput=document.getElementById('csvFile');
      if(fileInput.files.length===0){alert('CSVファイルを選択してください');return;}
      var btn=this;btn.disabled=true;btn.textContent='保存中...';
      logEl.innerHTML='';logEl.style.display='block';

      // 地番データ先読み
      await loadChibanData();

      var file=fileInput.files.item(0);
      var reader=new FileReader();

      reader.onload=function(e){
        log('📄 CSV読み込み完了: '+file.name);
        var lines=parseCSV(e.target.result);
        var validLines=lines.filter(function(l){return l.join('').replace(/\s+/g,'')!=='';});
        if(validLines.length===0){log('CSVが空です','err');btn.disabled=false;btn.textContent='☁️ 最新データをクラウドへ保存';return;}

        var headers=validLines.shift();
        log('ヘッダー: '+headers.length+'列, データ: '+validLines.length+'行');

        var newMap={};
        var skipped=0,kanryoSkipped=0;
        validLines.forEach(function(cols){
          var id=String(cols[0]||'').trim();
          if(!id){skipped++;return;}
          if(isKanryo(cols)){kanryoSkipped++;return;}
          newMap[safeKey(id)]=cols;
        });
        if(skipped>0)log('⚠ ID空白でスキップ: '+skipped+'行','warn');
        if(kanryoSkipped>0)log('✅ 「完了」ステータスをスキップ: '+kanryoSkipped+'件','ok');
        var newKeys=Object.keys(newMap);
        log('有効案件（保存対象）: '+newKeys.length+'件');

        // 地番→座標変換
        var geoHit=0, geoMiss=0;
        var geoMap={};
        if(chibanData){
          newKeys.forEach(function(nk){
            var cols=newMap[nk];
            var addr=String(cols[11]||'').trim(); // C11=住所
            var geo=lookupChiban(addr);
            if(geo){
              geoMap[nk]=geo;
              geoHit++;
            } else {
              geoMiss++;
            }
          });
          log('📍 座標取得: ヒット '+geoHit+'件 / スキップ '+geoMiss+'件', geoHit>0?'ok':'warn');
        }

        database.ref('app_tasks').once('value',function(sn){
          var existing=sn.val()||{};
          var existingKeys=Object.keys(existing);
          log('既存Firebase: '+existingKeys.length+'件');

          var migrated=0;
          var localDataByNewKey={};

          existingKeys.forEach(function(oldKey){
            var oldObj=existing[oldKey];
            if(!oldObj)return;
            var oldId='';
            if(oldObj.csvData&&oldObj.csvData[0])oldId=safeKey(String(oldObj.csvData[0]).trim());

            if(oldId&&newMap[oldId]){
              var ld=extractLocal(oldObj);
              if(Object.keys(ld).length>0){
                if(!localDataByNewKey[oldId])localDataByNewKey[oldId]={};
                var existing_ld=localDataByNewKey[oldId];
                LOCAL_FIELDS.forEach(function(f){
                  if(ld[f]!==undefined&&existing_ld[f]===undefined)existing_ld[f]=ld[f];
                });
                if(oldKey!==oldId)migrated++;
              }
            }
          });
          if(migrated>0)log('🔄 旧キーからローカルデータ移植: '+migrated+'件','ok');

          var updates={};
          updates['app_meta/headers']=headers;

          var addCount=0,updateCount=0;
          newKeys.forEach(function(nk){
            var path='app_tasks/'+nk+'/csvData';
            updates[path]=newMap[nk];
            if(localDataByNewKey[nk]){
              LOCAL_FIELDS.forEach(function(f){
                // lat/lngは地番データで上書きするので除外
                if(f==='lat'||f==='lng') return;
                if(localDataByNewKey[nk][f]!==undefined)updates['app_tasks/'+nk+'/'+f]=localDataByNewKey[nk][f];
              });
            }
            // 地番ヒットした案件はlat/lngをセット（既存のlat/lngがない場合のみ）
            if(geoMap[nk]){
              var existLat = existing[nk] && existing[nk].lat;
              if(!existLat){
                updates['app_tasks/'+nk+'/lat']=geoMap[nk].lat;
                updates['app_tasks/'+nk+'/lng']=geoMap[nk].lng;
              }
            }
            if(existing[nk])updateCount++;else addCount++;
          });

          var delCount=0;
          existingKeys.forEach(function(oldKey){
            if(newMap[oldKey])return;
            var oldObj=existing[oldKey];
            var oldId='';
            if(oldObj&&oldObj.csvData&&oldObj.csvData[0])oldId=safeKey(String(oldObj.csvData[0]).trim());
            if(oldId&&newMap[oldId]){
              updates['app_tasks/'+oldKey]=null;
              delCount++;
            }else{
              updates['app_tasks/'+oldKey]=null;
              delCount++;
            }
          });

          log('➕ 新規: '+addCount+' / 🔄 更新: '+updateCount+' / 🗑 削除: '+delCount);

          var oldToNewKeyMap={};
          existingKeys.forEach(function(oldKey){
            var oldObj=existing[oldKey];
            if(!oldObj||!oldObj.csvData||!oldObj.csvData[0])return;
            var newKey=safeKey(String(oldObj.csvData[0]).trim());
            if(oldKey!==newKey&&newMap[newKey])oldToNewKeyMap[oldKey]=newKey;
          });

          var refFixCount=0;
          function fixRefs(basePath,callback){
            if(Object.keys(oldToNewKeyMap).length===0){callback();return;}
            database.ref(basePath).once('value',function(snap){
              var data=snap.val()||{};
              Object.keys(data).forEach(function(k){
                var ac=data[k].assignedCase;
                if(ac&&oldToNewKeyMap[ac]){
                  updates[basePath+'/'+k+'/assignedCase']=oldToNewKeyMap[ac];
                  refFixCount++;
                }
              });
              callback();
            });
          }

          fixRefs('app_communications',function(){
            fixRefs('app_parked_mails',function(){
              if(refFixCount>0)log('🔗 assignedCase参照修正: '+refFixCount+'件','ok');

              log('☁️ Firebaseへ書き込み中...');
              database.ref().update(updates).then(function(){
                log('✅ 保存完了！','ok');
                alert('✅ 保存完了！\n\n新規: '+addCount+' / 更新: '+updateCount+' / 削除: '+delCount+'\n「完了」スキップ: '+kanryoSkipped+'件\n座標取得: '+geoHit+'件'+(migrated>0?'\nローカルデータ移植: '+migrated+'件':''));
                btn.disabled=false;btn.textContent='☁️ 最新データをクラウドへ保存';fileInput.value='';
              }).catch(function(err){
                log('❌ エラー: '+err,'err');
                alert('エラー: '+err);
                btn.disabled=false;btn.textContent='☁️ 最新データをクラウドへ保存';
              });
            });
          });
        });
      };
      reader.readAsText(file,'UTF-8');
    });

    document.getElementById('cleanBtn').addEventListener('click',function(){
      if(!confirm('Firebase上のステータス「完了」案件を削除します。\n（「下見完了」は削除しません）\n\nよろしいですか？'))return;
      var btn=this;btn.disabled=true;btn.textContent='削除中...';
      logEl.innerHTML='';logEl.style.display='block';
      log('🔍 Firebase全案件をスキャン中...');

      database.ref('app_tasks').once('value',function(sn){
        var existing=sn.val()||{};
        var keys=Object.keys(existing);
        log('取得: '+keys.length+'件');

        var updates={};
        var delCount=0;
        keys.forEach(function(k){
          var obj=existing[k];
          if(!obj||!obj.csvData)return;
          var status=String(obj.csvData[1]||'').trim();
          if(status==='完了'){
            updates['app_tasks/'+k]=null;
            delCount++;
          }
        });

        if(delCount===0){
          log('「完了」案件は見つかりませんでした','warn');
          btn.disabled=false;btn.textContent='🗑 Firebase上の「完了」案件を一括削除';
          return;
        }

        log('🗑 削除対象: '+delCount+'件');
        database.ref().update(updates).then(function(){
          log('✅ 削除完了！ '+delCount+'件を削除しました','ok');
          alert('✅ 削除完了！\n\n「完了」案件 '+delCount+'件を削除しました');
          btn.disabled=false;btn.textContent='🗑 Firebase上の「完了」案件を一括削除';
        }).catch(function(err){
          log('❌ エラー: '+err,'err');
          alert('エラー: '+err);
          btn.disabled=false;btn.textContent='🗑 Firebase上の「完了」案件を一括削除';
        });
      });
    });
  </script>
</body>
</html>
