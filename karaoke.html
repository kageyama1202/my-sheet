<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>カラオケ採点</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --muted: #666;
    --green: #1DB954;
    --green-dim: rgba(29,185,84,0.15);
    --amber: #f59e0b;
    --red: #ef4444;
    --blue: #3b82f6;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--sans); }
  body { padding: 16px; padding-bottom: 40px; max-width: 480px; margin: 0 auto; }

  .logo { text-align: center; padding: 20px 0 16px; }
  .logo-text { font-family: var(--mono); font-size: 10px; letter-spacing: 0.35em; color: var(--muted); text-transform: uppercase; }
  .logo-title { font-size: 22px; font-weight: 500; color: var(--text); margin-top: 4px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 10px; }
  .card-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }

  .pitch-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .pitch-note { font-family: var(--mono); font-size: 52px; font-weight: 500; line-height: 1; min-width: 90px; color: var(--text); transition: color 0.1s; }
  .pitch-note.good { color: var(--green); }
  .pitch-note.warn { color: var(--amber); }
  .pitch-note.bad { color: var(--red); }
  .pitch-detail { flex: 1; }
  .pitch-hz { font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .pitch-cent { font-family: var(--mono); font-size: 12px; margin-top: 3px; }
  .cent-good { color: var(--green); }
  .cent-warn { color: var(--amber); }
  .cent-bad { color: var(--red); }

  .vol-wrap { margin-bottom: 6px; }
  .bar-track { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; width: 0%; border-radius: 2px; transition: width 0.06s; background: var(--green); }
  .bar-lbl { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 3px; }

  canvas { display: block; border-radius: 8px; }
  #waveCanvas { width: 100%; height: 52px; margin-bottom: 8px; }
  #pitchCanvas { width: 100%; height: 100px; }
  #radarCanvas { width: 100%; height: 200px; }

  .score-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 0; }
  .score-item { background: var(--surface2); border-radius: 10px; padding: 12px; text-align: center; }
  .score-val { font-family: var(--mono); font-size: 26px; font-weight: 500; color: var(--text); }
  .score-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .result-top { text-align: center; padding: 12px 0 8px; }
  .result-num { font-family: var(--mono); font-size: 80px; font-weight: 500; color: var(--green); line-height: 1; }
  .result-rank { font-family: var(--mono); font-size: 13px; letter-spacing: 0.25em; color: var(--muted); margin-top: 6px; }
  .result-bars { margin-top: 14px; }
  .rb-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .rb-label { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 56px; text-align: right; flex-shrink: 0; }
  .rb-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .rb-fill { height: 100%; border-radius: 3px; width: 0%; transition: width 1s ease; }
  .rb-val { font-family: var(--mono); font-size: 11px; color: var(--text); width: 36px; flex-shrink: 0; }

  .btn { display: block; width: 100%; padding: 16px; font-family: var(--sans); font-size: 15px; font-weight: 500; background: transparent; border: 1px solid var(--border2); border-radius: 12px; color: var(--text); cursor: pointer; margin-bottom: 8px; transition: background 0.15s, transform 0.1s; }
  .btn:active { transform: scale(0.97); background: var(--surface2); }
  .btn:disabled { opacity: 0.3; }
  .btn.go { border-color: rgba(29,185,84,0.5); color: var(--green); }
  .btn.danger { border-color: rgba(239,68,68,0.4); color: var(--red); }

  .status-bar { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: center; padding: 6px 0 10px; min-height: 26px; }
  .status-bar.ok { color: var(--green); }
  .status-bar.warn { color: var(--amber); }

  .hidden { display: none !important; }

  .tip { font-size: 12px; color: var(--muted); text-align: center; padding: 6px 0 10px; line-height: 1.6; }
</style>
</head>
<body>

<div class="logo">
  <div class="logo-text">Karaoke Scorer</div>
  <div class="logo-title">カラオケ採点</div>
</div>

<div class="status-bar" id="statusBar">マイク開始をタップしてください</div>

<div class="card">
  <div class="card-label">ピッチ</div>
  <div class="pitch-row">
    <div class="pitch-note" id="noteDisp">—</div>
    <div class="pitch-detail">
      <div class="pitch-hz" id="hzDisp">— Hz</div>
      <div class="pitch-cent cent-good" id="centDisp">— cent</div>
    </div>
  </div>
  <div class="vol-wrap">
    <div class="bar-track"><div class="bar-fill" id="volBar"></div></div>
    <div class="bar-lbl"><span>音量</span><span id="volPct">0%</span></div>
  </div>
  <canvas id="waveCanvas" width="448" height="52"></canvas>
</div>

<div class="card">
  <div class="card-label">ピッチグラフ（歌唱中）</div>
  <canvas id="pitchCanvas" width="448" height="100"></canvas>
</div>

<div class="card">
  <div class="card-label">採点データ</div>
  <div class="score-grid">
    <div class="score-item"><div class="score-val" id="sPitch">—</div><div class="score-lbl">音程</div></div>
    <div class="score-item"><div class="score-val" id="sStab">—</div><div class="score-lbl">安定性</div></div>
    <div class="score-item"><div class="score-val" id="sVib">—</div><div class="score-lbl">ビブラート</div></div>
    <div class="score-item"><div class="score-val" id="sTime">0s</div><div class="score-lbl">歌唱時間</div></div>
  </div>
</div>

<div class="card hidden" id="resultCard">
  <div class="card-label">結果</div>
  <div class="result-top">
    <div class="result-num" id="rTotal">—</div>
    <div class="result-rank" id="rRank">—</div>
  </div>
  <div class="result-bars">
    <div class="rb-row">
      <div class="rb-label">音程</div>
      <div class="rb-track"><div class="rb-fill" id="rbPitch" style="background:#1DB954"></div></div>
      <div class="rb-val" id="rvPitch">—</div>
    </div>
    <div class="rb-row">
      <div class="rb-label">安定性</div>
      <div class="rb-track"><div class="rb-fill" id="rbStab" style="background:#3b82f6"></div></div>
      <div class="rb-val" id="rvStab">—</div>
    </div>
    <div class="rb-row">
      <div class="rb-label">ビブラート</div>
      <div class="rb-track"><div class="rb-fill" id="rbVib" style="background:#f59e0b"></div></div>
      <div class="rb-val" id="rvVib">—</div>
    </div>
    <div class="rb-row">
      <div class="rb-label">総合</div>
      <div class="rb-track"><div class="rb-fill" id="rbTotal" style="background:#ef4444"></div></div>
      <div class="rb-val" id="rvTotal">—</div>
    </div>
  </div>
  <canvas id="radarCanvas" width="448" height="200" style="margin-top:14px;"></canvas>
</div>

<button class="btn" id="micBtn" onclick="startMic()">マイク開始</button>
<button class="btn go hidden" id="startBtn" onclick="startScore()">採点開始</button>
<button class="btn danger hidden" id="stopBtn" onclick="stopScore()">採点終了 · 結果表示</button>
<div class="tip" id="tipArea">Spotifyや音楽アプリで曲を流し、イヤホンで聴きながら歌ってください</div>

<script>
var NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
var audioCtx = null;
var analyser = null;
var scoring = false;
var startTime = 0;
var pitchOk = 0, pitchTotal = 0;
var freqHistory = [];
var pitchLog = [];
var vibCount = 0, vibDir = 0;
var volHistory = [];

function setStatus(msg, cls) {
  var el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = 'status-bar' + (cls ? ' ' + cls : '');
}

function acf(buf, sr) {
  var N = buf.length, rms = 0;
  for (var i = 0; i < N; i++) rms += buf[i]*buf[i];
  rms = Math.sqrt(rms/N);
  if (rms < 0.008) return -1;
  var c = new Float32Array(N);
  for (var i = 0; i < N; i++)
    for (var j = 0; j < N-i; j++)
      c[i] += buf[j]*buf[j+i];
  var d = 0;
  while (d < N-2 && c[d] > c[d+1]) d++;
  var mx = -1, mp = -1;
  for (var i = d; i < N; i++) if (c[i] > mx) { mx = c[i]; mp = i; }
  if (mp < 2 || mp >= N-1) return -1;
  var a2 = (c[mp-1]+c[mp+1]-2*c[mp])/2;
  var b2 = (c[mp+1]-c[mp-1])/2;
  var T = a2 ? mp-b2/(2*a2) : mp;
  return sr/T;
}

function freq2note(f) {
  if (!f || f < 60 || f > 2000) return null;
  var n = 12*Math.log2(f/440)+69;
  var r = Math.round(n);
  return { name: NOTE_NAMES[((r%12)+12)%12]+(Math.floor(r/12)-1), midi: r, cents: Math.round((n-r)*100) };
}

async function startMic() {
  try {
    var stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
      video: false
    });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    src.connect(analyser);
    document.getElementById('micBtn').classList.add('hidden');
    document.getElementById('startBtn').classList.remove('hidden');
    document.getElementById('tipArea').textContent = '採点開始をタップして歌い始めてください';
    setStatus('マイク接続済み', 'ok');
    drawLoop();
  } catch(e) {
    setStatus('マイクエラー: ' + e.message, 'warn');
  }
}

function drawLoop() {
  requestAnimationFrame(drawLoop);
  if (!analyser) return;
  var buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);

  var rms = 0;
  for (var i = 0; i < buf.length; i++) rms += buf[i]*buf[i];
  rms = Math.sqrt(rms/buf.length);
  var vol = Math.min(100, Math.round(rms*500));
  document.getElementById('volBar').style.width = vol+'%';
  document.getElementById('volBar').style.background = vol>60?'#1DB954':vol>20?'#f59e0b':'#555';
  document.getElementById('volPct').textContent = vol+'%';

  var f = acf(buf, audioCtx.sampleRate);
  var note = f > 0 ? freq2note(f) : null;

  if (note) {
    var ac = Math.abs(note.cents);
    var noteEl = document.getElementById('noteDisp');
    noteEl.textContent = note.name;
    noteEl.className = 'pitch-note ' + (ac<20?'good':ac<40?'warn':'bad');
    document.getElementById('hzDisp').textContent = Math.round(f)+' Hz';
    var cEl = document.getElementById('centDisp');
    cEl.textContent = (note.cents>=0?'+':'')+note.cents+' cent';
    cEl.className = 'pitch-cent '+(ac<20?'cent-good':ac<40?'cent-warn':'cent-bad');

    if (scoring) {
      pitchTotal++;
      if (ac<30) pitchOk++;
      freqHistory.push(f);
      pitchLog.push({ t: Date.now()-startTime, midi: note.midi, cents: note.cents, vol: vol });
      volHistory.push(vol);

      if (freqHistory.length>2) {
        var diff = f-freqHistory[freqHistory.length-2];
        var dir = diff>1?1:diff<-1?-1:0;
        if (dir!==0&&dir!==vibDir){vibCount++;vibDir=dir;}
      }
      var elapsed = Math.round((Date.now()-startTime)/1000);
      document.getElementById('sTime').textContent = elapsed+'s';
      if (pitchTotal>0) document.getElementById('sPitch').textContent = Math.round(pitchOk/pitchTotal*100)+'%';
      if (freqHistory.length>5) {
        var diffs=[];
        for (var i=1;i<freqHistory.length;i++) diffs.push(Math.abs(freqHistory[i]-freqHistory[i-1]));
        var avg=diffs.reduce(function(a,b){return a+b;},0)/diffs.length;
        document.getElementById('sStab').textContent = Math.max(0,Math.min(100,Math.round(100-avg*0.6)))+'%';
      }
      document.getElementById('sVib').textContent = Math.min(100,Math.round(vibCount/Math.max(1,(Date.now()-startTime)/1000)*5))+'%';
    }
  } else {
    if (!scoring) {
      var noteEl = document.getElementById('noteDisp');
      noteEl.textContent = '—';
      noteEl.className = 'pitch-note';
      document.getElementById('hzDisp').textContent = '— Hz';
      document.getElementById('centDisp').textContent = '— cent';
      document.getElementById('centDisp').className = 'pitch-cent cent-good';
    }
    if (scoring) pitchLog.push(null);
  }

  drawWave(buf);
  if (scoring) drawPitchGraph();
}

function drawWave(buf) {
  var canvas = document.getElementById('waveCanvas');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle = scoring ? '#1DB954' : '#2a2a2a';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (var i=0;i<buf.length;i++){
    var x=(i/buf.length)*W;
    var y=(0.5+buf[i]*0.38)*H;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
}

function drawPitchGraph() {
  var canvas = document.getElementById('pitchCanvas');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  var logs = pitchLog.filter(function(p){ return p !== null; });
  if (logs.length < 2) return;

  var midiMin = 999, midiMax = 0;
  logs.forEach(function(p){ if(p.midi<midiMin) midiMin=p.midi; if(p.midi>midiMax) midiMax=p.midi; });
  if (midiMax === midiMin) { midiMin -= 2; midiMax += 2; }
  var midiRange = midiMax - midiMin + 4;
  midiMin -= 2;

  var totalT = pitchLog[pitchLog.length-1] ? pitchLog[pitchLog.length-1].t : 1;

  ctx.strokeStyle = 'rgba(29,185,84,0.3)';
  ctx.lineWidth = 1;
  for (var midi = Math.floor(midiMin); midi <= midiMax+2; midi++) {
    var y = H - ((midi - midiMin) / midiRange) * H;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    var noteName = NOTE_NAMES[((midi%12)+12)%12];
    if (noteName.length === 1) {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = '9px ' + "'DM Mono', monospace";
      ctx.fillText(noteName, 2, y-2);
    }
  }

  ctx.beginPath();
  var first = true;
  pitchLog.forEach(function(p, i) {
    if (!p) { first = true; return; }
    var x = (p.t / Math.max(totalT,1)) * W;
    var y = H - ((p.midi - midiMin) / midiRange) * H;
    var ac = Math.abs(p.cents);
    if (first) { ctx.beginPath(); ctx.moveTo(x,y); first=false; }
    else ctx.lineTo(x,y);
  });
  ctx.strokeStyle = '#1DB954';
  ctx.lineWidth = 2;
  ctx.stroke();

  pitchLog.forEach(function(p) {
    if (!p) return;
    var x = (p.t / Math.max(totalT,1)) * W;
    var y = H - ((p.midi - midiMin) / midiRange) * H;
    var ac = Math.abs(p.cents);
    ctx.beginPath();
    ctx.arc(x, y, 2.5, 0, Math.PI*2);
    ctx.fillStyle = ac<20?'#1DB954':ac<40?'#f59e0b':'#ef4444';
    ctx.fill();
  });
}

function drawRadar(scores) {
  var canvas = document.getElementById('radarCanvas');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  var cx = W/2, cy = H/2, r = Math.min(W,H)*0.38;
  var labels = ['音程', '安定性', 'ビブラート', '音量', '持続力'];
  var vals = [scores.pitch/100, scores.stab/100, scores.vib/100, scores.vol/100, scores.dur/100];
  var n = labels.length;

  function angle(i) { return (i/n)*Math.PI*2 - Math.PI/2; }

  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  [0.25,0.5,0.75,1].forEach(function(scale) {
    ctx.beginPath();
    for (var i=0;i<n;i++){
      var a=angle(i);
      var x=cx+Math.cos(a)*r*scale;
      var y=cy+Math.sin(a)*r*scale;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath(); ctx.stroke();
  });

  for (var i=0;i<n;i++){
    var a=angle(i);
    ctx.strokeStyle='rgba(255,255,255,0.06)';
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
    ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.font='11px '+"'Noto Sans JP', sans-serif";
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    var lx=cx+Math.cos(a)*(r+18);
    var ly=cy+Math.sin(a)*(r+18);
    ctx.fillText(labels[i], lx, ly);
  }

  ctx.beginPath();
  for (var i=0;i<n;i++){
    var a=angle(i);
    var x=cx+Math.cos(a)*r*vals[i];
    var y=cy+Math.sin(a)*r*vals[i];
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(29,185,84,0.2)';
  ctx.fill();
  ctx.strokeStyle='#1DB954';
  ctx.lineWidth=2;
  ctx.stroke();

  for (var i=0;i<n;i++){
    var a=angle(i);
    var x=cx+Math.cos(a)*r*vals[i];
    var y=cy+Math.sin(a)*r*vals[i];
    ctx.beginPath();
    ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle='#1DB954';
    ctx.fill();
  }
}

function startScore() {
  scoring=true; startTime=Date.now();
  pitchOk=0; pitchTotal=0; freqHistory=[]; pitchLog=[];
  vibCount=0; vibDir=0; volHistory=[];
  document.getElementById('startBtn').classList.add('hidden');
  document.getElementById('stopBtn').classList.remove('hidden');
  document.getElementById('resultCard').classList.add('hidden');
  document.getElementById('tipArea').textContent = '歌っています...';
  setStatus('採点中...', 'ok');
}

function stopScore() {
  scoring=false;
  document.getElementById('startBtn').classList.remove('hidden');
  document.getElementById('stopBtn').classList.add('hidden');

  if (pitchTotal<10){
    setStatus('データ不足。もう少し長く歌ってください。','warn');
    return;
  }

  var pScore=Math.round(pitchOk/pitchTotal*100);

  var diffs=[];
  for (var i=1;i<freqHistory.length;i++) diffs.push(Math.abs(freqHistory[i]-freqHistory[i-1]));
  var avgDiff=diffs.length?diffs.reduce(function(a,b){return a+b;},0)/diffs.length:0;
  var sScore=Math.max(0,Math.min(100,Math.round(100-avgDiff*0.6)));

  var elapsed=Math.round((Date.now()-startTime)/1000);
  var vScore=Math.min(100,Math.round(vibCount/Math.max(1,elapsed)*5));

  var avgVol = volHistory.length ? Math.round(volHistory.reduce(function(a,b){return a+b;},0)/volHistory.length) : 0;

  var durScore = Math.min(100, Math.round(elapsed/60*100));

  var total=Math.round(pScore*0.45+sScore*0.25+vScore*0.1+avgVol*0.1+durScore*0.1);

  var ranks=[[95,'PERFECT'],[85,'EXCELLENT'],[75,'GREAT'],[60,'GOOD'],[0,'KEEP GOING']];
  var rank=ranks.find(function(r){return total>=r[0];})[1];

  document.getElementById('rTotal').textContent=total;
  document.getElementById('rRank').textContent=rank;

  document.getElementById('rbPitch').style.width=pScore+'%';
  document.getElementById('rvPitch').textContent=pScore;
  document.getElementById('rbStab').style.width=sScore+'%';
  document.getElementById('rvStab').textContent=sScore;
  document.getElementById('rbVib').style.width=vScore+'%';
  document.getElementById('rvVib').textContent=vScore;
  document.getElementById('rbTotal').style.width=total+'%';
  document.getElementById('rvTotal').textContent=total;

  document.getElementById('resultCard').classList.remove('hidden');

  setTimeout(function(){
    drawRadar({ pitch:pScore, stab:sScore, vib:vScore, vol:avgVol, dur:durScore });
  }, 100);

  document.getElementById('tipArea').textContent = 'もう一度歌うには「採点開始」をタップ';
  setStatus('採点完了');
}
</script>
</body>
</html>
