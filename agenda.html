<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic Pro','Meiryo',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;}

.header{background:#111827;border-bottom:2px solid #1e40af;padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.header a{color:#60a5fa;text-decoration:none;font-size:13px;font-weight:bold;}
.header-title{font-size:15px;font-weight:bold;color:#e2e8f0;flex:1;}
.header-date{font-size:11px;color:#94a3b8;background:#1e293b;padding:3px 10px;border-radius:10px;}
.btn-settings{background:rgba(255,255,255,0.1);color:#94a3b8;border:none;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;}
.btn-settings:hover{background:rgba(255,255,255,0.2);}

/* 設定モーダル */
.settings-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9998;}
.settings-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e293b;border:1px solid #334155;padding:20px;border-radius:10px;width:90%;max-width:380px;z-index:9999;}
.settings-modal h3{margin:0 0 14px;font-size:15px;color:#e2e8f0;}
.settings-modal label{font-size:11px;color:#94a3b8;display:block;margin-bottom:4px;}
.settings-modal input{width:100%;padding:8px 10px;background:#0f1117;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:13px;margin-bottom:12px;}
.settings-modal .modal-btns{display:flex;gap:8px;}
.settings-modal .modal-btns button{flex:1;padding:8px;border:none;border-radius:6px;font-size:13px;font-weight:bold;cursor:pointer;}

.status-bar{background:#0d1117;border-bottom:1px solid #1f2937;padding:7px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:11px;color:#64748b;position:sticky;top:45px;z-index:99;}
.ok{color:#34d399;}.warn{color:#f59e0b;}.err{color:#f87171;}

.gen-area{padding:12px 16px;background:#111827;border-bottom:1px solid #1f2937;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.btn-gen{background:#1d4ed8;color:#fff;border:none;padding:9px 22px;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;transition:background 0.2s;}
.btn-gen:hover{background:#2563eb;}
.btn-gen:disabled{background:#374151;color:#6b7280;cursor:not-allowed;}
.gen-note{font-size:11px;color:#64748b;flex:1;}

.loading-wrap{text-align:center;padding:60px 20px;}
.spin{display:inline-block;width:26px;height:26px;border:3px solid #1e40af;border-top-color:#60a5fa;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-wrap p{color:#60a5fa;font-size:14px;display:inline;vertical-align:middle;}

.summary-card{margin:14px 14px 0;background:#111827;border:1px solid #1e40af;border-radius:10px;overflow:hidden;}
.summary-header{background:#1e3a5f;padding:10px 16px;font-size:13px;font-weight:bold;color:#bfdbfe;}
.summary-body{padding:12px 16px;font-size:13px;color:#cbd5e1;line-height:1.8;}

.day-block{margin:12px 14px 0;}
.day-label{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:8px 8px 0 0;font-size:13px;font-weight:bold;}
.day-label.d0{background:#1e3a5f;border-left:4px solid #3b82f6;color:#bfdbfe;}
.day-label.d1{background:#1a2e1a;border-left:4px solid #22c55e;color:#bbf7d0;}
.day-label.d2{background:#2d1f3d;border-left:4px solid #a78bfa;color:#e9d5ff;}
.day-theme{font-size:11px;color:rgba(255,255,255,0.5);font-weight:normal;}
.day-meta{font-size:11px;background:rgba(255,255,255,0.08);padding:2px 8px;border-radius:8px;margin-left:auto;white-space:nowrap;}

.cases-wrap{background:#111827;border-radius:0 0 8px 8px;border:1px solid #1f2937;border-top:none;overflow:hidden;margin-bottom:4px;}
.day-notes{padding:8px 14px;font-size:11px;color:#64748b;background:#0d1117;border-top:1px solid #1f2937;}

.case-card{display:flex;align-items:stretch;min-height:56px;border-bottom:1px solid #1a2234;transition:background 0.15s;}
.case-card:last-child{border-bottom:none;}
.case-card:hover{background:#1a2234;}
.case-card.fixed-time{border-left:3px solid #f59e0b;}
.case-card.urgent{border-left:3px solid #ef4444;}
.case-card.proposed{border-left:3px solid #22c55e;}

.case-num{width:32px;min-width:32px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:bold;color:#60a5fa;background:#0d1117;}

.case-times{width:58px;min-width:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 2px;border-right:1px solid #1f2937;}
.t-arrive{font-size:11px;font-weight:bold;color:#fbbf24;}
.t-leave{font-size:10px;color:#64748b;}
.t-travel{font-size:9px;color:#475569;margin-top:2px;}

.case-body{flex:1;padding:7px 8px 7px 10px;min-width:0;cursor:pointer;}
.case-body:hover .case-title{color:#60a5fa;text-decoration:underline;}
.case-body-plain{flex:1;padding:7px 8px 7px 10px;min-width:0;}

.case-head{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:3px;}
.badge{display:inline-block;font-size:10px;font-weight:bold;padding:1px 5px;border-radius:3px;white-space:nowrap;}
.badge-fixed{background:#78350f;color:#fde68a;}
.badge-urgent{background:#7f1d1d;color:#fca5a5;}
.badge-personal{background:#2d1b4e;color:#c4b5fd;}
.badge-reform{background:#1e3a5f;color:#93c5fd;}
.badge-new{background:#2d2a1a;color:#fbbf24;}
.badge-proposed{background:#14532d;color:#86efac;}

.case-title{font-size:13px;font-weight:bold;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.case-sub{font-size:11px;color:#64748b;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.area{color:#34d399;}
.ai-r{color:#94a3b8;font-style:italic;}
.lock{color:#f59e0b;}

.btn-map{flex-shrink:0;align-self:center;margin:0 10px;background:#065f46;color:#6ee7b7;border:none;padding:6px 10px;border-radius:6px;font-size:11px;font-weight:bold;cursor:pointer;white-space:nowrap;text-decoration:none;display:flex;align-items:center;gap:3px;transition:background 0.15s;}
.btn-map:hover{background:#047857;}

.deferred-block{margin:12px 14px;background:#111827;border:1px solid #374151;border-radius:8px;overflow:hidden;}
.deferred-header{background:#1f2937;padding:8px 14px;font-size:12px;font-weight:bold;color:#9ca3af;}
.deferred-item{padding:7px 14px;border-bottom:1px solid #1f2937;font-size:12px;color:#64748b;}
.deferred-item:last-child{border-bottom:none;}
.deferred-item span{color:#94a3b8;}

.notes-card{margin:0 14px 14px;background:#111827;border:1px solid #374151;border-radius:8px;padding:12px 14px;font-size:12px;color:#64748b;line-height:1.7;}

.empty-msg{padding:40px;text-align:center;font-size:13px;color:#4b5563;}
.error-msg{margin:14px;padding:14px;background:#1f0a0a;border:1px solid #7f1d1d;border-radius:8px;font-size:13px;color:#fca5a5;}
.bottom-pad{height:40px;}

/* ===== 保存ボタン ===== */
.btn-save{background:#065f46;color:#6ee7b7;border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;transition:background 0.2s;}
.btn-save:hover{background:#047857;}
.btn-save:disabled{background:#374151;color:#6b7280;cursor:not-allowed;}
.save-notice{position:fixed;bottom:16px;right:16px;background:#065f46;color:#6ee7b7;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:bold;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:9999;}
.save-notice.show{opacity:1;}

/* ===== タイムライン ===== */
.tl-wrap{margin:14px;}
.tl-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.tl-tab{padding:6px 16px;border-radius:20px;border:2px solid #1e40af;background:#111827;color:#60a5fa;font-size:12px;font-weight:bold;cursor:pointer;}
.tl-tab.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8;}
.tl-empty{text-align:center;padding:30px;font-size:12px;color:#4b5563;}

.tl-day{display:none;}
.tl-day.active{display:block;}

.tl-item{display:flex;gap:0;margin-bottom:0;position:relative;}
.tl-item:not(:last-child) .tl-line::after{content:'';position:absolute;left:50%;top:28px;bottom:-8px;width:2px;background:#1e40af;transform:translateX(-50%);}
.tl-line{width:40px;min-width:40px;display:flex;flex-direction:column;align-items:center;padding-top:6px;position:relative;}
.tl-dot{width:14px;height:14px;border-radius:50%;border:2px solid #3b82f6;background:#0f1117;flex-shrink:0;}
.tl-dot.fixed{border-color:#f59e0b;background:#78350f;}
.tl-dot.urgent{border-color:#ef4444;background:#7f1d1d;}
.tl-dot.personal{border-color:#a78bfa;background:#2d1b4e;}

.tl-card{flex:1;background:#111827;border:1px solid #1f2937;border-radius:8px;margin-bottom:8px;overflow:hidden;}
.tl-card-head{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #1f2937;}
.tl-time-range{font-size:12px;font-weight:bold;color:#fbbf24;white-space:nowrap;}
.tl-travel-badge{font-size:10px;color:#475569;background:#0d1117;padding:1px 6px;border-radius:4px;}
.tl-card-body{padding:6px 12px 8px;}
.tl-title{font-size:13px;font-weight:bold;color:#e2e8f0;}
.tl-sub{font-size:11px;color:#64748b;margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.tl-sub .area{color:#34d399;}
.tl-sub .ai-r{color:#94a3b8;font-style:italic;}
.tl-card-foot{display:flex;align-items:center;justify-content:space-between;padding:4px 12px 8px;}
.tl-end-time{font-size:10px;color:#475569;}

/* 合計バー */
.tl-summary{background:#0d1117;border:1px solid #1e40af;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;gap:14px;flex-wrap:wrap;font-size:12px;}
.tl-summary span{color:#60a5fa;font-weight:bold;}
.tl-summary label{color:#64748b;}
</style>
</head>

<!-- タイムライン表示エリア -->
<div id="timelineArea" style="display:none;">
  <div style="margin:14px 14px 0;display:flex;align-items:center;justify-content:space-between;">
    <div style="font-size:13px;font-weight:bold;color:#60a5fa;">📅 保存済みタイムライン</div>
    <div style="font-size:11px;color:#475569;" id="tlSavedAt"></div>
  </div>
  <div class="tl-wrap">
    <div class="tl-tabs" id="tlTabs"></div>
    <div id="tlContent"></div>
  </div>
</div>

<div class="save-notice" id="saveNotice">💾 プラン保存完了</div>
<div class="bottom-pad"></div>

<script>
// ==================== FIREBASE ====================
var firebaseConfig = {
  apiKey: "AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",
  authDomain: "project-6745138395263517914.firebaseapp.com",
  databaseURL: "https://project-6745138395263517914-default-rtdb.firebaseio.com",
  projectId: "project-6745138395263517914",
  storageBucket: "project-6745138395263517914.firebasestorage.app",
  messagingSenderId: "1054295910908",
  appId: "1:1054295910908:web:4072df05bd90bbdc896a79"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ==================== GLOBALS ====================
var raw7day = null;
var globalTasks = {};
var globalHeaders = [];
var fullData = null;
var HOME = localStorage.getItem('homeAddress') || '札幌市白石区栄通18丁目4-17';

// ==================== 移動時間テーブル（白石区出発・片道分） ====================
var AREA_TABLE = [
  { keys: ['千歳','恵庭','苫小牧'],           min: 55 },
  { keys: ['当別','小樽','岩見沢','北広島'],   min: 40 },
  { keys: ['江別','石狩'],                     min: 30 },
  { keys: ['手稲','南区','清田','西区'],       min: 20 },
  { keys: ['白石','厚別','豊平','東区','中央区','北区'], min: 15 }
];
var DEFAULT_TRAVEL = 20;
var STAY_MIN = 25;
var PERSONAL_MIN = 60;

function getTravelMin(addr) {
  if (!addr) return DEFAULT_TRAVEL;
  for (var i = 0; i < AREA_TABLE.length; i++) {
    for (var j = 0; j < AREA_TABLE[i].keys.length; j++) {
      if (addr.indexOf(AREA_TABLE[i].keys[j]) >= 0) return AREA_TABLE[i].min;
    }
  }
  return DEFAULT_TRAVEL;
}

function trimAddr(addr) {
  if (!addr) return '';
  var a = addr.replace(/\s+/g,'').replace(/^北海道/,'').replace(/^札幌市/,'');
  var m = a.match(/^(.+?丁目)/);
  if (m) return m[1];
  var m2 = a.match(/^(.{2,8}[区市町村])/);
  if (m2) return m2[1];
  return a.slice(0,15);
}

// ==================== DATE HELPERS ====================
function todayStr() {
  return new Date(new Date().getTime() + 9*3600000).toISOString().slice(0,10);
}
function addDays(s, n) {
  var d = new Date(s + 'T00:00:00+09:00');
  d.setDate(d.getDate() + n);
  return new Date(d.getTime() + 9*3600000).toISOString().slice(0,10);
}
function wday(s) {
  return ['日','月','火','水','木','金','土'][new Date(s+'T00:00:00+09:00').getDay()];
}
function fmtMD(s) {
  if (!s) return '';
  return parseInt(s.slice(5,7)) + '/' + parseInt(s.slice(8,10));
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==================== FIREBASE LOAD ====================
function loadData() {
  try {
    var ls = localStorage.getItem('appData');
    if (ls) {
      var ld = JSON.parse(ls);
      if (ld && ld.app_tasks) { globalTasks = ld.app_tasks; fullData = ld; }
      if (ld && ld.app_meta) globalHeaders = ld.app_meta.headers || [];
    }
  } catch(e) {}

  db.ref('app_action_7day').once('value').then(function(snap) {
    raw7day = snap.val();
    if (!raw7day || !raw7day.items || !raw7day.items.length) {
      document.getElementById('stMsg').innerHTML = '<span class="warn">⚠ データなし。7日間抽出ページで保存してください。</span>';
      document.getElementById('mainContent').innerHTML =
        '<div class="empty-msg">⚠️ app_action_7dayが空です。<br>7日間行動抽出ページで「Firebase保存」を実行してください。</div>';
      document.getElementById('genNote').textContent = 'データなし';
      return;
    }
    var n = raw7day.items.length;
    var upd = raw7day.updated ? raw7day.updated.slice(0,16).replace('T',' ') : '-';
    document.getElementById('stMsg').innerHTML =
      '<span class="ok">✓ ' + n + '件取得</span>　更新: ' + upd;
    document.getElementById('genNote').textContent = n + '件（リフォーム・新築・個人予定込み）でプラン生成';
    document.getElementById('btnGen').disabled = false;

    if (Object.keys(globalTasks).length === 0) {
      db.ref('app_tasks').once('value').then(function(s2) { globalTasks = s2.val() || {}; });
    }
    setHeader();
    document.getElementById('mainContent').innerHTML =
      '<div class="empty-msg" style="color:#475569">「Claudeでプラン生成」を押してください。</div>';
  }).catch(function(e) {
    document.getElementById('stMsg').innerHTML = '<span class="err">❌ ' + e.message + '</span>';
  });
}

function setHeader() {
  var t = todayStr();
  document.getElementById('headerDate').textContent =
    fmtMD(t)+'('+wday(t)+')〜'+fmtMD(addDays(t,2))+'('+wday(addDays(t,2))+')';
}

function openModal(key) {
  if (!globalTasks[key]) return;
  openCaseModal(key, globalTasks[key], globalHeaders, globalTasks, fullData, db, function() {});
}

// ==================== プロンプト構築 ====================
function getDayType(s) {
  var HOLIDAYS = [
    '2025-01-01','2025-01-13','2025-02-11','2025-02-24','2025-03-21',
    '2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-07-21',
    '2025-08-11','2025-09-15','2025-09-23','2025-10-13','2025-11-03','2025-11-23',
    '2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20',
    '2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-07-20',
    '2026-08-11','2026-09-21','2026-09-23','2026-10-12','2026-11-03','2026-11-23'
  ];
  var dow = new Date(s + 'T00:00:00+09:00').getDay();
  if (HOLIDAYS.indexOf(s) >= 0) return '祝日（外回り禁止）';
  if (dow === 0) return '日曜（外回り禁止）';
  if (dow === 6) return '土曜（原則外回り回避・要確認）';
  return '平日（通常稼働）';
}

function getShitamiInfo(item) {
  var csvDate = '', csvTime = '', fbDate = '', fbTime = '';
  if (item.key && globalTasks[item.key]) {
    var t = globalTasks[item.key];
    var c = t.csvData || [];
    csvDate = (c[15] ? String(c[15]).replace(/\s+/g,'') : '');
    csvTime = (c[16] ? String(c[16]).replace(/\s+/g,'') : '');
    fbDate  = (t.date  ? String(t.date).replace(/\s+/g,'')  : '');
    fbTime  = (t.time  ? String(t.time).replace(/\s+/g,'')  : '');
  }
  return {
    csvDate: csvDate, csvTime: csvTime,
    fbDate:  fbDate,  fbTime:  fbTime,
    fixedDate: csvDate || fbDate,
    fixedTime: csvTime || fbTime,
    isCSVFixed: !!(csvDate),
    isFBFixed:  !!(fbDate && !csvDate)
  };
}

function buildPrompt() {
  var today = todayStr();
  var d0 = today, d1 = addDays(today,1), d2 = addDays(today,2);
  var items = raw7day.items || [];
  var lines = [];

  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var travel = getTravelMin(it.addr);
    var stay = (it.type === 'personal') ? PERSONAL_MIN : STAY_MIN;
    var areaShort = trimAddr(it.addr);
    var isPersonal = (it.type === 'personal');
    var isUrgent   = (it.type === 'alert');
    var isReform   = (it.type === 'reform');

    var si = getShitamiInfo(it);
    var fixedDate = si.fixedDate || it.date || '';
    var fixedTime = si.fixedTime || it.time || '';
    var isTimeFixed = !!(fixedTime);
    var isDateFixed = !!(fixedDate);

    var tag = '';
    if (isPersonal) {
      tag = '[個人予定・日時絶対固定]';
    } else if (isReform) {
      if (si.isCSVFixed) tag = '[ﾘ リフォーム・CSV確定日時・最優先固定]';
      else if (si.isFBFixed) tag = '[ﾘ リフォーム・アプリ入力日時・優先固定]';
      else if (isDateFixed)  tag = '[ﾘ リフォーム・日付確定]';
      else                   tag = '[ﾘ リフォーム・日程未定・要調整]';
    } else if (isUrgent) {
      tag = '[新 緊急・訪問必要]';
    } else {
      tag = '[新 新築下見・日程調整可]';
    }

    var line = tag;
    line += ' id=' + (it.id || '');
    line += ' / 区分=' + (isReform ? 'ﾘ(リフォーム)' : isPersonal ? '個人' : '新(新築)');
    line += ' / ' + (it.title || '');
    if (si.csvDate) line += ' / CSV確定日=' + si.csvDate;
    if (si.csvTime) line += ' / CSV確定時間=' + si.csvTime + '【変更禁止】';
    if (si.fbDate && !si.csvDate) line += ' / アプリ入力日=' + si.fbDate + '(参考優先)';
    if (si.fbTime && !si.csvTime) line += ' / アプリ入力時間=' + si.fbTime + '(参考優先)';
    if (!si.csvDate && !si.fbDate && it.date) line += ' / 抽出元日付=' + it.date;
    if (!si.csvTime && !si.fbTime && it.time) line += ' / 抽出元時間=' + it.time;
    line += ' / エリア=' + (areaShort || '不明') + ' (' + (it.addr || '') + ')';
    line += ' / 移動=' + travel + '分(片道) / 滞在=' + stay + '分';
    if (it.reason) line += ' / 理由=' + it.reason;
    if (it.company) line += ' / 担当=' + it.company;
    lines.push(line);
  }

  return (
'# Kの3日間下見プラン生成\n\n' +
'## 基本情報\n' +
'今日=' + d0 + '(' + wday(d0) + ') ' + getDayType(d0) + '\n' +
'明日=' + d1 + '(' + wday(d1) + ') ' + getDayType(d1) + '\n' +
'明後日=' + d2 + '(' + wday(d2) + ') ' + getDayType(d2) + '\n' +
'出発地点: 白石区栄通18丁目（札幌市白石区）\n\n' +
'## 曜日・祝日ルール（厳守）\n' +

'・土曜: 原則外回り回避。よほど緊急でない限り自宅作業。\n' +
'  → 土曜が含まれる場合は、外回りが必要か判断しnotesに「土曜確認: 〜が必要です。外回りしますか？」と記載\n' +
'・日曜・祝日: 外回り絶対不可。下見案件を割り当て禁止\n' +
'・例外: [日時絶対固定]タグは曜日に関係なくその時間に配置（先方指定のため）\n\n' +
'## 下見日時の優先順位（重要）\n' +
'1. CSV確定日時（[CSV確定日=][CSV確定時間=]）→ 最優先・絶対固定・変更禁止\n' +
'2. アプリ入力日時（[アプリ入力日=][アプリ入力時間=]）→ 優先参考・基本その日その時間で組む\n' +
'3. 抽出元日付（7日間抽出の元日付）→ 参考程度\n' +
'4. 日時なし → 自由にエリア効率で提案\n\n' +
'## 移動時間の目安（白石区から片道）\n' +
'白石・厚別・豊平・東区・中央区・北区: 15分\n' +
'手稲・清田・南区・西区: 20分\n' +
'江別・石狩: 30分\n' +

// ==================== Claude API呼び出し ====================
function generatePlan() {
  var claudeKey = localStorage.getItem('claudeApiKey');
  if (!claudeKey) {
    document.getElementById('mainContent').innerHTML =
      '<div class="error-msg">⚠ Claude APIキー未設定。sogo.html のAPI設定から登録してください。<br>' +
      '<small style="color:#9ca3af">設定 → Claude APIキーを入力して保存</small></div>';
    return;
  }
  if (!raw7day || !raw7day.items || !raw7day.items.length) {
    document.getElementById('mainContent').innerHTML =
      '<div class="error-msg">⚠ データなし。7日間行動抽出ページで保存してください。</div>';
    return;
  }
  var btn = document.getElementById('btnGen');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';
  document.getElementById('mainContent').innerHTML =
    '<div class="loading-wrap"><span class="spin"></span><p>Claudeがエリア・時間を計算中...</p></div>';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': claudeKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 16000,
      system: 'あなたは施工スケジューリングのエキスパートです。JSONのみ出力してください。前置き・後置き・マークダウンコードブロック不要。純粋なJSONのみ返してください。',
      messages: [{ role: 'user', content: buildPrompt() }]
    })
  }).then(function(r){ return r.json(); })
  .then(function(data){
    btn.disabled = false;
    btn.textContent = '🔄 再生成';
    if (!data.content || !data.content[0]) {
      throw new Error('APIレスポンス異常: ' + JSON.stringify(data).slice(0,300));
    }
    var raw = data.content[0].text;
    var stopReason = data.stop_reason || '';
    if (stopReason !== 'end_turn') {
      document.getElementById('mainContent').innerHTML =
        '<div class="error-msg">⚠ 生成途中で停止（' + esc(stopReason) + '）。再生成してください。</div>' +
        '<div class="notes-card" style="margin-top:8px"><b style="color:#e2e8f0">生レスポンス（先頭600文字）:</b>' +
        '<br><pre style="white-space:pre-wrap;font-size:10px;color:#94a3b8;margin-top:6px">' + esc(raw.slice(0,600)) + '</pre></div>';
      return;
    }
    try {
      renderPlan(parseJson(raw));
    } catch(pe) {
      document.getElementById('mainContent').innerHTML =
        '<div class="error-msg">❌ JSONパースエラー: ' + esc(pe.message) + '</div>' +
        '<div class="notes-card" style="margin-top:8px"><b style="color:#e2e8f0">生レスポンス（先頭800文字）:</b>' +
        '<br><pre style="white-space:pre-wrap;font-size:10px;color:#94a3b8;margin-top:6px">' + esc(raw.slice(0,800)) + '</pre></div>';
    }
  }).catch(function(e){
    btn.disabled = false;
    btn.textContent = '🤖 Claudeでプラン生成';
    document.getElementById('mainContent').innerHTML =
      '<div class="error-msg">❌ エラー: ' + esc(e.message) + '</div>';
  });
}

function parseJson(raw) {
  var s = raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
  var bs = s.indexOf('{'), be = s.lastIndexOf('}');
  if (bs !== -1 && be > bs) s = s.slice(bs, be+1);
  return JSON.parse(s);
}

// ==================== IDからitem取得 ====================
function getItem(id) {
  if (!raw7day || !raw7day.items) return null;
  for (var i = 0; i < raw7day.items.length; i++) {
    if (raw7day.items[i].id === id) return raw7day.items[i];
  }
  return null;
}

function mapsUrl(addr) {
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(addr || '');
}

// ==================== RENDER ====================
function renderPlan(plan) {
  if (!plan || !plan.days) {
    document.getElementById('mainContent').innerHTML =
      '<div class="error-msg">❌ プラン解析失敗。再生成してください。</div>';
    return;
  }
  var today = todayStr();
  var html = '';

  if (plan.summary) {
    html += '<div class="summary-card">' +
      '<div class="summary-header">🤖 Claudeプラン概要</div>' +
      '<div class="summary-body">' + esc(plan.summary) + '</div></div>';
  }

  var dayClasses = ['d0','d1','d2'];

  for (var di = 0; di < plan.days.length && di < 3; di++) {
    var day = plan.days[di];
    var dc = dayClasses[di] || 'd2';
    var dateStr = day.date || addDays(today, di);
    var labelStr = esc(day.label || '') + ' ' + fmtMD(dateStr) + '(' + wday(dateStr) + ')';

    html += '<div class="day-block">';
    html += '<div class="day-label ' + dc + '">';
    html += '<span>' + labelStr + '</span>';
    if (day.theme) html += '<span class="day-theme">— ' + esc(day.theme) + '</span>';
    html += '<span class="day-meta">' + esc(String(day.total_min || '-')) + '分　〜' + esc(day.end_time || '') + '</span>';
    html += '</div>';
    html += '<div class="cases-wrap">';

    if (!day.cases || day.cases.length === 0) {
      html += '<div style="padding:14px 16px;font-size:12px;color:#4b5563;">この日の予定なし</div>';
    } else {
      for (var ci = 0; ci < day.cases.length; ci++) {
        var cas = day.cases[ci];
        var item = getItem(cas.id);
        if (!item) continue;

        var isPersonal = (item.type === 'personal');
        var isFixed    = !!(item.time);
        var isUrgent   = (item.type === 'alert');
        var isReform   = (item.type === 'reform');

        var cardCls = 'case-card';
        if (isPersonal || (isFixed && isReform)) cardCls += ' fixed-time';
        else if (isUrgent) cardCls += ' urgent';
        else cardCls += ' proposed';

        var badges = '';
        if (isPersonal)       badges += '<span class="badge badge-personal">📅 個人予定</span>';
        else if (isReform)    badges += '<span class="badge badge-reform">ﾘ リフォーム</span>';
        else if (item.type === 'newbuild') badges += '<span class="badge badge-new">新 新築</span>';
        else if (isUrgent)    badges += '<span class="badge badge-urgent">⚠ 緊急</span>';
        if (isFixed)          badges += '<span class="badge badge-fixed">🔒 時間固定</span>';
        else if (!isPersonal) badges += '<span class="badge badge-proposed">✦ AI提案</span>';

        var travelMin = cas.travel_from_prev || getTravelMin(item.addr);
        var hasKey = !!(item.key && globalTasks[item.key]);

        html += '<div class="' + cardCls + '">';
        html += '<div class="case-num">' + (cas.order || ci+1) + '</div>';
        html += '<div class="case-times">';
        html += '<div class="t-arrive">' + esc(cas.arrive || '') + '</div>';
        html += '<div class="t-leave">〜' + esc(cas.leave || '') + '</div>';
        html += '<div class="t-travel">移' + travelMin + '分</div>';
        html += '</div>';

        if (hasKey) {
          html += '<div class="case-body" data-key="' + esc(item.key) + '" onclick="openModal(this.dataset.key)">';
        } else {
          html += '<div class="case-body-plain">';
        }
        html += '<div class="case-head">' + badges + '</div>';
        html += '<div class="case-title">' + esc(item.title || '') + '</div>';
        html += '<div class="case-sub">';
        if (item.addr) html += '<span class="area">📍' + esc(trimAddr(item.addr)) + '</span>';
        if (isFixed)   html += '<span class="lock">⏰' + esc(item.time) + '</span>';
        if (item.company) html += '<span>' + esc(item.company) + '</span>';
        if (cas.reason) html += '<span class="ai-r">' + esc(cas.reason) + '</span>';
        html += '</div>';
        html += '</div>';

        if (item.addr) {
          html += '<a class="btn-map" href="' + mapsUrl(item.addr) + '" target="_blank" rel="noopener">🗺 MAP</a>';
        }
        html += '</div>';
      }
    }

    if (day.notes) html += '<div class="day-notes">💡 ' + esc(day.notes) + '</div>';
    html += '</div></div>';
  }

  if (plan.deferred && plan.deferred.length > 0) {
    html += '<div class="deferred-block">';
    html += '<div class="deferred-header">📋 3日間に入らなかった案件（' + plan.deferred.length + '件）</div>';
    for (var i = 0; i < plan.deferred.length; i++) {
      var def = plan.deferred[i];
      var defItem = getItem(def.id);
      html += '<div class="deferred-item">';
      html += esc((defItem && defItem.title) || def.title || def.id);
      if (def.reason) html += ' — <span>' + esc(def.reason) + '</span>';
      html += '</div>';
    }
    html += '</div>';
  }

  if (plan.notes) {
    html += '<div class="notes-card">📝 ' + esc(plan.notes) + '</div>';
  }

  html += '<div class="bottom-pad"></div>';
  document.getElementById('mainContent').innerHTML = html;

  currentPlan = plan;
  document.getElementById('btnSave').disabled = false;
}

// ==================== プラン保存 ====================
var currentPlan = null;

function savePlan() {
  if (!currentPlan) return;
  var btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = '保存中...';

  var saveData = {
    saved_at: new Date().toISOString(),
    plan: currentPlan,
    items_snapshot: raw7day ? raw7day.items : []
  };

  db.ref('app_action_plan').set(saveData).then(function() {
    btn.disabled = false;
    btn.textContent = '💾 プラン保存';
    var n = document.getElementById('saveNotice');
    n.classList.add('show');
    setTimeout(function(){ n.classList.remove('show'); }, 2500);
    renderTimeline(saveData);
  }).catch(function(e) {
    btn.disabled = false;
    btn.textContent = '💾 プラン保存';
    alert('保存失敗: ' + e.message);
  });
}

// ==================== タイムライン描画 ====================
function renderTimeline(saveData) {
  if (!saveData || !saveData.plan || !saveData.plan.days) return;
  var plan = saveData.plan;
  var items = saveData.items_snapshot || [];

  var itemMap = {};
  for (var i = 0; i < items.length; i++) itemMap[items[i].id] = items[i];

  var tlArea = document.getElementById('timelineArea');
  var tlTabs = document.getElementById('tlTabs');
  var tlContent = document.getElementById('tlContent');
  var tlSavedAt = document.getElementById('tlSavedAt');

  var savedAt = saveData.saved_at ? saveData.saved_at.slice(0,16).replace('T',' ') : '';
  tlSavedAt.textContent = '保存: ' + savedAt;

  tlTabs.innerHTML = '';
  tlContent.innerHTML = '';

  for (var di = 0; di < plan.days.length && di < 3; di++) {
    var day = plan.days[di];
    var dateStr = day.date || '';
    var tabLabel = (day.label || '') + ' ' + fmtMD(dateStr) + '(' + wday(dateStr) + ')';

    var tabBtn = document.createElement('button');
    tabBtn.className = 'tl-tab' + (di === 0 ? ' active' : '');
    tabBtn.textContent = tabLabel;
    tabBtn.setAttribute('data-di', di);
    tabBtn.onclick = (function(idx) {
      return function() {
        var tabs = document.querySelectorAll('.tl-tab');
        var days = document.querySelectorAll('.tl-day');
        for (var t = 0; t < tabs.length; t++) tabs[t].classList.remove('active');
        for (var d = 0; d < days.length; d++) days[d].classList.remove('active');
        this.classList.add('active');
        document.getElementById('tl-day-' + idx).classList.add('active');
      };
    })(di);
    tlTabs.appendChild(tabBtn);

    var dayDiv = document.createElement('div');
    dayDiv.className = 'tl-day' + (di === 0 ? ' active' : '');
    dayDiv.id = 'tl-day-' + di;

    var cases = day.cases || [];
    if (cases.length === 0) {
      dayDiv.innerHTML = '<div class="tl-empty">この日の予定なし</div>';
    } else {
      var sumHtml = '<div class="tl-summary">' +
        '<div><label>合計 </label><span>' + (day.total_min || '-') + '分</span></div>' +
        '<div><label>終了予定 </label><span>' + esc(day.end_time || '-') + '</span></div>' +
        '<div><label>テーマ </label><span>' + esc(day.theme || '-') + '</span></div>' +
        '</div>';

      var tlHtml = '';
      for (var ci = 0; ci < cases.length; ci++) {
        var cas = cases[ci];
        var item = itemMap[cas.id];
        if (!item) continue;

        var isPersonal = (item.type === 'personal');
        var isFixed    = !!(item.time);
        var isUrgent   = (item.type === 'alert');
        var isReform   = (item.type === 'reform');

        var dotCls = 'tl-dot';
        if (isPersonal) dotCls += ' personal';
        else if (isFixed && isReform) dotCls += ' fixed';
        else if (isUrgent) dotCls += ' urgent';

        var badges = '';
        if (isReform)          badges += '<span class="badge badge-reform">ﾘ</span> ';
        else if (item.type === 'newbuild') badges += '<span class="badge badge-new">新</span> ';
        else if (isUrgent)     badges += '<span class="badge badge-urgent">⚠</span> ';
        else if (isPersonal)   badges += '<span class="badge badge-personal">📅</span> ';
        if (isFixed)           badges += '<span class="badge badge-fixed">🔒</span> ';

        var travelMin = cas.travel_from_prev || getTravelMin(item.addr);
        var mapBtn = item.addr ?
          '<a class="btn-map" href="' + mapsUrl(item.addr) + '" target="_blank" rel="noopener" style="font-size:10px;padding:3px 7px;">🗺 MAP</a>' : '';

        tlHtml += '<div class="tl-item">' +
          '<div class="tl-line"><div class="' + dotCls + '"></div></div>' +
          '<div class="tl-card">' +
            '<div class="tl-card-head">' +
              '<span class="tl-time-range">' + esc(cas.arrive || '') + ' 〜 ' + esc(cas.leave || '') + '</span>' +
              (ci > 0 ? '<span class="tl-travel-badge">移動' + travelMin + '分</span>' : '<span class="tl-travel-badge">出発</span>') +
            '</div>' +
            '<div class="tl-card-body">' +
              '<div class="tl-title">' + badges + esc(item.title || '') + '</div>' +
              '<div class="tl-sub">' +
                (item.addr ? '<span class="area">📍' + esc(trimAddr(item.addr)) + '</span>' : '') +
                (isFixed ? '<span class="lock">⏰' + esc(item.time) + '</span>' : '') +
                (item.company ? '<span>' + esc(item.company) + '</span>' : '') +
                (cas.reason ? '<span class="ai-r">' + esc(cas.reason) + '</span>' : '') +
              '</div>' +
            '</div>' +
            '<div class="tl-card-foot">' +
              '<span class="tl-end-time">退出 ' + esc(cas.leave || '') + '</span>' +
              mapBtn +
            '</div>' +
          '</div>' +
        '</div>';
      }

      if (day.notes) {
        tlHtml += '<div class="day-notes" style="margin-top:4px;">💡 ' + esc(day.notes) + '</div>';
      }

      dayDiv.innerHTML = sumHtml + tlHtml;
    }
    tlContent.appendChild(dayDiv);
  }

  tlArea.style.display = 'block';
  tlArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ==================== 保存済みプラン読み込み ====================
function loadSavedPlan() {

    var saved = snap.val();
    if (saved && saved.plan) {
      renderTimeline(saved);
    }
  }).catch(function(e) { console.warn('保存済みプラン取得失敗', e); });

// ==================== API設定 ====================
function openSettings(){
  document.getElementById('claudeKeyInput').value = localStorage.getItem('claudeApiKey') || '';
  document.getElementById('settingsOverlay').style.display = 'block';
}
function saveClaudeKey(){
  var k = document.getElementById('claudeKeyInput').value.trim();
  if(!k){alert('キーを入力してください');return;}
  localStorage.setItem('claudeApiKey', k);
  document.getElementById('settingsOverlay').style.display = 'none';
  alert('保存しました');
}
function testClaudeKey(){
  var k = document.getElementById('claudeKeyInput').value.trim();
  if(!k){alert('キーを入力してください');return;}
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':k,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:10,messages:[{role:'user',content:'OK'}]})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.content&&d.content[0])alert('✅ 有効なAPIキーです');
    else if(d.error)alert('❌ '+d.error.message);
    else alert('⚠️ 不明: '+JSON.stringify(d));
  }).catch(function(e){alert('❌ '+e.message);});
}
