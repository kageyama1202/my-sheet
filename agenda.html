<!DOCTYPE html>
<!-- VERSION: 2026-05-17 -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3日間プラン</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<link rel="stylesheet" href="shared-modal.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic Pro','Meiryo',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;}

.header{background:#111827;border-bottom:2px solid #1e40af;padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.header a{color:#60a5fa;text-decoration:none;font-size:13px;font-weight:bold;}
.header-title{font-size:15px;font-weight:bold;color:#e2e8f0;flex:1;}
.header-date{font-size:11px;color:#94a3b8;background:#1e293b;padding:3px 10px;border-radius:10px;}

.status-bar{background:#0d1117;border-bottom:1px solid #1f2937;padding:7px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:11px;color:#64748b;position:sticky;top:45px;z-index:99;}
.ok{color:#34d399;}.warn{color:#f59e0b;}.err{color:#f87171;}

.gen-area{padding:12px 16px;background:#111827;border-bottom:1px solid #1f2937;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.btn-gen{background:#1d4ed8;color:#fff;border:none;padding:9px 22px;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;transition:background 0.2s;}
.btn-gen:hover{background:#2563eb;}
.btn-gen:disabled{background:#374151;color:#6b7280;cursor:not-allowed;}
.gen-note{font-size:11px;color:#64748b;flex:1;}

.loading-wrap{text-align:center;padding:60px 20px;}
.spin{display:inline-block;width:26px;height:26px;border:3px solid #1e40af;border-top-color:#60a5fa;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-wrap p{color:#60a5fa;font-size:14px;display:inline;vertical-align:middle;}

.summary-card{margin:14px 14px 0;background:#111827;border:1px solid #1e40af;border-radius:10px;overflow:hidden;}
.summary-header{background:#1e3a5f;padding:10px 16px;font-size:13px;font-weight:bold;color:#bfdbfe;}
.summary-body{padding:12px 16px;font-size:13px;color:#cbd5e1;line-height:1.8;}

.day-block{margin:12px 14px 0;}
.day-label{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:8px 8px 0 0;font-size:13px;font-weight:bold;}
.day-label.d0{background:#1e3a5f;border-left:4px solid #3b82f6;color:#bfdbfe;}
.day-label.d1{background:#1a2e1a;border-left:4px solid #22c55e;color:#bbf7d0;}
.day-label.d2{background:#2d1f3d;border-left:4px solid #a78bfa;color:#e9d5ff;}
.day-theme{font-size:11px;color:rgba(255,255,255,0.5);font-weight:normal;}
.day-meta{font-size:11px;background:rgba(255,255,255,0.08);padding:2px 8px;border-radius:8px;margin-left:auto;white-space:nowrap;}

.cases-wrap{background:#111827;border-radius:0 0 8px 8px;border:1px solid #1f2937;border-top:none;overflow:hidden;margin-bottom:4px;}
.day-notes{padding:8px 14px;font-size:11px;color:#64748b;background:#0d1117;border-top:1px solid #1f2937;}

.case-card{display:flex;align-items:stretch;min-height:56px;border-bottom:1px solid #1a2234;transition:background 0.15s;}
.case-card:last-child{border-bottom:none;}
.case-card:hover{background:#1a2234;}
.case-card.fixed-time{border-left:3px solid #f59e0b;}
.case-card.urgent{border-left:3px solid #ef4444;}
.case-card.proposed{border-left:3px solid #22c55e;}

.case-num{width:32px;min-width:32px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:bold;color:#60a5fa;background:#0d1117;}

.case-times{width:58px;min-width:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 2px;border-right:1px solid #1f2937;}
.t-arrive{font-size:11px;font-weight:bold;color:#fbbf24;}
.t-leave{font-size:10px;color:#64748b;}
.t-travel{font-size:9px;color:#475569;margin-top:2px;}

.case-body{flex:1;padding:7px 8px 7px 10px;min-width:0;cursor:pointer;}
.case-body:hover .case-title{color:#60a5fa;text-decoration:underline;}
.case-body-plain{flex:1;padding:7px 8px 7px 10px;min-width:0;}

.case-head{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:3px;}
.badge{display:inline-block;font-size:10px;font-weight:bold;padding:1px 5px;border-radius:3px;white-space:nowrap;}
.badge-fixed{background:#78350f;color:#fde68a;}
.badge-urgent{background:#7f1d1d;color:#fca5a5;}
.badge-personal{background:#2d1b4e;color:#c4b5fd;}
.badge-reform{background:#1e3a5f;color:#93c5fd;}
.badge-new{background:#2d2a1a;color:#fbbf24;}
.badge-proposed{background:#14532d;color:#86efac;}

.case-title{font-size:13px;font-weight:bold;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.case-sub{font-size:11px;color:#64748b;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.area{color:#34d399;}
.ai-r{color:#94a3b8;font-style:italic;}
.lock{color:#f59e0b;}

.btn-map{flex-shrink:0;align-self:center;margin:0 10px;background:#065f46;color:#6ee7b7;border:none;padding:6px 10px;border-radius:6px;font-size:11px;font-weight:bold;cursor:pointer;white-space:nowrap;text-decoration:none;display:flex;align-items:center;gap:3px;transition:background 0.15s;}
.btn-map:hover{background:#047857;}

.deferred-block{margin:12px 14px;background:#111827;border:1px solid #374151;border-radius:8px;overflow:hidden;}
.deferred-header{background:#1f2937;padding:8px 14px;font-size:12px;font-weight:bold;color:#9ca3af;}
.deferred-item{padding:7px 14px;border-bottom:1px solid #1f2937;font-size:12px;color:#64748b;}
.deferred-item:last-child{border-bottom:none;}
.deferred-item span{color:#94a3b8;}

.notes-card{margin:0 14px 14px;background:#111827;border:1px solid #374151;border-radius:8px;padding:12px 14px;font-size:12px;color:#64748b;line-height:1.7;}

.empty-msg{padding:40px;text-align:center;font-size:13px;color:#4b5563;}
.error-msg{margin:14px;padding:14px;background:#1f0a0a;border:1px solid #7f1d1d;border-radius:8px;font-size:13px;color:#fca5a5;}
.bottom-pad{height:40px;}
</style>
</head>
<body>

<div id="modal-overlay"><div id="modal-content"><button id="modal-close">✖ 閉じる</button><div id="modal-body"></div></div></div>

<div class="header">
  <a href="index.html">◀ トップ</a>
  <div class="header-title">🗓 3日間プラン</div>
  <div class="header-date" id="headerDate">-</div>
</div>

<div class="status-bar">
  <span id="stMsg">読み込み中...</span>
</div>

<div class="gen-area">
  <button class="btn-gen" id="btnGen" onclick="generatePlan()" disabled>🤖 Geminiでプラン生成</button>
  <span class="gen-note" id="genNote">データ取得中...</span>
</div>

<div id="mainContent">
  <div class="loading-wrap"><span class="spin"></span><p>Firebase読み込み中...</p></div>
</div>

<div class="bottom-pad"></div>
<script src="shared-modal.js"></script>
<script>
// ==================== FIREBASE ====================
var firebaseConfig = {
  apiKey: "AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",
  authDomain: "project-6745138395263517914.firebaseapp.com",
  databaseURL: "https://project-6745138395263517914-default-rtdb.firebaseio.com",
  projectId: "project-6745138395263517914",
  storageBucket: "project-6745138395263517914.firebasestorage.app",
  messagingSenderId: "1054295910908",
  appId: "1:1054295910908:web:4072df05bd90bbdc896a79"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ==================== GLOBALS ====================
var raw7day = null;
var globalTasks = {};
var globalHeaders = [];
var fullData = null;
var HOME = localStorage.getItem('homeAddress') || '札幌市白石区栄通18丁目4-17';

// ==================== 移動時間テーブル（白石区出発・片道分） ====================
var AREA_TABLE = [
  { keys: ['千歳','恵庭','苫小牧'],           min: 55 },
  { keys: ['当別','小樽','岩見沢','北広島'],   min: 40 },
  { keys: ['江別','石狩'],                     min: 30 },
  { keys: ['手稲','南区','清田','西区'],       min: 20 },
  { keys: ['白石','厚別','豊平','東区','中央区','北区'], min: 15 }
];
var DEFAULT_TRAVEL = 20;
var STAY_MIN = 25;      // リフォーム・新築現場滞在
var PERSONAL_MIN = 60;  // 個人予定デフォルト

function getTravelMin(addr) {
  if (!addr) return DEFAULT_TRAVEL;
  for (var i = 0; i < AREA_TABLE.length; i++) {
    for (var j = 0; j < AREA_TABLE[i].keys.length; j++) {
      if (addr.indexOf(AREA_TABLE[i].keys[j]) >= 0) return AREA_TABLE[i].min;
    }
  }
  return DEFAULT_TRAVEL;
}

// 住所を丁目まで切り詰め（割番除去）
function trimAddr(addr) {
  if (!addr) return '';
  var a = addr.replace(/\s+/g,'').replace(/^北海道/,'').replace(/^札幌市/,'');
  var m = a.match(/^(.+?丁目)/);
  if (m) return m[1];
  var m2 = a.match(/^(.{2,8}[区市町村])/);
  if (m2) return m2[1];
  return a.slice(0,15);
}

// ==================== DATE HELPERS ====================
function todayStr() {
  return new Date(new Date().getTime() + 9*3600000).toISOString().slice(0,10);
}
function addDays(s, n) {
  var d = new Date(s + 'T00:00:00+09:00');
  d.setDate(d.getDate() + n);
  return new Date(d.getTime() + 9*3600000).toISOString().slice(0,10);
}
function wday(s) {
  return ['日','月','火','水','木','金','土'][new Date(s+'T00:00:00+09:00').getDay()];
}
function fmtMD(s) {
  if (!s) return '';
  return parseInt(s.slice(5,7)) + '/' + parseInt(s.slice(8,10));
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==================== FIREBASE LOAD ====================
function loadData() {
  try {
    var ls = localStorage.getItem('appData');
    if (ls) {
      var ld = JSON.parse(ls);
      if (ld && ld.app_tasks) { globalTasks = ld.app_tasks; fullData = ld; }
      if (ld && ld.app_meta) globalHeaders = ld.app_meta.headers || [];
    }
  } catch(e) {}

  db.ref('app_action_7day').once('value').then(function(snap) {
    raw7day = snap.val();
    if (!raw7day || !raw7day.items || !raw7day.items.length) {
      document.getElementById('stMsg').innerHTML = '<span class="warn">⚠ データなし。7日間抽出ページで保存してください。</span>';
      document.getElementById('mainContent').innerHTML =
        '<div class="empty-msg">⚠️ app_action_7dayが空です。<br>7日間行動抽出ページで「Firebase保存」を実行してください。</div>';
      document.getElementById('genNote').textContent = 'データなし';
      return;
    }
    var n = raw7day.items.length;
    var upd = raw7day.updated ? raw7day.updated.slice(0,16).replace('T',' ') : '-';
    document.getElementById('stMsg').innerHTML =
      '<span class="ok">✓ ' + n + '件取得</span>　更新: ' + upd;
    document.getElementById('genNote').textContent = n + '件（リフォーム・新築・個人予定込み）でプラン生成';
    document.getElementById('btnGen').disabled = false;

    if (Object.keys(globalTasks).length === 0) {
      db.ref('app_tasks').once('value').then(function(s2) { globalTasks = s2.val() || {}; });
    }
    setHeader();
    document.getElementById('mainContent').innerHTML =
      '<div class="empty-msg" style="color:#475569">「Geminiでプラン生成」を押してください。</div>';
  }).catch(function(e) {
    document.getElementById('stMsg').innerHTML = '<span class="err">❌ ' + e.message + '</span>';
  });
}

function setHeader() {
  var t = todayStr();
  document.getElementById('headerDate').textContent =
    fmtMD(t)+'('+wday(t)+')〜'+fmtMD(addDays(t,2))+'('+wday(addDays(t,2))+')';
}

function openModal(key) {
  if (!globalTasks[key]) return;
  openCaseModal(key, globalTasks[key], globalHeaders, globalTasks, fullData, db, function() {});
}

// ==================== プロンプト構築 ====================
function buildPrompt() {
  var today = todayStr();
  var d0 = today, d1 = addDays(today,1), d2 = addDays(today,2);
  var items = raw7day.items || [];
  var lines = [];

  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var travel = getTravelMin(it.addr);
    var stay = (it.type === 'personal') ? PERSONAL_MIN : STAY_MIN;
    var areaShort = trimAddr(it.addr);
    var isFixed = !!(it.time);
    var isPersonal = (it.type === 'personal');
    var isUrgent = (it.type === 'alert');
    var isReform = (it.type === 'reform');

    var tag = '';
    if (isPersonal)                  tag = '[個人予定・時間絶対固定・移動不可]';
    else if (isReform && isFixed)    tag = '[リフォーム下見・時間固定]';
    else if (isReform && !isFixed)   tag = '[リフォーム下見・時間調整可]';
    else if (isUrgent)               tag = '[緊急・訪問必要]';
    else                             tag = '[新築下見・日程調整可]';

    var line = tag;
    line += ' id=' + (it.id || '');
    line += ' / ' + (it.title || '');
    line += ' / 元日付=' + (it.date || '未定');
    if (it.time) line += ' / 時間=' + it.time + '(固定・変更禁止)';
    line += ' / エリア=' + (areaShort || '不明') + '　(' + (it.addr || '') + ')';
    line += ' / 移動時間=' + travel + '分(片道・白石区出発基準)';
    line += ' / 現場滞在=' + stay + '分';
    if (it.reason) line += ' / 理由=' + it.reason;
    if (it.company) line += ' / 担当=' + it.company;
    lines.push(line);
  }

  return (
'# Kの3日間下見プラン生成\n\n' +
'## 基本情報\n' +
'今日=' + d0 + '(' + wday(d0) + ')　明日=' + d1 + '(' + wday(d1) + ')　明後日=' + d2 + '(' + wday(d2) + ')\n' +
'出発地点: 白石区栄通18丁目（札幌市白石区）\n\n' +
'## 移動時間の目安（白石区から片道）\n' +
'白石・厚別・豊平・東区・中央区・北区: 15分\n' +
'手稲・清田・南区・西区: 20分\n' +
'江別・石狩: 30分\n' +
'北広島・小樽・当別・岩見沢: 40分\n' +
'千歳・恵庭・苫小牧: 55分\n\n' +
'## 絶対ルール\n' +
'1. 「時間固定・変更禁止」の案件はその時間に必ず置く。絶対に動かすな\n' +
'2. 個人予定は時間も日付も絶対に変えない\n' +
'3. リフォームで時間固定のものも同様\n' +
'4. 同じエリアの案件は同じ日に集める（最重要：移動効率の核心）\n' +
'5. 時間固定の案件がある日は、その前後に同エリア・近隣エリアの案件を引き寄せる\n' +
'6. 緊急案件（[緊急]タグ）は今日か明日に必ず入れる\n' +
'7. 7日間データは参考情報。3日以降の案件でも同エリアなら今3日に組み込んでよい\n' +
'8. 1日の合計（移動+滞在）が480分（9:00〜17:00）を超えないよう調整する\n' +
'9. 遠方（千歳・恵庭等55分）は単独日か近郊案件とセットで1日に2件まで\n\n' +
'## 全案件リスト（' + items.length + '件）\n' +
lines.join('\n') + '\n\n' +
'## 出力形式（JSONのみ・前置き不要・コードブロック不要）\n' +
'{\n' +
'  "summary": "3日間プランの全体方針（2〜3文）",\n' +
'  "days": [\n' +
'    {\n' +
'      "date": "YYYY-MM-DD",\n' +
'      "label": "今日 or 明日 or 明後日",\n' +
'      "theme": "その日のテーマ（例: 白石・厚別エリア集中）",\n' +
'      "cases": [\n' +
'        {\n' +
'          "order": 1,\n' +
'          "id": "元のidフィールド値そのまま",\n' +
'          "arrive": "09:00",\n' +
'          "leave": "09:25",\n' +
'          "travel_from_prev": 15,\n' +
'          "reason": "この日この順にした理由（簡潔に20字以内）"\n' +
'        }\n' +
'      ],\n' +
'      "total_min": 120,\n' +
'      "end_time": "11:00",\n' +
'      "notes": "この日の注意点"\n' +
'    }\n' +
'  ],\n' +
'  "deferred": [\n' +
'    { "id": "元のid", "title": "タイトル", "reason": "3日間に入れなかった理由" }\n' +
'  ],\n' +
'  "notes": "全体補足"\n' +
'}'
  );
}

// ==================== Gemini呼び出し ====================
function generatePlan() {
  var geminiKey = localStorage.getItem('geminiApiKey');
  if (!geminiKey) {
    document.getElementById('mainContent').innerHTML =
      '<div class="error-msg">⚠ Gemini APIキー未設定。sogo.html のAPI設定から登録してください。</div>';
    return;
  }
  if (!raw7day || !raw7day.items || !raw7day.items.length) {
    document.getElementById('mainContent').innerHTML =
      '<div class="error-msg">⚠ データなし。7日間行動抽出ページで保存してください。</div>';
    return;
  }
  var btn = document.getElementById('btnGen');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';
  document.getElementById('mainContent').innerHTML =
    '<div class="loading-wrap"><span class="spin"></span><p>Geminiがエリア・時間を計算中...</p></div>';

  fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + encodeURIComponent(geminiKey), {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      contents: [{parts: [{text: buildPrompt()}]}],
      generationConfig: {temperature: 0.3, maxOutputTokens: 65536, responseMimeType: 'application/json'}
    })
  }).then(function(r){return r.json();})
  .then(function(data){
    btn.disabled = false;
    btn.textContent = '🔄 再生成';
    if (!data.candidates || !data.candidates[0]) throw new Error('APIレスポンス異常: ' + JSON.stringify(data).slice(0,300));
    var raw = data.candidates[0].content.parts[0].text;
    var finishReason = data.candidates[0].finishReason || '';
    if (finishReason !== 'STOP') {
      document.getElementById('mainContent').innerHTML =
        '<div class="error-msg">⚠ 生成途中で停止（' + esc(finishReason) + '）。再生成してください。</div>' +
        '<div class="notes-card" style="margin-top:8px"><b style="color:#e2e8f0">生レスポンス（先頭600文字）:</b><br><pre style="white-space:pre-wrap;font-size:10px;color:#94a3b8;margin-top:6px">' + esc(raw.slice(0,600)) + '</pre></div>';
      btn.disabled = false;
      btn.textContent = '🔄 再生成';
      return;
    }
    try {
      renderPlan(parseJson(raw));
    } catch(pe) {
      document.getElementById('mainContent').innerHTML =
        '<div class="error-msg">❌ JSONパースエラー: ' + esc(pe.message) + '</div>' +
        '<div class="notes-card" style="margin-top:8px"><b style="color:#e2e8f0">生レスポンス（先頭800文字）:</b><br><pre style="white-space:pre-wrap;font-size:10px;color:#94a3b8;margin-top:6px">' + esc(raw.slice(0,800)) + '</pre></div>';
    }
  }).catch(function(e){
    btn.disabled = false;
    btn.textContent = '🤖 Geminiでプラン生成';
    document.getElementById('mainContent').innerHTML =
      '<div class="error-msg">❌ エラー: ' + esc(e.message) + '</div>';
  });
}

function parseJson(raw) {
  var s = raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
  var bs = s.indexOf('{'), be = s.lastIndexOf('}');
  if (bs !== -1 && be > bs) s = s.slice(bs, be+1);
  return JSON.parse(s);
}

// ==================== IDからitem取得 ====================
function getItem(id) {
  if (!raw7day || !raw7day.items) return null;
  for (var i = 0; i < raw7day.items.length; i++) {
    if (raw7day.items[i].id === id) return raw7day.items[i];
  }
  return null;
}

function mapsUrl(addr) {
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(addr || '');
}

// ==================== RENDER ====================
function renderPlan(plan) {
  if (!plan || !plan.days) {
    document.getElementById('mainContent').innerHTML =
      '<div class="error-msg">❌ プラン解析失敗。再生成してください。</div>';
    return;
  }
  var today = todayStr();
  var html = '';

  // 全体サマリー
  if (plan.summary) {
    html += '<div class="summary-card">' +
      '<div class="summary-header">🤖 Geminiプラン概要</div>' +
      '<div class="summary-body">' + esc(plan.summary) + '</div></div>';
  }

  var dayClasses = ['d0','d1','d2'];

  for (var di = 0; di < plan.days.length && di < 3; di++) {
    var day = plan.days[di];
    var dc = dayClasses[di] || 'd2';
    var dateStr = day.date || addDays(today, di);
    var labelStr = esc(day.label || '') + ' ' + fmtMD(dateStr) + '(' + wday(dateStr) + ')';

    html += '<div class="day-block">';
    html += '<div class="day-label ' + dc + '">';
    html += '<span>' + labelStr + '</span>';
    if (day.theme) html += '<span class="day-theme">— ' + esc(day.theme) + '</span>';
    html += '<span class="day-meta">' + esc(String(day.total_min || '-')) + '分　〜' + esc(day.end_time || '') + '</span>';
    html += '</div>';
    html += '<div class="cases-wrap">';

    if (!day.cases || day.cases.length === 0) {
      html += '<div style="padding:14px 16px;font-size:12px;color:#4b5563;">この日の予定なし</div>';
    } else {
      for (var ci = 0; ci < day.cases.length; ci++) {
        var cas = day.cases[ci];
        var item = getItem(cas.id);
        if (!item) continue;

        var isPersonal = (item.type === 'personal');
        var isFixed    = !!(item.time);
        var isUrgent   = (item.type === 'alert');
        var isReform   = (item.type === 'reform');

        var cardCls = 'case-card';
        if (isPersonal || (isFixed && isReform)) cardCls += ' fixed-time';
        else if (isUrgent) cardCls += ' urgent';
        else cardCls += ' proposed';

        var badges = '';
        if (isPersonal)       badges += '<span class="badge badge-personal">📅 個人予定</span>';
        else if (isReform)    badges += '<span class="badge badge-reform">ﾘ リフォーム</span>';
        else if (item.type === 'newbuild') badges += '<span class="badge badge-new">新 新築</span>';
        else if (isUrgent)    badges += '<span class="badge badge-urgent">⚠ 緊急</span>';
        if (isFixed)          badges += '<span class="badge badge-fixed">🔒 時間固定</span>';
        else if (!isPersonal) badges += '<span class="badge badge-proposed">✦ AI提案</span>';

        var travelMin = cas.travel_from_prev || getTravelMin(item.addr);
        var hasKey = !!(item.key && globalTasks[item.key]);

        html += '<div class="' + cardCls + '">';
        html += '<div class="case-num">' + (cas.order || ci+1) + '</div>';
        html += '<div class="case-times">';
        html += '<div class="t-arrive">' + esc(cas.arrive || '') + '</div>';
        html += '<div class="t-leave">〜' + esc(cas.leave || '') + '</div>';
        html += '<div class="t-travel">移' + travelMin + '分</div>';
        html += '</div>';

        if (hasKey) {
          html += '<div class="case-body" data-key="' + esc(item.key) + '" onclick="openModal(this.dataset.key)">';
        } else {
          html += '<div class="case-body-plain">';
        }
        html += '<div class="case-head">' + badges + '</div>';
        html += '<div class="case-title">' + esc(item.title || '') + '</div>';
        html += '<div class="case-sub">';
        if (item.addr) html += '<span class="area">📍' + esc(trimAddr(item.addr)) + '</span>';
        if (isFixed)   html += '<span class="lock">⏰' + esc(item.time) + '</span>';
        if (item.company) html += '<span>' + esc(item.company) + '</span>';
        if (cas.reason) html += '<span class="ai-r">' + esc(cas.reason) + '</span>';
        html += '</div>';
        html += '</div>'; // case-body

        if (item.addr) {
          html += '<a class="btn-map" href="' + mapsUrl(item.addr) + '" target="_blank" rel="noopener">🗺 MAP</a>';
        }
        html += '</div>'; // case-card
      }
    }

    if (day.notes) html += '<div class="day-notes">💡 ' + esc(day.notes) + '</div>';
    html += '</div></div>'; // cases-wrap + day-block
  }

  // 後回し案件
  if (plan.deferred && plan.deferred.length > 0) {
    html += '<div class="deferred-block">';
    html += '<div class="deferred-header">📋 3日間に入らなかった案件（' + plan.deferred.length + '件）</div>';
    for (var i = 0; i < plan.deferred.length; i++) {
      var def = plan.deferred[i];
      var defItem = getItem(def.id);
      html += '<div class="deferred-item">';
      html += esc((defItem && defItem.title) || def.title || def.id);
      if (def.reason) html += ' — <span>' + esc(def.reason) + '</span>';
      html += '</div>';
    }
    html += '</div>';
  }

  if (plan.notes) {
    html += '<div class="notes-card">📝 ' + esc(plan.notes) + '</div>';
  }

  html += '<div class="bottom-pad"></div>';
  document.getElementById('mainContent').innerHTML = html;
}

// ==================== INIT ====================
setHeader();
loadData();
</script>
</body>
</html>
