body { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; background: #f0f2f5; color: #333; }

<script>
// ==================== FIREBASE ====================
var firebaseConfig = {
  apiKey: "AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",
  authDomain: "project-6745138395263517914.firebaseapp.com",
  databaseURL: "https://project-6745138395263517914-default-rtdb.firebaseio.com",
  projectId: "project-6745138395263517914",
  storageBucket: "project-6745138395263517914.firebasestorage.app",
  messagingSenderId: "1054295910908",
  appId: "1:1054295910908:web:4072df05bd90bbdc896a79"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
var database = firebase.database();

// ==================== GLOBALS ====================
var allCases = [];
var filteredCases = [];

// чеЭцЧеуГкуВ╣уГИ 2025-2026
var HOLIDAYS = [
  '2025-01-01','2025-01-13','2025-02-11','2025-02-24',
  '2025-03-21','2025-04-29','2025-05-03','2025-05-04','2025-05-05',
  '2025-07-21','2025-08-11','2025-09-15','2025-09-23',
  '2025-10-13','2025-11-03','2025-11-23',
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23',
  '2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05',
  '2026-07-20','2026-08-11','2026-09-21','2026-09-23',
  '2026-10-12','2026-11-03','2026-11-23'
];

var LONG_BREAKS = [
  { start: '2025-08-13', end: '2025-08-16' },
  { start: '2025-12-29', end: '2026-01-04' },
  { start: '2026-04-29', end: '2026-05-06' },
  { start: '2026-08-13', end: '2026-08-16' }
];

// ==================== DATE HELPERS ====================
function todayJST() {
  var d = new Date();
  var jst = new Date(d.getTime() + 9 * 3600000);
  return jst.toISOString().slice(0, 10);
}

function addDays(dateStr, n) {
  var d = new Date(dateStr + 'T00:00:00+09:00');
  d.setDate(d.getDate() + n);
  var jst = new Date(d.getTime() + 9 * 3600000);
  return jst.toISOString().slice(0, 10);
}

function getWeekdayJA(dateStr) {
  var days = ['цЧе','цЬИ','чБл','ц░┤','цЬи','щЗС','хЬЯ'];
  var d = new Date(dateStr + 'T00:00:00+09:00');
  return days[d.getDay()];
}

function getWeekdayNum(dateStr) {
  return new Date(dateStr + 'T00:00:00+09:00').getDay();
}

function isHoliday(dateStr) {
  return HOLIDAYS.indexOf(dateStr) >= 0;
}

function isLongBreak(dateStr) {
  for (var i = 0; i < LONG_BREAKS.length; i++) {
    if (dateStr >= LONG_BREAKS[i].start && dateStr <= LONG_BREAKS[i].end) return true;
  }
  return false;
}

function formatTopbarDate() {
  var d = new Date(new Date().getTime() + 9 * 3600000);
  var days = ['цЧе','цЬИ','чБл','ц░┤','цЬи','щЗС','хЬЯ'];
  var y = d.getUTCFullYear();
  var m = d.getUTCMonth() + 1;
  var day = d.getUTCDate();
  var wd = days[d.getUTCDay()];
  return y + '/' + (m<10?'0'+m:m) + '/' + (day<10?'0'+day:day) + 'я╝И' + wd + 'я╝Й';
}

// ==================== TAB SWITCH ====================
function switchTab(name, btn) {
  document.getElementById('tab-list').classList.remove('active');
  document.getElementById('tab-agenda').classList.remove('active');
  document.getElementById('tab-' + name).classList.add('active');
  var btns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
}

// ==================== FIREBASE LOAD ====================
function loadCases() {
  database.ref().once('value').then(function(snapshot) {
    var dbData = snapshot.val();
    if (!dbData || !dbData.app_tasks) {
      document.getElementById('listStatus').textContent = 'тЪая╕П уГЗуГ╝уВ┐уБкуБЧ';
      return;
    }
    var tasks = dbData.app_tasks;
    allCases = [];
    var today = todayJST();
    var pastLimit = addDays(today, -3);
    var futureLimit = addDays(today, 21);

    for (var key in tasks) {
      var task = tasks[key];
      var cols = task.csvData || [];
      var koujiDate = cols[2] ? String(cols[2]).replace(/\s+/g, '') : '';
      if (!koujiDate) continue;
      if (koujiDate < pastLimit || koujiDate > futureLimit) continue;

      allCases.push({
        key: key,
        kouji: koujiDate,
        kubun: cols[3] ? String(cols[3]).replace(/\s+/g, '') : '',
        title: cols[4] ? String(cols[4]).trim() : '',
        tanto: cols[5] ? String(cols[5]).trim() : '',
        tel: cols[6] ? String(cols[6]).trim() : '',
        address: cols[11] ? String(cols[11]).trim() : '',
        shitami: task.date || '',
        ai_shitami: task.ai_shitami_date || ''
      });
    }

    allCases.sort(function(a, b) { return a.kouji > b.kouji ? 1 : -1; });
    filteredCases = allCases.slice();
    renderTable();
    document.getElementById('listCount').textContent = allCases.length;
  }).catch(function(err) {
    document.getElementById('listStatus').textContent = 'тЭМ ' + err.message;
  });
}

// ==================== ALERT LOGIC ====================
function getAlerts(c) {
  var alerts = [];
  var today = todayJST();
  var daysToKouji = Math.ceil((new Date(c.kouji) - new Date(today)) / 86400000);

  if ((c.kubun === 'я╛Ш' || c.kubun === 'я╛Кя╛Ш') && !c.shitami && !c.ai_shitami) {
    alerts.push({ label: 'ф╕ЛшжЛцЧец▒║уВБуБж', cls: 'alert-red' });
  }
  if (c.kubun === 'цЦ░' && daysToKouji <= 21 && daysToKouji >= 0 && !c.shitami && !c.ai_shitami) {
    alerts.push({ label: 'шикхХПх┐ЕшжБ', cls: 'alert-orange' });
  }
  if (c.kubun === 'цЦ░' && c.title.indexOf('SK') >= 0 && daysToKouji <= 10 && daysToKouji >= 0) {
    alerts.push({ label: 'хЖНшикхХПх┐ЕшжБ', cls: 'alert-blue' });
  }
  return alerts;
}

// ==================== RENDER TABLE ====================
function renderTable() {
  var tbody = document.getElementById('caseBody');
  tbody.innerHTML = '';

  if (filteredCases.length === 0) {
    document.getElementById('listStatus').style.display = 'block';
    document.getElementById('listStatus').textContent = 'шй▓х╜УуВ▒уГ╝уВ╣уБкуБЧ';
    document.getElementById('caseTable').style.display = 'none';
    return;
  }
  document.getElementById('listStatus').style.display = 'none';
  document.getElementById('caseTable').style.display = 'table';

  for (var i = 0; i < filteredCases.length; i++) {
    var c = filteredCases[i];
    var alerts = getAlerts(c);

    var kubunTag = '';
    if (c.kubun === 'я╛Ш' || c.kubun === 'я╛Кя╛Ш') kubunTag = '<span class="tag tag-reform">я╛Ш</span>';
    else if (c.kubun === 'цЦ░') kubunTag = '<span class="tag tag-new">цЦ░</span>';

    var titleTag = '';
    if (c.title.indexOf('SK') >= 0) titleTag = '<span class="tag tag-sk">SK</span>';
    else if (c.title.indexOf('SB') >= 0) titleTag = '<span class="tag tag-sb">SB</span>';
    else if (c.title.indexOf('SU') >= 0) titleTag = '<span class="tag tag-su">SU</span>';

    var shitamiCell = '';
    if (c.shitami) shitamiCell += '<div class="cell-blue">' + c.shitami + '</div>';
    if (c.ai_shitami) shitamiCell += '<div class="cell-orange">AI: ' + c.ai_shitami + '</div>';

    var alertCell = '';
    for (var j = 0; j < alerts.length; j++) {
      alertCell += '<div class="alert-tag ' + alerts[j].cls + '">' + alerts[j].label + '</div>';
    }

    var row = document.createElement('tr');
    row.innerHTML =
      '<td>' + kubunTag + '</td>' +
      '<td>' + titleTag + ' <small>' + c.title + '</small></td>' +
      '<td class="cell-blue">' + c.kouji + '<br><small>(' + getWeekdayJA(c.kouji) + ')</small></td>' +
      '<td>' + (shitamiCell || '<span style="color:#ccc">цЬкхоЪ</span>') + '</td>' +
      '<td><small>' + c.tanto + '</small></td>' +
      '<td><small>' + c.address + '</small></td>' +
      '<td>' + alertCell + '</td>';

    (function(k) {
      row.addEventListener('click', function() {
        if (typeof openModal === 'function') openModal(k);
      });
    })(c.key);

    tbody.appendChild(row);
  }
}

// ==================== FILTER ====================
function applyFilter() {
  var text = document.getElementById('filterInput').value.toLowerCase();
  var kubun = document.getElementById('filterType').value;
  var alertOnly = document.getElementById('filterAlert').value === 'alert';

  filteredCases = [];
  for (var i = 0; i < allCases.length; i++) {
    var c = allCases[i];
    if (kubun && c.kubun !== kubun) continue;
    if (text && c.address.toLowerCase().indexOf(text) < 0 &&
        c.tanto.toLowerCase().indexOf(text) < 0 &&
        c.title.toLowerCase().indexOf(text) < 0) continue;
    if (alertOnly && getAlerts(c).length === 0) continue;
    filteredCases.push(c);
  }
  renderTable();
}

// ==================== AGENDA ====================
function getWorkdayRule(today) {
  if (isLongBreak(today)) return 'longbreak';
  var dow = getWeekdayNum(today);
  if (dow === 0) return 'sunday';
  if (dow === 6 || isHoliday(today)) return 'saturday';
  return 'weekday';
}

function countRemainingWeekdays(today) {
  var count = 0;
  for (var i = 0; i <= 6; i++) {
    var d = addDays(today, i);
    var dow = getWeekdayNum(d);
    if (dow >= 1 && dow <= 5 && !isHoliday(d) && !isLongBreak(d)) count++;
  }
  return count;
}

function getCasesFor7Days() {
  var today = todayJST();
  var limit = addDays(today, 7);
  var result = [];
  for (var i = 0; i < allCases.length; i++) {
    if (allCases[i].kouji >= today && allCases[i].kouji <= limit) result.push(allCases[i]);
  }
  return result;
}

function generateAgenda() {
  var geminiKey = localStorage.getItem('geminiApiKey');
  if (!geminiKey) {
    document.getElementById('agendaContent').innerHTML =
      '<div class="error-card">тЪая╕П Gemini API уВнуГ╝уБМцЬкшинхоЪуБзуБЩуАВ<br>sogo.html уБоуАМAPIшинхоЪуАНуБЛуВЙшинхоЪуБЧуБжуБПуБауБХуБДя╝И<code>geminiApiKey</code>я╝ЙуАВ</div>';
    return;
  }
  if (allCases.length === 0) {
    document.getElementById('agendaContent').innerHTML =
      '<div class="agenda-status">тЪая╕П уГЗуГ╝уВ┐шкнуБ┐ш╛╝уБ┐ф╕нуБзуБЩуАВуБЧуБ░уВЙуБПх╛ЕуБгуБжуБЛуВЙхЖНшйжшбМуБЧуБжуБПуБауБХуБДуАВ</div>';
    return;
  }

  var btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> чФЯцИРф╕н...';

  var today = todayJST();
  var dow = getWeekdayJA(today);
  var rule = getWorkdayRule(today);
  var holiday = isHoliday(today);
  var longBreak = isLongBreak(today);
  var remainingWeekdays = countRemainingWeekdays(today);
  var weekCases = getCasesFor7Days();

  var caseLines = '';
  var MAX = 15;
  var shown = weekCases.length > MAX ? weekCases.slice(0, MAX) : weekCases;
  for (var i = 0; i < shown.length; i++) {
    var c = shown[i];
    var alerts = getAlerts(c);
    var alertStr = '';
    for (var j = 0; j < alerts.length; j++) alertStr += '[' + alerts[j].label + ']';
    caseLines += '- ' + (c.tanto || 'ф╕НцШО') +
      ' | цЦ╜х╖е: ' + c.kouji + '(' + getWeekdayJA(c.kouji) + ')' +
      ' | ' + c.kubun + ' | ' + c.title +
      ' | ф╕ЛшжЛ: ' + (c.shitami || c.ai_shitami || 'цЬкхоЪ') +
      (alertStr ? ' ' + alertStr : '') +
      ' | ' + c.address.slice(0, 20) + '\n';
  }
  if (weekCases.length > MAX) caseLines += '...ф╗Ц ' + (weekCases.length - MAX) + ' ф╗╢чЬБчХе\n';
  if (!caseLines) caseLines = 'я╝Иф╗Кх╛М7цЧещЦУуБлцЦ╜х╖еф║ИхоЪуВ▒уГ╝уВ╣уБкуБЧя╝Й\n';

  var ruleDesc = {
    'weekday':   'щАЪх╕╕хЦ╢ценцЧея╝Иф╕ЛшжЛуГ╗уГбуГ╝уГлщАБф┐буГ╗ха▒хСКцЫ╕уБЩуБ╣уБжхПпя╝Й',
    'saturday':  'хЬЯцЫЬцЧея╝ИцЬИуАЬщЗСуБзф╕Нш╢│уБЩуВЛф╕ЛшжЛуБМуБВуВЛха┤хРИуБоуБ┐чП╛ха┤уАБуБкуБСуВМуБ░шЗкхоЕуБзуГбуГ╝уГлф╗охИ╢ф╜ЬуГ╗ха▒хСКцЫ╕ф╜ЬцИРя╝Й',
    'sunday':    'цЧецЫЬцЧея╝ИшЗкхоЕуБоуБ┐уГ╗ф╕ЛшжЛф╕НхПпуГ╗уГбуГ╝уГлщАБф┐бф╕НхПпуАВуГбуГ╝уГлф╗охИ╢ф╜ЬуБиха▒хСКцЫ╕ф╜ЬцИРуБоуБ┐я╝Й',
    'longbreak': 'щХ╖цЬЯф╝СцЪЗф╕ня╝ИхоМхЕиф╝Сцнвя╝Й'
  };

  var prompt =
    'уАРф╗КцЧеуБоцГЕха▒уАС\n' +
    'цЧеф╗Шя╝Ъ' + today + 'я╝И' + dow + 'цЫЬцЧея╝Й\n' +
    'чеЭцЧеуГХуГйуВ░я╝Ъ' + (holiday ? 'уБпуБД' : 'уБДуБДуБИ') + '\n' +
    'щХ╖цЬЯф╝СцЪЗф╕ня╝Ъ' + (longBreak ? 'уБпуБД' : 'уБДуБДуБИ') + '\n' +
    'ф╗КщА▒цоЛуВКхЦ╢ценцЧея╝ИцЬИуАЬщЗСя╝Йя╝Ъ' + remainingWeekdays + 'цЧе\n\n' +
    'уАРцЬмцЧеуБоKшбМхЛХуГлуГ╝уГлуАС\n' +
    (ruleDesc[rule] || rule) + '\n\n' +
    'уАРшгЬш╢│уГлуГ╝уГлуАС\n' +
    'уГ╗хПЦх╝ХхЕИуБпхЬЯцЧечеЭф╝СуБ┐я╝ИуГбуГ╝уГлщАБф┐буБЧуБжуВВцЬИцЫЬуБ╛уБзшжЛуВЙуВМуБкуБДя╝Й\n' +
    'уГ╗чП╛ха┤я╝Ихдзх╖ечнЙя╝ЙуБпцЬИуАЬхЬЯчи╝хГНуАБцЧеф╝СуБ┐\n' +
    'уГ╗хЬЯцЫЬчП╛ха┤хПпхРжуБпуАМф╗КщА▒цоЛуВКхЦ╢ценцЧе ├Ч 1ф╗╢/цЧеуАНуБих╜УщА▒уВ▒уГ╝уВ╣цХ░уВТцпФш╝ГуБЧуБжхИдцЦнуБЩуВЛуБУуБи\n\n' +
    'уАРф╗Кх╛М7цЧещЦУуБоуВ▒уГ╝уВ╣я╝ИцЦ╜х╖ецЧеуГЩуГ╝уВ╣я╝ЙуАС\n' + caseLines + '\n' +
    'уАРуВвуГйуГ╝уГИуАС\n' +
    'ф╕ЛшжЛцЧец▒║уВБуБжя╝ЭуГкуГХуВйуГ╝уГауБзф╕ЛшжЛцЬкхоЪя╝ИцЬАхДкхЕИя╝Й\n' +
    'шикхХПх┐ЕшжБя╝ЭцЦ░чпЙуБзцЦ╜х╖е21цЧехЙНф╗ехЖЕуБЛуБдф╕ЛшжЛцЬкхоЯцЦ╜\n' +
    'хЖНшикхХПх┐ЕшжБя╝ЭцЦ░чпЙSKцбИф╗╢уБзцЦ╜х╖е10цЧехЙНф╗ехЖЕя╝И2хЫЮчЫох┐ЕшжБя╝Й\n\n' +
    'уАРхЗ║хКЫцМЗчд║уАС\n' +
    'ф╗еф╕ЛJSONуБоуБ┐ш┐ФхН┤уАВхЙНч╜оуБНуГ╗уВ│уГ╝уГЙуГЦуГнуГГуВпуГ╗шкмцШОцЦЗф╕НшжБуАВ\n' +
    '{\n' +
    '  "today": "ф╗КцЧеKуБМщЫЖф╕нуБЩуБ╣уБНц┤╗хЛХя╝Иф╕АцЦЗя╝Й",\n' +
    '  "priority_tasks": ["ч╡╡цЦЗхнЧя╝ЛуВ┐уВ╣уВпшкмцШО", "...я╝И3уАЬ5ф╗╢я╝Й"],\n' +
    '  "notes": "цЫЬцЧеуГ╗чеЭцЧеуГлуГ╝уГлуБлхЯ║уБеуБПхИ╢ч┤ДуВДц│ицДПчВ╣"\n' +
    '}';

  fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + encodeURIComponent(geminiKey), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.7, maxOutputTokens: 600 }
    })
  }).then(function(res) {
    return res.json();
  }).then(function(data) {
    btn.disabled = false;
    btn.innerHTML = 'ЁЯФД цЫ┤цЦ░';
    if (!data.candidates || !data.candidates[0]) throw new Error('API уГмуВ╣уГЭуГ│уВ╣чХ░х╕╕: ' + JSON.stringify(data));
    var rawText = data.candidates[0].content.parts[0].text;
    renderAgendaResult(rawText, today, dow, rule, weekCases.length);
  }).catch(function(err) {
    btn.disabled = false;
    btn.innerHTML = 'ЁЯФД цЫ┤цЦ░';
    document.getElementById('agendaContent').innerHTML =
      '<div class="error-card">тЭМ уВиуГйуГ╝я╝Ъ' + err.message + '</div>';
  });
}

function renderAgendaResult(rawText, today, dow, rule, caseCount) {
  var parsed = null;
  try {
    var clean = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
    parsed = JSON.parse(clean);
  } catch (e) {
    document.getElementById('agendaContent').innerHTML =
      '<div class="agenda-card"><div class="agenda-card-header">ЁЯдЦ AI х┐ЬчнФя╝Иrawя╝Й</div>' +
      '<div class="agenda-card-body"><pre style="white-space:pre-wrap;font-size:12px">' + rawText + '</pre></div></div>';
    return;
  }

  var ruleLabels = {
    'weekday':   'щАЪх╕╕хЦ╢ценцЧе',
    'saturday':  'хЬЯцЫЬя╝ИцЭбф╗╢цмбчммуБзчП╛ха┤я╝Й',
    'sunday':    'цЧецЫЬя╝ИшЗкхоЕуБоуБ┐я╝Й',
    'longbreak': 'щХ╖цЬЯф╝СцЪЗф╕н'
  };
  var chipCls = 'day-chip';
  if (rule === 'sunday' || rule === 'saturday' || rule === 'longbreak') chipCls += ' weekend';
  if (isHoliday(today)) chipCls += ' holiday';

  var html = '<div class="agenda-day-info">' +
    '<span class="' + chipCls + '">' + dow + 'цЫЬцЧе</span>' +
    '<span style="color:#666">' + (ruleLabels[rule] || rule) + '</span>' +
    '<span style="color:#aaa">7цЧеф╗ехЖЕ: ' + caseCount + 'ф╗╢</span>' +
    '</div>';

  if (parsed.today) {
    html += '<div class="agenda-card card-focus">' +
      '<div class="agenda-card-header">ЁЯУМ ф╗КцЧеуБочДжчВ╣</div>' +
      '<div class="agenda-card-body">' + parsed.today + '</div>' +
      '</div>';
  }

  if (parsed.priority_tasks && parsed.priority_tasks.length > 0) {
    var items = '';
    for (var i = 0; i < parsed.priority_tasks.length; i++) {
      items += '<li>' + parsed.priority_tasks[i] + '</li>';
    }
    html += '<div class="agenda-card card-tasks">' +
      '<div class="agenda-card-header">тнР хДкхЕИуВ┐уВ╣уВп</div>' +
      '<div class="agenda-card-body"><ul class="task-list">' + items + '</ul></div>' +
      '</div>';
  }

  if (parsed.notes) {
    html += '<div class="agenda-card card-notes">' +
      '<div class="agenda-card-header">ЁЯТб уГбуГвуГ╗уВвуГйуГ╝уГИ</div>' +
      '<div class="agenda-card-body">' + parsed.notes + '</div>' +
      '</div>';
  }

  var now = new Date(new Date().getTime() + 9 * 3600000);
  var hh = now.getUTCHours();
  var mm = now.getUTCMinutes();
  html += '<div class="agenda-footer">тП░ чФЯцИРя╝Ъ' + (hh<10?'0'+hh:hh) + ':' + (mm<10?'0'+mm:mm) + '</div>';

  document.getElementById('agendaContent').innerHTML = html;
}
