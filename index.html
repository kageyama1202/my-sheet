<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>案件リスト（データ抽出特化版）</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #f9f9f9; }
    .box { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ccc; }
    /* 一番下のポップアップが隠れないように、下に余白(padding)を入れています */
    .table-wrapper { overflow-x: auto; background-color: #fff; border: 1px solid #ccc; padding-bottom: 100px; }
    
    table { border-collapse: collapse; }
    th, td { 
      border: 1px solid #ccc; 
      text-align: left; 
      font-size: 14px; 
      vertical-align: middle;
      
      /* ツールチップの基準にするため必須 */
      position: relative; 
      
      /* 列幅を100pxに完全固定 */
      width: 100px;
      min-width: 100px;
      max-width: 100px; 
    }
    
    th { background-color: #e0e0e0; padding: 8px; }
    .alpha-head th { background-color: #d0d0d0; text-align: center; font-weight: bold; }
    
    /* ▼ 変更1: 見切れる文字の処理をセル内の要素(div)に移動しました */
    .cell-inner {
      padding: 8px;
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
      cursor: pointer;
    }

    /* ▼ 変更2: オリジナルのポップアップ（ツールチップ）デザイン */
    .tooltip {
      display: none;
      position: absolute;
      top: 35px; /* セルの少し下に表示 */
      left: 5px;
      background-color: #fff;
      border: 2px solid #28a745; /* 緑枠で読みやすく */
      padding: 10px;
      border-radius: 4px;
      z-index: 999;
      white-space: normal; /* 改行を有効にする */
      width: max-content; /* 文字量に合わせて広がる */
      max-width: 400px; /* 最大400pxで折り返し（はみ出し防止） */
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      line-height: 1.6;
      color: #333;
    }

    /* セルにマウスを乗せたらポップアップを表示 */
    td:hover .tooltip {
      display: block;
    }
    
    input[type="text"] { width: 100%; box-sizing: border-box; padding: 4px; }
    select { padding: 5px; font-size: 14px; margin-right: 10px; }
  </style>
</head>
<body>

  <div class="box">
    <h3>▼ CSVファイルを取り込んで表示（抽出・編集用）</h3>
    <select id="encoding">
      <option value="Shift_JIS">文字コード: Shift_JIS (Salesforce標準)</option>
      <option value="UTF-8">文字コード: UTF-8</option>
    </select>
    <input type="file" id="csvFile" accept=".csv" />
    <button id="uploadBtn" style="padding: 5px 15px; cursor: pointer;">表を表示する</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <script>
    function getColLetter(index) {
        let letter = '';
        while (index >= 0) {
            letter = String.fromCharCode((index % 26) + 65) + letter;
            index = Math.floor(index / 26) - 1;
        }
        return letter;
    }

    function parseCSV(text) {
        const result = [];
        let row = [];
        let col = '';
        let insideQuotes = false;

        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const nextChar = text[i + 1];

            if (char === '"' && insideQuotes && nextChar === '"') {
                col += '"';
                i++; 
            } else if (char === '"') {
                insideQuotes = !insideQuotes;
            } else if (char === ',' && !insideQuotes) {
                row.push(col);
                col = '';
            } else if ((char === '\n' || char === '\r') && !insideQuotes) {
                if (char === '\r' && nextChar === '\n') i++; 
                row.push(col);
                result.push(row);
                row = [];
                col = '';
            } else {
                col += char;
            }
        }
        if (col !== '' || row.length > 0) {
            row.push(col);
            result.push(row);
        }
        return result;
    }

    document.getElementById('uploadBtn').addEventListener('click', function() {
      const fileInput = document.getElementById('csvFile');
      if (fileInput.files.length === 0) {
        alert("CSVファイルを選択してください！");
        return;
      }
      
      const file = fileInput.files.item(0); 
      const encoding = document.getElementById('encoding').value; 
      const reader = new FileReader();
      
      reader.onload = function(e) {
        const text = e.target.result;
        const lines = parseCSV(text);
        
        const validLines = lines.filter(function(line) { 
            return line.join('').trim() !== ''; 
        });
        
        const thead = document.getElementById('table-head');
        const tbody = document.getElementById('table-body');
        thead.innerHTML = ''; 
        tbody.innerHTML = '';
        
        if (validLines.length === 0) return;

        const headers = validLines.shift(); 
        const totalCols = headers.length + 10; 

        // アルファベット行
        const trAlpha = document.createElement('tr');
        trAlpha.className = 'alpha-head';
        for(let i = 0; i < totalCols; i++) {
            const th = document.createElement('th');
            th.textContent = getColLetter(i);
            trAlpha.appendChild(th);
        }
        thead.appendChild(trAlpha);

        // ヘッダー行
        const trHead = document.createElement('tr');
        headers.forEach(function(h) {
          const th = document.createElement('th');
          th.textContent = h;
          trHead.appendChild(th);
        });
        for(let i = 1; i <= 10; i++) {
          const th = document.createElement('th');
          th.textContent = '現場入力 ' + i;
          th.style.backgroundColor = '#d4edda';
          trHead.appendChild(th);
        }
        thead.appendChild(trHead);

        // データ行
        validLines.forEach(function(cols) {
          const tr = document.createElement('tr');
          
          cols.forEach(function(c) {
            const td = document.createElement('td');
            
            // ▼ 変更3: 通常の見た目（1行に省略）
            const inner = document.createElement('div');
            inner.className = 'cell-inner';
            inner.textContent = c.replace(/\n|\r/g, ' '); 
            td.appendChild(inner);
            
            // ▼ 変更4: マウスを乗せた時に出る「自作のポップアップ」を作成
            if (c.trim() !== '') {
              const tooltip = document.createElement('div');
              tooltip.className = 'tooltip';
              // データ内の改行をHTMLの改行（<br>）に変換して全文表示
              tooltip.innerHTML = c.replace(/\n/g, '<br>'); 
              td.appendChild(tooltip);
            }
            
            tr.appendChild(td);
          });
          
          const emptyCols = headers.length - cols.length;
          for(let k = 0; k < emptyCols; k++) {
              tr.appendChild(document.createElement('td'));
          }
          
          // 現場入力
          for(let j = 1; j <= 10; j++) {
            const td = document.createElement('td');
            td.style.padding = '8px'; // 入力欄にはパディングをつける
            td.innerHTML = '<input type="text" placeholder="...">';
            tr.appendChild(td);
          }
          
          tbody.appendChild(tr);
        });
      };
      
      reader.readAsText(file, encoding);
    });
  </script>
</body>
</html>
