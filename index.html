<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>案件リスト（データ抽出特化版）</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #f9f9f9; }
    .box { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ccc; }
    .table-wrapper { overflow-x: auto; background-color: #fff; border: 1px solid #ccc; padding-bottom: 50px; }
    
    table { border-collapse: collapse; table-layout: fixed; width: max-content; }
    th, td { 
      border: 1px solid #ccc; 
      text-align: left; 
      font-size: 14px; 
      vertical-align: middle;
      
      /* 列幅を100pxに完全固定 */
      width: 100px;
      min-width: 100px;
      max-width: 100px; 
    }
    
    th { background-color: #e0e0e0; padding: 8px; }
    .alpha-head th { background-color: #d0d0d0; text-align: center; font-weight: bold; }
    
    .cell-inner {
      padding: 8px;
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
      cursor: pointer;
    }

    /* ▼ 変更1: 画面の最前面に強制表示させるポップアップのデザイン */
    #custom-tooltip {
      display: none;
      position: absolute;
      background-color: #fff;
      border: 2px solid #28a745;
      padding: 10px;
      border-radius: 4px;
      z-index: 99999; /* 絶対に一番手前に来るように設定 */
      white-space: normal; 
      width: max-content; 
      max-width: 400px; 
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      line-height: 1.6;
      color: #333;
      pointer-events: none; /* マウス操作の邪魔をしない設定 */
    }
    
    input[type="text"] { width: 100%; box-sizing: border-box; padding: 4px; }
    select { padding: 5px; font-size: 14px; margin-right: 10px; }
  </style>
</head>
<body>

  <!-- ▼ 変更2: ポップアップの枠をひとつだけ画面上に用意しておく -->
  <div id="custom-tooltip"></div>

  <div class="box">
    <h3>▼ CSVファイルを取り込んで表示（抽出・編集用）</h3>
    <select id="encoding">
      <option value="Shift_JIS">文字コード: Shift_JIS (Salesforce標準)</option>
      <option value="UTF-8">文字コード: UTF-8</option>
    </select>
    <input type="file" id="csvFile" accept=".csv" />
    <button id="uploadBtn" style="padding: 5px 15px; cursor: pointer;">表を表示する</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <script>
    function getColLetter(index) {
        let letter = '';
        while (index >= 0) {
            letter = String.fromCharCode((index % 26) + 65) + letter;
            index = Math.floor(index / 26) - 1;
        }
        return letter;
    }

    function parseCSV(text) {
        const result = [];
        let row = [];
        let col = '';
        let insideQuotes = false;

        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const nextChar = text[i + 1];

            if (char === '"' && insideQuotes && nextChar === '"') {
                col += '"';
                i++; 
            } else if (char === '"') {
                insideQuotes = !insideQuotes;
            } else if (char === ',' && !insideQuotes) {
                row.push(col);
                col = '';
            } else if ((char === '\n' || char === '\r') && !insideQuotes) {
                if (char === '\r' && nextChar === '\n') i++; 
                row.push(col);
                result.push(row);
                row = [];
                col = '';
            } else {
                col += char;
            }
        }
        if (col !== '' || row.length > 0) {
            row.push(col);
            result.push(row);
        }
        return result;
    }

    document.getElementById('uploadBtn').addEventListener('click', function() {
      const fileInput = document.getElementById('csvFile');
      if (fileInput.files.length === 0) {
        alert("CSVファイルを選択してください！");
        return;
      }
      
      const file = fileInput.files.item(0); 
      const encoding = document.getElementById('encoding').value; 
      const reader = new FileReader();
      
      reader.onload = function(e) {
        const text = e.target.result;
        const lines = parseCSV(text);
        
        const validLines = lines.filter(function(line) { 
            return line.join('').trim() !== ''; 
        });
        
        const thead = document.getElementById('table-head');
        const tbody = document.getElementById('table-body');
        thead.innerHTML = ''; 
        tbody.innerHTML = '';
        
        if (validLines.length === 0) return;

        const headers = validLines.shift(); 
        const totalCols = headers.length + 10; 

        // アルファベット行
        const trAlpha = document.createElement('tr');
        trAlpha.className = 'alpha-head';
        for(let i = 0; i < totalCols; i++) {
            const th = document.createElement('th');
            th.textContent = getColLetter(i);
            trAlpha.appendChild(th);
        }
        thead.appendChild(trAlpha);

        // ヘッダー行
        const trHead = document.createElement('tr');
        headers.forEach(function(h) {
          const th = document.createElement('th');
          th.textContent = h;
          trHead.appendChild(th);
        });
        for(let i = 1; i <= 10; i++) {
          const th = document.createElement('th');
          th.textContent = '現場入力 ' + i;
          th.style.backgroundColor = '#d4edda';
          trHead.appendChild(th);
        }
        thead.appendChild(trHead);

        // データ行
        validLines.forEach(function(cols) {
          const tr = document.createElement('tr');
          
          cols.forEach(function(c) {
            const td = document.createElement('td');
            
            const inner = document.createElement('div');
            inner.className = 'cell-inner';
            inner.textContent = c.replace(/\n|\r/g, ' '); 
            td.appendChild(inner);
            
            // ▼ 変更3: マウスの動きに合わせてポップアップを強制表示する仕組み
            if (c.trim() !== '') {
              td.addEventListener('mouseenter', function(e) {
                const tooltip = document.getElementById('custom-tooltip');
                tooltip.innerHTML = c.replace(/\n/g, '<br>'); 
                tooltip.style.display = 'block';
                tooltip.style.left = (e.pageX + 15) + 'px';
                tooltip.style.top = (e.pageY + 15) + 'px';
              });
              td.addEventListener('mousemove', function(e) {
                const tooltip = document.getElementById('custom-tooltip');
                tooltip.style.left = (e.pageX + 15) + 'px';
                tooltip.style.top = (e.pageY + 15) + 'px';
              });
              td.addEventListener('mouseleave', function(e) {
                const tooltip = document.getElementById('custom-tooltip');
                tooltip.style.display = 'none';
              });
            }
            
            tr.appendChild(td);
          });
          
          const emptyCols = headers.length - cols.length;
          for(let k = 0; k < emptyCols; k++) {
              tr.appendChild(document.createElement('td'));
          }
          
          // 現場入力
          for(let j = 1; j <= 10; j++) {
            const td = document.createElement('td');
            td.style.padding = '8px';
            td.innerHTML = '<input type="text" placeholder="...">';
            tr.appendChild(td);
          }
          
          tbody.appendChild(tr);
        });
      };
      
      reader.readAsText(file, encoding);
    });
  </script>
</body>
</html>
