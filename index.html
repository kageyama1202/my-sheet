<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>案件リスト（統合版）</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #f9f9f9; }
    .box { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ccc; }
    .table-wrapper { overflow-x: auto; background-color: #fff; border: 1px solid #ccc; }
    table { border-collapse: collapse; white-space: nowrap; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; font-size: 14px; vertical-align: top; }
    th { background-color: #e0e0e0; }
    input[type="text"] { width: 80px; padding: 4px; box-sizing: border-box; }
    select { padding: 5px; font-size: 14px; margin-right: 10px; }
  </style>
</head>
<body>

  <div class="box">
    <h3>▼ CSVファイルを取り込んで表示</h3>
    
    <!-- 【追加】文字化け対策: 読み込む文字コードを選べるようにしました -->
    <select id="encoding">
      <option value="Shift_JIS">文字コード: Shift_JIS (Salesforce標準)</option>
      <option value="UTF-8">文字コード: UTF-8</option>
    </select>
    
    <input type="file" id="csvFile" accept=".csv" />
    <button id="uploadBtn" style="padding: 5px 15px; cursor: pointer;">表を表示する</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <script>
    // 【重要】データ内の改行やカンマを正しく処理する、本格的なCSV解析関数
    function parseCSV(text) {
        const result = [];
        let row = [];
        let col = '';
        let insideQuotes = false;

        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const nextChar = text[i + 1];

            if (char === '"' && insideQuotes && nextChar === '"') {
                // ダブルクォーテーション自体の文字（""）を処理
                col += '"';
                i++; 
            } else if (char === '"') {
                // セルの囲み（"）の開始・終了
                insideQuotes = !insideQuotes;
            } else if (char === ',' && !insideQuotes) {
                // カンマが来たら次の列へ
                row.push(col);
                col = '';
            } else if ((char === '\n' || char === '\r') && !insideQuotes) {
                // 改行が来たら次の行へ（セルの中の改行は無視される）
                if (char === '\r' && nextChar === '\n') i++; // Windowsの改行(CRLF)対応
                row.push(col);
                result.push(row);
                row = [];
                col = '';
            } else {
                // 通常の文字を追加
                col += char;
            }
        }
        if (col !== '' || row.length > 0) {
            row.push(col);
            result.push(row);
        }
        return result;
    }

    document.getElementById('uploadBtn').addEventListener('click', function() {
      const fileInput = document.getElementById('csvFile');
      if (fileInput.files.length === 0) {
        alert("CSVファイルを選択してください！");
        return;
      }
      
      const file = fileInput.files.item(0); 
      // ユーザーが選んだ文字コードを取得
      const encoding = document.getElementById('encoding').value; 
      const reader = new FileReader();
      
      reader.onload = function(e) {
        const text = e.target.result;
        
        // 専用関数を使ってCSVを正確に分割する
        const lines = parseCSV(text);
        
        // 空の行を取り除く
        const validLines = lines.filter(function(line) { 
            return line.join('').trim() !== ''; 
        });
        
        const thead = document.getElementById('table-head');
        const tbody = document.getElementById('table-body');
        thead.innerHTML = ''; 
        tbody.innerHTML = '';
        
        if (validLines.length === 0) {
          alert("エラー：CSVの中にデータが見つかりませんでした。");
          return;
        }

        // 1行目(ヘッダー)を取り出す
        const headers = validLines.shift(); 
        const trHead = document.createElement('tr');
        
        headers.forEach(function(h) {
          const th = document.createElement('th');
          th.textContent = h;
          trHead.appendChild(th);
        });
        
        // 現場入力用のヘッダー10個を足す
        for(let i = 1; i <= 10; i++) {
          const th = document.createElement('th');
          th.textContent = '現場入力 ' + i;
          th.style.backgroundColor = '#d4edda';
          trHead.appendChild(th);
        }
        thead.appendChild(trHead);

        // 2行目以降のデータを取り出して表示
        validLines.forEach(function(cols) {
          const tr = document.createElement('tr');
          
          cols.forEach(function(c) {
            const td = document.createElement('td');
            // データ内の改行をHTMLの改行（<br>）に変換して綺麗に表示する
            td.innerHTML = c.replace(/\n/g, '<br>');
            tr.appendChild(td);
          });
          
          for(let j = 1; j <= 10; j++) {
            const td = document.createElement('td');
            td.innerHTML = '<input type="text" placeholder="入力...">';
            tr.appendChild(td);
          }
          
          tbody.appendChild(tr);
        });
        
        alert("読み込み成功！ " + validLines.length + " 件の案件データを表示しました。");
      };
      
      // プルダウンで選ばれた文字コードを使ってファイルを読み込む
      reader.readAsText(file, encoding);
    });
  </script>
</body>
</html>
