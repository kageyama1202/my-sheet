<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>閲覧用ログイン</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .box { width: 100%; max-width: 320px; text-align: center; }
  .box h1 { font-size: 17px; font-weight: 600; margin-bottom: 24px; color: #ccc; }
  #pin {
    width: 100%;
    font-size: 30px;
    letter-spacing: 10px;
    text-align: center;
    background: #1a1a1a;
    border: 1px solid #2e2e2e;
    border-radius: 10px;
    color: #e8e8e8;
    padding: 14px 8px;
    outline: none;
    -webkit-appearance: none;
  }
  #pin:focus { border-color: #4f8ef7; }
  #err { color: #e05c5c; font-size: 13px; margin-top: 10px; min-height: 18px; }
  #go {
    width: 100%;
    margin-top: 16px;
    background: #1565c0;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  #go:active { opacity: 0.75; }

  /* --- 担当者選択画面 --- */
  #staffBox { display: none; }
  #staffBox h1 { margin-bottom: 18px; }
  .staff-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: #1a1a1a;
    border: 1px solid #2e2e2e;
    color: #e8e8e8;
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 10px;
    font-size: 15px;
    cursor: pointer;
  }
  .staff-btn:active { background: #232323; }
  .note { font-size: 12px; color: #777; margin-top: 16px; }
</style>
</head>
<body>

<div class="box" id="pinBox">
  <h1>👀 閲覧用 暗証番号</h1>
  <input type="tel" id="pin" maxlength="8" inputmode="numeric" autocomplete="off" placeholder="••••" autofocus>
  <div id="err"></div>
  <button id="go" onclick="tryLogin()">入る</button>
</div>

<div class="box" id="staffBox">
  <h1>誰の画面を見ますか？</h1>
  <div id="staffList"></div>
  <div class="note">選択すると、その担当者と同じ画面がそのまま表示されます</div>
</div>

<script>
var firebaseConfig={apiKey:"AIzaSyDznSykpSebsejNdQtpOgfORuzZSoW3_fs",authDomain:"project-6745138395263517914.firebaseapp.com",databaseURL:"https://project-6745138395263517914-default-rtdb.firebaseio.com",projectId:"project-6745138395263517914",storageBucket:"project-6745138395263517914.firebasestorage.app",messagingSenderId:"1054295910908",appId:"1:1054295910908:web:4072df05bd90bbdc896a79"};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

firebase.auth().signInAnonymously().catch(function (e) { console.warn('auth error', e); });

document.getElementById('pin').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') tryLogin();
});

function tryLogin() {
  var pin = document.getElementById('pin').value.trim();
  var errEl = document.getElementById('err');
  errEl.textContent = '';
  if (!pin) { errEl.textContent = '暗証番号を入力してください'; return; }

  firebase.database().ref('config/viewer_pins/' + pin).once('value').then(function (snap) {
    var val = snap.val();
    if (!val) {
      errEl.textContent = '暗証番号が違います';
      document.getElementById('pin').value = '';
      document.getElementById('pin').focus();
      return;
    }
    showStaffPicker();
  }).catch(function (e) {
    console.error(e);
    errEl.textContent = '通信エラー、もう一度お試しください';
  });
}

function showStaffPicker() {
  document.getElementById('pinBox').style.display = 'none';
  document.getElementById('staffBox').style.display = 'block';

  firebase.database().ref('users').once('value').then(function (snap) {
    var data = snap.val() || {};
    var listDiv = document.getElementById('staffList');
    var keys = Object.keys(data);

    if (keys.length === 0) {
      listDiv.innerHTML = '<div class="note">担当者データがまだありません</div>';
      return;
    }

    listDiv.innerHTML = '';
    keys.forEach(function (staffKey) {
      var u = data[staffKey];
      var displayName = (u.config && u.config.name) ? u.config.name : staffKey;
      var btn = document.createElement('button');
      btn.className = 'staff-btn';
      btn.textContent = '👤 ' + displayName;
      btn.onclick = function () { selectStaff(staffKey, displayName); };
      listDiv.appendChild(btn);
    });
  }).catch(function (e) {
    document.getElementById('staffList').innerHTML =
      '<div class="note">❌ 読込エラー: ' + e.message + '</div>';
  });
}

function selectStaff(staffKey, displayName) {
  localStorage.setItem('userKey', staffKey);
  localStorage.setItem('userName', displayName);
  localStorage.setItem('viewerMode', '1');
  location.href = 'index.html';
}
</script>
</body>
</html>
